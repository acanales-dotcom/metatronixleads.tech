<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MetaTronix — Portal Interno</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
  <style>
    /* ── MODAL LECTOR ────────────────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.82);
      z-index: 500;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-y: auto;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.active { display: flex; }

    .modal-box {
      background: #111;
      border: 1px solid rgba(0, 255, 136, 0.35);
      border-radius: 8px;
      width: 100%;
      max-width: 820px;
      box-shadow: 0 0 80px rgba(0, 255, 136, 0.07);
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 4rem);
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      padding: 1.5rem 1.75rem 1.25rem;
      border-bottom: 1px solid #1e1e1e;
      position: sticky;
      top: 0;
      background: #111;
      border-radius: 8px 8px 0 0;
      z-index: 1;
    }

    .modal-title-wrap { flex: 1; min-width: 0; }

    .modal-title {
      font-family: var(--font-display);
      font-size: 1.6rem;
      letter-spacing: 0.05em;
      color: #f0f0f0;
      line-height: 1.1;
      margin-bottom: 0.4rem;
      word-break: break-word;
    }

    .modal-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .modal-badge {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.2em 0.6em;
      border-radius: 3px;
      background: rgba(0, 255, 136, 0.12);
      color: #00ff88;
      border: 1px solid rgba(0, 255, 136, 0.25);
    }

    .modal-date {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: #666;
      letter-spacing: 0.05em;
    }

    .modal-close {
      background: transparent;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #666;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      flex-shrink: 0;
      line-height: 1;
    }
    .modal-close:hover { border-color: #00ff88; color: #00ff88; }

    .modal-body {
      padding: 1.75rem;
      overflow-y: auto;
      flex: 1;
      scroll-behavior: smooth;
    }

    /* Estilos del contenido generado */
    .modal-content {
      font-family: var(--font-body);
      font-size: 0.95rem;
      line-height: 1.75;
      color: #d8d8d8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Si el contenido viene en HTML/markdown parseado */
    .modal-content h1, .modal-content h2, .modal-content h3, .modal-content h4 {
      font-family: var(--font-display);
      color: #f0f0f0;
      letter-spacing: 0.04em;
      margin: 1.5rem 0 0.6rem;
      line-height: 1.1;
    }
    .modal-content h1 { font-size: 1.8rem; color: #00ff88; }
    .modal-content h2 { font-size: 1.4rem; border-bottom: 1px solid #1e1e1e; padding-bottom: 0.4rem; }
    .modal-content h3 { font-size: 1.1rem; color: #ccc; }

    .modal-content p { margin-bottom: 1rem; }

    .modal-content ul, .modal-content ol {
      margin: 0.5rem 0 1rem 1.5rem;
    }
    .modal-content li { margin-bottom: 0.35rem; }

    .modal-content strong { color: #f0f0f0; font-weight: 600; }
    .modal-content em { color: #aaa; }

    .modal-content code {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 3px;
      padding: 0.1em 0.45em;
      color: #00ff88;
    }

    .modal-content pre {
      background: #0d0d0d;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 1.25rem;
      overflow-x: auto;
      margin: 1rem 0;
    }
    .modal-content pre code {
      background: transparent;
      border: none;
      padding: 0;
      font-size: 0.82rem;
      color: #a8ff88;
    }

    .modal-content blockquote {
      border-left: 3px solid #00ff88;
      margin: 1rem 0;
      padding: 0.5rem 1rem;
      background: rgba(0, 255, 136, 0.04);
      border-radius: 0 4px 4px 0;
      color: #aaa;
      font-style: italic;
    }

    .modal-content a {
      color: #00ff88;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .modal-content a:hover { opacity: 0.8; }

    .modal-content hr {
      border: none;
      border-top: 1px solid #222;
      margin: 1.5rem 0;
    }

    /* Fuentes/referencias al pie del contenido */
    .modal-sources {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid #1e1e1e;
    }
    .modal-sources-title {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    .modal-source-item {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: #555;
      margin-bottom: 0.3rem;
    }
    .modal-source-item a { color: #444; }
    .modal-source-item a:hover { color: #00ff88; }

    .modal-footer {
      padding: 1rem 1.75rem;
      border-top: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .modal-footer-url {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: #444;
      letter-spacing: 0.05em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 400px;
    }

    .modal-open-btn {
      background: transparent;
      border: 1px solid rgba(0, 255, 136, 0.35);
      border-radius: 6px;
      color: #00ff88;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      padding: 0.45rem 1rem;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      display: inline-block;
      flex-shrink: 0;
    }
    .modal-open-btn:hover { background: #00ff88; color: #000; }

    /* Scroll indicator */
    .modal-scroll-hint {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--font-mono);
      font-size: 0.62rem;
      color: #333;
      letter-spacing: 0.08em;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .modal-overlay { padding: 0; align-items: flex-end; }
      .modal-box { max-height: 92vh; border-radius: 12px 12px 0 0; max-width: 100%; }
      .modal-header { padding: 1.25rem 1.25rem 1rem; }
      .modal-body { padding: 1.25rem; }
      .modal-footer { padding: 0.75rem 1.25rem; }
      .modal-title { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <!-- LOADING BAR -->
  <div class="loading-bar" id="loadingBar"></div>

  <!-- ══════════════ LOGIN ══════════════ -->
  <div class="login-screen" id="loginScreen">
    <div class="login-logo">METATRONIX</div>
    <div class="login-subtitle">Portal Interno de Documentos</div>

    <div class="login-card">
      <label class="login-label" for="passwordInput">Contraseña de Acceso</label>
      <input
        class="login-input"
        id="passwordInput"
        type="password"
        placeholder="••••••••••••••"
        autocomplete="current-password"
        autofocus
      />
      <button class="login-btn" id="loginBtn">INGRESAR</button>
      <div class="login-error" id="loginError">Contraseña incorrecta. Intenta de nuevo.</div>
    </div>
  </div>

  <!-- ══════════════ PORTAL ══════════════ -->
  <div class="portal" id="portal">

    <header class="portal-header">
      <div class="header-brand">METATRONIX</div>
      <div class="header-meta">
        <span class="header-tag">Portal Interno · MetaTronix / IBANOR SA de CV</span>
        <button class="logout-btn" id="logoutBtn">Cerrar sesión</button>
      </div>
    </header>

    <main class="portal-main">
      <div class="section-title">Documentos</div>
      <div class="section-count" id="docCount">Cargando...</div>

      <div class="docs-grid" id="docsGrid"></div>

      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📂</div>
        <div class="empty-title">Sin documentos aún</div>
        <div class="empty-msg">Los documentos aparecerán aquí</div>
      </div>
    </main>

  </div>

  <!-- ══════════════ MODAL LECTOR ══════════════ -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-box" id="modalBox">

      <div class="modal-header">
        <div class="modal-title-wrap">
          <div class="modal-title" id="modalTitle">—</div>
          <div class="modal-meta">
            <span class="modal-badge" id="modalBadge"></span>
            <span class="modal-date" id="modalDate"></span>
          </div>
        </div>
        <button class="modal-close" id="modalClose" aria-label="Cerrar">✕ ESC</button>
      </div>

      <div class="modal-body" id="modalBody">
        <div class="modal-content" id="modalContent"></div>
        <div class="modal-sources" id="modalSources" style="display:none">
          <div class="modal-sources-title">Fuentes</div>
          <div id="modalSourcesList"></div>
        </div>
      </div>

      <div class="modal-footer" id="modalFooter">
        <div class="modal-scroll-hint" id="modalScrollHint">↕ scroll para leer completo</div>
        <a class="modal-open-btn" id="modalOpenBtn" href="#" target="_blank" rel="noopener" style="display:none">
          Abrir fuente →
        </a>
      </div>

    </div>
  </div>

  <script>
    // ── CONSTANTES ──────────────────────────────────────────────────────────
    const PASS_HASH  = 'c24b7a3f65e835b2ee4ad6b770aa305bc8dc339cc86db96f8cf8cd440fa3dcb0';
    const SESSION_KEY = 'mtx_auth';

    // ── UTILIDADES ──────────────────────────────────────────────────────────
    async function sha256(str) {
      const buf  = new TextEncoder().encode(str);
      const hash = await crypto.subtle.digest('SHA-256', buf);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    function setLoading(pct) {
      const bar = document.getElementById('loadingBar');
      bar.style.width = pct + '%';
      if (pct >= 100) setTimeout(() => { bar.style.opacity = '0'; }, 400);
      else bar.style.opacity = '1';
    }

    function formatDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('es-MX', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function escHtml(str) {
      return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    // Convierte markdown básico a HTML para mostrar en el modal
    function markdownToHtml(text) {
      if (!text) return '';
      let html = escHtml(text);

      // Headings
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm,   '<h1>$1</h1>');

      // Bold / italic
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g,     '<em>$1</em>');
      html = html.replace(/__(.+?)__/g,     '<strong>$1</strong>');
      html = html.replace(/_(.+?)_/g,       '<em>$1</em>');

      // Code blocks
      html = html.replace(/```[\w]*\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
      html = html.replace(/`(.+?)`/g, '<code>$1</code>');

      // Blockquote
      html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

      // Horizontal rule
      html = html.replace(/^---$/gm, '<hr>');

      // Unordered lists
      html = html.replace(/^[\*\-] (.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');

      // Ordered lists
      html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

      // Links
      html = html.replace(/\[(.+?)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

      // Párrafos: doble salto de línea
      html = html.split(/\n\n+/).map(block => {
        block = block.trim();
        if (!block) return '';
        if (/^<(h[1-4]|ul|ol|pre|blockquote|hr)/.test(block)) return block;
        return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
      }).join('\n');

      return html;
    }

    // ── SESIÓN ──────────────────────────────────────────────────────────────
    function isAuthenticated() {
      return sessionStorage.getItem(SESSION_KEY) === '1';
    }
    function setAuthenticated(val) {
      if (val) sessionStorage.setItem(SESSION_KEY, '1');
      else sessionStorage.removeItem(SESSION_KEY);
    }

    // ── LOGIN ────────────────────────────────────────────────────────────────
    async function handleLogin() {
      const input = document.getElementById('passwordInput');
      const error = document.getElementById('loginError');
      const btn   = document.getElementById('loginBtn');

      const val = input.value.trim();
      if (!val) { showError('Ingresa tu contraseña.'); return; }

      btn.textContent = 'VERIFICANDO...';
      btn.disabled = true;

      try {
        const hash = await sha256(val);
        if (hash === PASS_HASH) {
          error.classList.remove('visible');
          setAuthenticated(true);
          showPortal();
        } else {
          showError('Contraseña incorrecta. Intenta de nuevo.');
          input.value = '';
          input.focus();
        }
      } finally {
        btn.textContent = 'INGRESAR';
        btn.disabled = false;
      }
    }

    function showError(msg) {
      const error = document.getElementById('loginError');
      error.textContent = msg;
      error.classList.add('visible');
    }

    // ── PORTAL ───────────────────────────────────────────────────────────────
    function showPortal() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('portal').classList.add('active');
      loadDocuments();
    }

    function showLogin() {
      document.getElementById('portal').classList.remove('active');
      document.getElementById('loginScreen').style.display = '';
      document.getElementById('passwordInput').value = '';
      document.getElementById('loginError').classList.remove('visible');
    }

    async function loadDocuments() {
      setLoading(30);
      const grid  = document.getElementById('docsGrid');
      const empty = document.getElementById('emptyState');
      const count = document.getElementById('docCount');

      try {
        setLoading(60);
        const res  = await fetch('docs/index.json?_=' + Date.now());
        const data = await res.json();
        setLoading(90);

        const docs = data.documentos || [];
        count.textContent = docs.length
          ? docs.length + ' documento' + (docs.length !== 1 ? 's' : '') + ' disponible' + (docs.length !== 1 ? 's' : '')
          : '0 documentos';

        if (docs.length === 0) {
          grid.innerHTML = '';
          empty.classList.add('visible');
        } else {
          empty.classList.remove('visible');
          grid.innerHTML = docs.map((doc, idx) => renderCard(doc, idx)).join('');
        }

        // Guardar docs en memoria para el modal
        window._mtxDocs = docs;

      } catch (e) {
        count.textContent = 'Error al cargar documentos';
        empty.classList.add('visible');
        console.error('Error loading docs:', e);
      }

      setLoading(100);
    }

    function renderCard(doc, idx) {
      const nombre    = escHtml(doc.nombre    || 'Sin título');
      const categoria = escHtml(doc.categoria || 'General');
      const fecha     = formatDate(doc.fecha);
      const tieneContenido = !!(doc.contenido || doc.resumen);
      const tieneUrl       = !!(doc.url);

      // Preview del contenido (primeras ~120 chars)
      let preview = '';
      if (doc.resumen) {
        preview = `<div class="card-preview">${escHtml(doc.resumen.substring(0, 160))}${doc.resumen.length > 160 ? '…' : ''}</div>`;
      } else if (doc.contenido) {
        const raw = doc.contenido.replace(/#{1,6} /g, '').replace(/\*+/g, '').replace(/\n+/g, ' ').trim();
        preview = `<div class="card-preview">${escHtml(raw.substring(0, 160))}${raw.length > 160 ? '…' : ''}</div>`;
      }

      const btnLeer = tieneContenido
        ? `<button class="card-open-btn" onclick="openModal(${idx})">Leer completo →</button>`
        : '';
      const btnAbrir = tieneUrl
        ? `<a class="card-open-btn card-link-btn" href="${escHtml(doc.url)}" target="_blank" rel="noopener">Abrir fuente ↗</a>`
        : '';

      return `
        <div class="doc-card" onclick="openModal(${idx})" style="cursor:pointer">
          <div class="card-header">
            <div class="card-title">${nombre}</div>
            <span class="card-badge">${categoria}</span>
          </div>
          <div class="card-date">${fecha}</div>
          ${preview}
          <div class="card-actions">
            ${btnLeer}
            ${btnAbrir}
          </div>
        </div>`;
    }

    // ── MODAL ─────────────────────────────────────────────────────────────────
    function openModal(idx) {
      const doc = (window._mtxDocs || [])[idx];
      if (!doc) return;

      document.getElementById('modalTitle').textContent  = doc.nombre    || 'Sin título';
      document.getElementById('modalBadge').textContent  = doc.categoria || 'General';
      document.getElementById('modalDate').textContent   = formatDate(doc.fecha);

      // Contenido
      const contentEl = document.getElementById('modalContent');
      if (doc.contenido) {
        contentEl.innerHTML = markdownToHtml(doc.contenido);
      } else if (doc.resumen) {
        contentEl.innerHTML = '<p>' + escHtml(doc.resumen) + '</p>';
      } else {
        contentEl.innerHTML = '<p style="color:#555;font-family:var(--font-mono);font-size:0.8rem;">Sin contenido disponible.</p>';
      }

      // Fuentes
      const sourcesEl = document.getElementById('modalSources');
      const listEl    = document.getElementById('modalSourcesList');
      if (doc.fuentes && doc.fuentes.length > 0) {
        listEl.innerHTML = doc.fuentes.map((f, i) =>
          `<div class="modal-source-item">[${i+1}] <a href="${escHtml(f.url || f)}" target="_blank" rel="noopener">${escHtml(f.titulo || f.url || f)}</a></div>`
        ).join('');
        sourcesEl.style.display = '';
      } else {
        sourcesEl.style.display = 'none';
      }

      // Botón de fuente externa
      const openBtn = document.getElementById('modalOpenBtn');
      if (doc.url) {
        openBtn.href = doc.url;
        openBtn.style.display = '';
      } else {
        openBtn.style.display = 'none';
      }

      // Scroll hint
      document.getElementById('modalScrollHint').style.display = doc.contenido ? '' : 'none';

      // Scroll al top del body del modal
      document.getElementById('modalBody').scrollTop = 0;

      // Abrir overlay
      document.getElementById('modalOverlay').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
      document.body.style.overflow = '';
    }

    // ── EVENTOS ──────────────────────────────────────────────────────────────
    document.getElementById('loginBtn').addEventListener('click', handleLogin);
    document.getElementById('passwordInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('logoutBtn').addEventListener('click', () => {
      setAuthenticated(false);
      showLogin();
    });

    // Cerrar modal
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    // ── ARRANQUE ─────────────────────────────────────────────────────────────
    if (isAuthenticated()) showPortal();
  </script>
</body>
</html>
