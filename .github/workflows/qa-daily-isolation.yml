name: QA Diario — Aislamiento por Empresa

on:
  schedule:
    # Todos los días a las 6am México (12:00 UTC)
    - cron: '0 12 * * *'
  workflow_dispatch:

env:
  SB: https://hodrfonbpmqulkyzrzpq.supabase.co
  PORTAL: https://metatronixleads.tech

jobs:
  isolation-check:
    name: 🔒 Aislamiento de Datos por Empresa
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Verificar aislamiento completo entre empresas
        env:
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANON: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os, sys
          from datetime import datetime

          SB   = os.environ['SB']
          SK   = os.environ.get('SK', '')
          ANON_KEY = os.environ.get('ANON', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvZHJmb25icG1xdWxreXpyenBxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTQ5NTUsImV4cCI6MjA5MTQ5MDk1NX0._M-_8jazg7q6Lt9F0Ia4MNWeCO4Q83zAqKsnpCIenFY')
          H_SK = {'apikey': SK, 'Authorization': f'Bearer {SK}', 'Content-Type': 'application/json'}

          failures = []
          warnings = []

          def api_sk(path):
              url = SB + path
              req = urllib.request.Request(url, headers=H_SK)
              try:
                  resp = urllib.request.urlopen(req, timeout=10)
                  raw = resp.read()
                  return json.loads(raw) if raw else []
              except Exception as e:
                  return []

          def check(label, data, company_ids, expected_company):
              """Verifica que todos los registros pertenecen a expected_company."""
              if not isinstance(data, list):
                  return
              cross = [r for r in data if r.get('company_id') and r['company_id'] not in company_ids]
              if cross:
                  failures.append(f'CRUCE [{label}]: {len(cross)} registros con company_id incorrecto')
              else:
                  print(f'  ✅ {label:50} {len(data)} registros OK')

          print(f'\n{"="*60}')
          print(f'  MTX QA DIARIO — Aislamiento de Empresas')
          print(f'  {datetime.now().strftime("%Y-%m-%d %H:%M:%S")}')
          print(f'{"="*60}\n')

          # ── 1. Obtener todas las empresas ──────────────────────────
          companies = api_sk('/rest/v1/companies?select=id,name,slug&order=name')
          if not companies:
              print('⚠ No se pudieron obtener empresas (SK puede no estar configurada)')
              print('  Usando empresas hardcoded para verificación básica')
              companies = [
                  {'id': 'c0000000-0000-0000-0000-000000000001', 'name': 'MetaTronix', 'slug': 'metatronix'},
                  {'id': 'a0000000-0000-0000-0000-000000000001', 'name': 'IBANOR', 'slug': 'ibanor'},
                  {'id': 'd0000000-0000-0000-0000-000000000001', 'name': 'Nexus Demo', 'slug': 'nexus-demo'},
              ]

          print(f'  Empresas activas: {len(companies)}')
          for c in companies:
              print(f'    [{c["slug"]:20}] {c["id"]} — {c["name"]}')
          print()

          all_company_ids = [c['id'] for c in companies]

          # ── 2. TABLAS CRÍTICAS — verificar todos los registros ─────
          CRITICAL_TABLES = [
              ('leads',                  'Leads CRM'),
              ('metatronix_docs',        'Documentos'),
              ('events',                 'Eventos SNS'),
              ('accounts_receivable',    'Cuentas por cobrar'),
              ('integrations_log',       'Integraciones log'),
          ]

          print('  ── Tablas críticas ──────────────────────────────────')
          for table, label in CRITICAL_TABLES:
              data = api_sk(f'/rest/v1/{table}?select=id,company_id&limit=1000')
              if not isinstance(data, list):
                  warnings.append(f'No se pudo verificar tabla: {table}')
                  print(f'  ⚠ {label:50} tabla no accesible')
                  continue

              # Verificar que todos los registros tienen company_id válido
              no_company = [r for r in data if not r.get('company_id')]
              unknown_company = [r for r in data if r.get('company_id') and r['company_id'] not in all_company_ids]

              if unknown_company:
                  failures.append(f'CRÍTICO [{label}]: {len(unknown_company)} registros con company_id DESCONOCIDO — posible huérfano o cruce')
                  print(f'  ❌ {label:50} {len(unknown_company)} registros con company_id inválido')
              elif no_company and table in ('leads', 'metatronix_docs', 'events'):
                  warnings.append(f'WARNING [{label}]: {len(no_company)} registros sin company_id')
                  print(f'  ⚠ {label:50} {len(no_company)} sin company_id (asignar a empresa)')
              else:
                  print(f'  ✅ {label:50} {len(data)} registros, todos company_id válidos')

          print()

          # ── 3. Verificar CRUCE por empresa — cada empresa ve solo lo suyo ─
          print('  ── Cruce entre empresas (por par) ──────────────────')
          tables_to_cross_check = ['leads', 'metatronix_docs', 'events']

          for table in tables_to_cross_check:
              data = api_sk(f'/rest/v1/{table}?select=id,company_id&limit=5000')
              if not isinstance(data, list) or len(data) == 0:
                  continue

              # Agrupar por company_id
              by_company = {}
              for r in data:
                  cid = r.get('company_id', 'NULL')
                  by_company.setdefault(cid, 0)
                  by_company[cid] += 1

              total = len(data)
              label_map = {c['id']: c['slug'] for c in companies}
              parts = [f'{label_map.get(cid, cid[:8]+"...")}:{count}' for cid, count in sorted(by_company.items(), key=lambda x: -x[1])]
              print(f'  ✅ {table:20} {total:4} regs → {" | ".join(parts[:5])}')

          print()

          # ── 4. Verificar user_companies — cada user tiene empresa válida ─
          print('  ── Membresías user_companies ──────────────────────')
          uc_data = api_sk('/rest/v1/user_companies?select=user_id,company_id,role&limit=500')
          if isinstance(uc_data, list):
              invalid_uc = [r for r in uc_data if r.get('company_id') and r['company_id'] not in all_company_ids]
              if invalid_uc:
                  failures.append(f'user_companies: {len(invalid_uc)} membresías con company_id inválido')
                  print(f'  ❌ {len(invalid_uc)} membresías con company_id desconocido')
              else:
                  # Distribución por empresa
                  uc_by_co = {}
                  for r in uc_data:
                      cid = r.get('company_id', 'NULL')
                      uc_by_co.setdefault(cid, 0)
                      uc_by_co[cid] += 1
                  label_map = {c['id']: c['slug'] for c in companies}
                  parts = [f'{label_map.get(cid, cid[:8]+"...")}:{count}' for cid, count in sorted(uc_by_co.items(), key=lambda x: -x[1])]
                  print(f'  ✅ {len(uc_data)} membresías válidas → {" | ".join(parts)}')
          print()

          # ── 5. Portal accesible ────────────────────────────────────
          print('  ── Portal & infraestructura ─────────────────────')
          import urllib.request as req2
          try:
              resp = req2.urlopen('https://metatronixleads.tech', timeout=10)
              print(f'  ✅ Portal HTTP {resp.status}')
          except Exception as e:
              warnings.append(f'Portal inaccesible: {e}')
              print(f'  ⚠ Portal: {e}')

          # ── RESULTADO FINAL ────────────────────────────────────────
          print(f'\n{"="*60}')
          if failures:
              print(f'  ❌ RESULTADO: FALLOS CRÍTICOS DETECTADOS')
              print(f'{"="*60}')
              for f in failures:
                  print(f'  ✗ {f}')
              sys.exit(1)
          elif warnings:
              print(f'  ⚠  RESULTADO: OK con advertencias')
              print(f'{"="*60}')
              for w in warnings:
                  print(f'  ⚠ {w}')
              sys.exit(0)
          else:
              print(f'  ✅ RESULTADO: AISLAMIENTO COMPLETO — 0 CRUCES')
              print(f'  Empresas verificadas: {len(companies)}')
              print(f'{"="*60}')
              sys.exit(0)
          PYEOF

      - name: Abrir Issue si hay cruce de datos
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'data-isolation,critical',
              state: 'open'
            });

            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 CRUCE DE DATOS entre empresas detectado — ${date}`,
                body: `## Aislamiento de Empresas — FALLO CRÍTICO\n\n**Fecha:** ${date}\n**Run:** [Ver detalles](${runUrl})\n\n### Severidad: BLOCKER\nSe detectó un cruce de datos entre empresas. Un usuario de una empresa podría estar viendo datos de otra.\n\n### Acciones inmediatas requeridas\n- [ ] Revisar el log completo del run\n- [ ] Identificar qué tabla y qué company_id está cruzado\n- [ ] Aplicar fix en Supabase (ALTER TABLE + UPDATE company_id)\n- [ ] Re-correr este workflow para confirmar fix\n- [ ] No agregar nuevas empresas hasta resolver\n\n> ⚠️ Con 50 empresas activas, un cruce no detectado a tiempo puede exponer datos confidenciales de múltiples clientes.\n\n---\n*Abierto automáticamente por qa-daily-isolation.yml*`,
                labels: ['data-isolation', 'critical', 'automated']
              });
            }

      - name: Summary en GitHub Actions
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🔒 QA Diario — Aislamiento de Empresas

          | Check | Estado |
          |-------|--------|
          | Todas las tablas críticas | ${{ job.status == 'success' && '✅ Sin cruces' || '❌ Cruces detectados' }} |
          | user_companies válidos | ${{ job.status == 'success' && '✅ OK' || '⚠️ Revisar' }} |
          | Portal accesible | ${{ job.status == 'success' && '✅ OK' || '⚠️ Revisar' }} |

          **Escalabilidad:** Este check funciona para N empresas — agrega una empresa nueva y se verifica automáticamente.
          EOF
