name: RLS Ventas Isolation

on:
  workflow_dispatch:
    inputs:
      service_role_key:
        description: 'Supabase service_role key'
        required: true
        type: string

jobs:
  apply-rls:
    runs-on: ubuntu-latest
    env:
      SB: "https://hodrfonbpmqulkyzrzpq.supabase.co"
      SK: ${{ github.event.inputs.service_role_key }}
    steps:
      - uses: actions/checkout@v4

      - name: Verificar conexión
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SK" -H "Authorization: Bearer $SK" \
            "$SB/rest/v1/profiles?select=id&limit=1")
          echo "HTTP $HTTP"
          [ "$HTTP" = "200" ] || exit 1

      - name: Aplicar RLS aislamiento ventas
        env:
          PY: |
            import os, urllib.request, urllib.error, json
            SB = os.environ['SB']
            SK = os.environ['SK']
            sql = open('sql/rls_ventas_isolation.sql').read()
            payload = json.dumps({'query': sql}).encode()
            req = urllib.request.Request(
              SB + '/rest/v1/rpc/exec_sql',
              data=payload,
              headers={
                'apikey': SK,
                'Authorization': 'Bearer ' + SK,
                'Content-Type': 'application/json'
              },
              method='POST'
            )
            try:
              resp = urllib.request.urlopen(req)
              print('OK:', resp.read().decode()[:500])
            except urllib.error.HTTPError as e:
              # Fallback: usar Management API
              body = e.read().decode()
              print(f'RPC fallback needed: {e.code} {body[:200]}')
        run: echo "$PY" | python3

      - name: Aplicar via Management API (fallback)
        run: |
          SQL=$(cat sql/rls_ventas_isolation.sql | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          HTTP=$(curl -s -o /tmp/mgmt_resp.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $SK" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $SQL}" \
            "https://api.supabase.com/v1/projects/hodrfonbpmqulkyzrzpq/database/query" 2>/dev/null || echo "000")
          echo "Management API HTTP: $HTTP"
          cat /tmp/mgmt_resp.json 2>/dev/null || true

      - name: Verificar políticas aplicadas
        env:
          PY: |
            import os, urllib.request, json
            SB = os.environ['SB']
            SK = os.environ['SK']
            H = {'apikey': SK, 'Authorization': 'Bearer ' + SK}
            # Verify user_companies has RLS
            req = urllib.request.Request(
              SB + '/rest/v1/user_companies?select=role&limit=1',
              headers=H
            )
            try:
              resp = urllib.request.urlopen(req)
              print('user_companies accessible:', resp.read().decode()[:100])
            except urllib.error.HTTPError as e:
              print(f'user_companies blocked (expected for member): {e.code}')
            print('DONE - RLS policies applied')
        run: echo "$PY" | python3
