name: Clean MetaTronix Pipeline

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Escribe "limpiar" para confirmar borrado de datos demo MetaTronix'
        required: true

jobs:
  clean:
    if: ${{ github.event.inputs.confirm == 'limpiar' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete MetaTronix demo pipeline via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          SQL=$(cat sql/clean_metatronix_pipeline.sql)
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/hodrfonbpmqulkyzrzpq/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(echo "$SQL" | jq -Rs .)}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "HTTP: $HTTP_CODE"
          echo "$BODY"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then exit 1; fi
