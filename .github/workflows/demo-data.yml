name: Demo Data → Supabase

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Escribe "demo" para confirmar'
        required: true

jobs:
  seed:
    if: ${{ github.event.inputs.confirm == 'demo' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run demo_data.sql via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          SQL=$(cat sql/demo_data.sql)
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(echo "$SQL" | jq -Rs .)}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "HTTP: $HTTP_CODE"
          echo "$BODY"
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi
