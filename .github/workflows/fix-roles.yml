name: Fix Roles — Configuración completa de usuarios

on:
  workflow_dispatch:

jobs:
  fix-roles:
    name: Roles + empresas + supervisores
    runs-on: ubuntu-latest
    env:
      SB: "https://hodrfonbpmqulkyzrzpq.supabase.co"
      SK: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: "Verificar conexión"
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SK" -H "Authorization: Bearer $SK" \
            "$SB/rest/v1/profiles?select=id&limit=1")
          [ "$HTTP" = "200" ] && echo "✅ Conexión OK" || { echo "❌ Falla HTTP $HTTP"; exit 1; }

      - name: "Aplicar configuración completa"
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os

          SB = os.environ['SB']
          SK = os.environ['SK']
          H  = {'apikey': SK, 'Authorization': f'Bearer {SK}', 'Content-Type': 'application/json'}

          def api(method, path, body=None, prefer=None):
              url  = SB + path
              data = json.dumps(body).encode() if body else None
              hdrs = {**H}
              if prefer: hdrs['Prefer'] = prefer
              req  = urllib.request.Request(url, data=data, headers=hdrs, method=method)
              try:
                  resp = urllib.request.urlopen(req)
                  raw  = resp.read()
                  return (json.loads(raw) if raw else {}), resp.status
              except urllib.error.HTTPError as e:
                  err = e.read().decode()
                  return (json.loads(err) if err else {}), e.code

          # ── 1. Obtener IDs de empresas por slug ───────────────────
          print('\n── Empresas disponibles ──')
          cos, _ = api('GET', '/rest/v1/companies?select=id,name,slug')
          co_map = {c['slug']: c['id'] for c in (cos if isinstance(cos, list) else [])}
          for slug, cid in co_map.items():
              print(f'  {slug:20} {cid}')

          if not co_map:
              print('❌ No se encontraron empresas. Abortando.')
              exit(1)

          MTX   = co_map.get('metatronix')
          IBANOR= co_map.get('ibanor')
          # nexus es la empresa demo — buscar por múltiples slugs posibles
          DEMO  = (co_map.get('nexus') or co_map.get('demo') or
                   co_map.get('nexus-demo') or co_map.get('nexusdemo') or
                   # Si ningún slug coincide, buscar por nombre que contenga nexus o demo
                   next((v for k,v in co_map.items() if 'nexus' in k.lower() or 'demo' in k.lower()), None))

          print(f'\n  metatronix → {MTX}')
          print(f'  ibanor     → {IBANOR}')
          print(f'  nexus/demo → {DEMO}')

          # ── 2. Configuración por usuario ──────────────────────────
          # companies: lista de (slug, uc_role) a asignar en user_companies
          USERS = {
              'acanales@ibanormexico.com': {
                  'role': 'super_admin',
                  'primary': MTX,
                  'companies': [
                      (MTX,    'owner'),
                      (DEMO,   'owner'),
                      (IBANOR, 'owner'),
                  ],
              },
              'ncanales@ibanormexico.com': {
                  'role': 'super_admin',
                  'primary': MTX,
                  'companies': [
                      (MTX,  'owner'),
                      (DEMO, 'owner'),
                  ],
              },
              'nibarra@ibanormexico.com': {
                  'role': 'admin',
                  'primary': IBANOR,  # empresa primaria = IBANOR
                  'companies': [
                      (IBANOR, 'admin'),
                      (MTX,    'admin'),
                  ],
              },
              'acanalesf@ibanormexico.com': {
                  'role': 'admin',          # admin en IBANOR (empresa primaria)
                  'primary': IBANOR,        # empresa activa al login = IBANOR
                  'companies': [
                      (IBANOR, 'admin'),           # IBANOR: administrador completo
                      (MTX,    'admin_restringido'), # MetaTronix: solo archivos/admin
                      (DEMO,   'member'),            # Nexus-Demo: acceso básico
                  ],
              },
              'clopez@ibanormexico.com': {
                  'role': 'admin_restringido',
                  'primary': MTX,
                  'companies': [
                      (MTX,  'member'),
                      (DEMO, 'member'),
                  ],
              },
              'jorge@retaillab.com.mx': {
                  'role': 'admin_restringido',
                  'primary': MTX,
                  'companies': [
                      (MTX,  'member'),
                      (DEMO, 'member'),
                  ],
              },
              'noe@grupoamsg.com': {
                  'role': 'admin_restringido',
                  'primary': MTX,
                  'companies': [
                      (MTX,  'member'),
                      (DEMO, 'member'),
                  ],
              },
              'rsuarez@ibanormexico.com': {
                  'role': 'admin_restringido',
                  'primary': MTX,
                  'companies': [
                      (MTX,  'member'),
                      (DEMO, 'member'),
                  ],
              },
              'frida@retaillab.com.mx': {
                  'role': 'user',
                  'primary': MTX,
                  'companies': [(MTX, 'member')],
                  'supervisor': 'jorge@retaillab.com.mx',
              },
              'aamaya@todoretail.com': {
                  'role': 'user',
                  'primary': MTX,
                  'companies': [(MTX, 'member')],
                  'supervisor': 'jorge@retaillab.com.mx',
              },
          }

          # ── 3. Obtener UUIDs de todos los usuarios ────────────────
          print('\n── Obteniendo UUIDs ──')
          uid_map = {}
          for email in USERS:
              enc = email.replace('@','%40').replace('.','%2E')
              d, _ = api('GET', f'/rest/v1/profiles?email=eq.{enc}&select=id,email')
              if isinstance(d, list) and d:
                  uid_map[email] = d[0]['id']
                  print(f'  ✅ {email:45} {d[0]["id"]}')
              else:
                  print(f'  ⚠ {email:45} no encontrado en profiles')

          # ── 4. Aplicar roles y empresa primaria ───────────────────
          print('\n── Aplicando roles ──')
          for email, cfg in USERS.items():
              uid = uid_map.get(email)
              if not uid:
                  print(f'  SKIP {email} (sin UID)')
                  continue

              patch = {'role': cfg['role'], 'is_active': True}
              if cfg.get('primary'):
                  patch['company_id'] = cfg['primary']
              if cfg.get('supervisor'):
                  sup_uid = uid_map.get(cfg['supervisor'])
                  if sup_uid:
                      patch['supervisor_id'] = sup_uid

              enc = email.replace('@','%40').replace('.','%2E')
              _, code = api('PATCH', f'/rest/v1/profiles?email=eq.{enc}', patch,
                            prefer='return=minimal')
              print(f'  {email:45} → {cfg["role"]:20} HTTP {code}')

          # ── 5. Upsert membresías user_companies ───────────────────
          print('\n── Aplicando membresías ──')
          for email, cfg in USERS.items():
              uid = uid_map.get(email)
              if not uid: continue
              for co_id, uc_role in cfg['companies']:
                  if not co_id:
                      print(f'  SKIP {email} — empresa no encontrada')
                      continue
                  body = {'user_id': uid, 'company_id': co_id, 'role': uc_role}
                  _, code = api('POST', '/rest/v1/user_companies', body,
                                prefer='resolution=merge-duplicates,return=minimal')
                  slug = [s for s,i in co_map.items() if i==co_id]
                  print(f'  {email:45} + {(slug[0] if slug else co_id):12} ({uc_role}) HTTP {code}')

          print('\n✅ Configuración completada')
          PYEOF

      - name: "Estado final"
        run: |
          echo "=== PROFILES ==="
          curl -s -H "apikey: $SK" -H "Authorization: Bearer $SK" \
            "$SB/rest/v1/profiles?select=email,role,company_id,is_active&order=email" | \
            python3 -c "
          import json,sys
          for u in json.load(sys.stdin):
              print(f'  {u.get(\"email\",\"?\"):45} | {u.get(\"role\",\"?\"):20} | {u.get(\"company_id\",\"?\") or \"NULL\":12} | activo:{u.get(\"is_active\")}')
          " 2>/dev/null

          echo ""
          echo "=== USER_COMPANIES ==="
          curl -s -H "apikey: $SK" -H "Authorization: Bearer $SK" \
            "$SB/rest/v1/user_companies?select=user_id,company_id,role" | \
            python3 -c "
          import json,sys; rows=json.load(sys.stdin); print(f'  Total membresías: {len(rows)}')
          " 2>/dev/null
