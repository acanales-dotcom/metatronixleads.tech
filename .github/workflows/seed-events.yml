      - name: "Agregar membresías nexus + verificar totales"
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os

          SB = os.environ['SB']
          SK = os.environ['SK']
          H  = {'apikey': SK, 'Authorization': f'Bearer {SK}', 'Content-Type': 'application/json'}

          def get_uid(email):
              url = f'{SB}/auth/v1/admin/users?email={email}&email_filter=exact'
              req = urllib.request.Request(url, headers=H, method='GET')
              try:
                  d = json.loads(urllib.request.urlopen(req).read())
                  for u in d.get('users', []):
                      if u.get('email','').lower() == email.lower():
                          return u['id']
              except: pass
              return None

          # Detectar demo_id
          req0 = urllib.request.Request(SB+'/rest/v1/companies?select=id,slug',
              headers={'apikey': SK, 'Authorization': f'Bearer {SK}'}, method='GET')
          companies = json.loads(urllib.request.urlopen(req0).read())
          demo_id = next((c['id'] for c in companies if c.get('slug') in ('nexus','demo') or c.get('id') in ('nexus','demo')), 'nexus')

          # Usuarios con acceso a nexus
          nexus_users = [
              ('acanales@ibanormexico.com', 'owner'),
              ('ncanales@ibanormexico.com', 'owner'),
              ('nibarra@ibanormexico.com',  'admin'),
              ('acanalesf@ibanormexico.com','admin'),
              ('jorge@retaillab.com.mx',   'member'),
              ('noe@grupoamsg.com',         'member'),
              ('rsuarez@ibanormexico.com',  'member'),
              ('frida@retaillab.com.mx',   'member'),
              ('aamaya@todoretail.com',     'member'),
          ]

          print(f'\n── Membresías nexus ({demo_id}) ──')
          H2 = {**H, 'Prefer': 'resolution=merge-duplicates,return=minimal'}
          for email, role in nexus_users:
              uid = get_uid(email)
              if not uid: print(f'  SKIP {email}'); continue
              body = json.dumps({'user_id': uid, 'company_id': demo_id, 'role': role}).encode()
              req2 = urllib.request.Request(SB+'/rest/v1/user_companies', data=body, headers=H2, method='POST')
              try:
                  resp = urllib.request.urlopen(req2)
                  print(f'  ✅ {email:45} → {demo_id} ({role})')
              except urllib.error.HTTPError as e:
                  print(f'  ❌ {email}: {e.code}')

          # Resumen final
          print('\n── Totales de eventos por empresa ──')
          for co in ['metatronix', 'ibanor', demo_id]:
              req3 = urllib.request.Request(
                  f'{SB}/rest/v1/events?select=id&company_id=eq.{co}',
                  headers={'apikey': SK, 'Authorization': f'Bearer {SK}'}, method='GET')
              try:
                  data = json.loads(urllib.request.urlopen(req3).read())
                  print(f'  {co:15} → {len(data)} eventos')
              except Exception as ex:
                  print(f'  {co:15} → error: {ex}')
          PYEOF
