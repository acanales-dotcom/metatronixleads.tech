                'Prefer': 'resolution=ignore-duplicates,return=minimal'}

          events_mtx = [
            {'event_type':'lead.won',           'module':'ventas',    'company_id':'metatronix','payload':{'name':'Inmobiliaria Premier','deal_value':95000},'revenue_impact':95000,'severity':'ok'},
            {'event_type':'invoice.overdue_30',  'module':'finanzas',  'company_id':'metatronix','payload':{'client':'Retail Global MX','days_overdue':32},'revenue_impact':78000,'severity':'warn'},
            {'event_type':'payment.received',    'module':'finanzas',  'company_id':'metatronix','payload':{'client':'Grupo Construmax','amount':45000},'revenue_impact':45000,'severity':'ok'},
            {'event_type':'lead.stalled',        'module':'ventas',    'company_id':'metatronix','payload':{'name':'TechMex Solutions','days_stalled':7},'revenue_impact':120000,'severity':'warn'},
            {'event_type':'campaign.launched',   'module':'marketing', 'company_id':'metatronix','payload':{'campaign':'Q2 LinkedIn MetaTronix'},'revenue_impact':None,'severity':'info'},
            {'event_type':'lead.won',            'module':'ventas',    'company_id':'metatronix','payload':{'name':'LogiSur SA','deal_value':62000},'revenue_impact':62000,'severity':'ok'},
            {'event_type':'feedback.submitted',  'module':'feedback',  'company_id':'metatronix','payload':{'title':'Dashboard ejecutivo móvil','type':'feature'},'revenue_impact':None,'severity':'info'},
            {'event_type':'lead.created',        'module':'ventas',    'company_id':'metatronix','payload':{'name':'Fintech Norte','source':'whatsapp'},'revenue_impact':None,'severity':'info'},
            {'event_type':'budget.alert',        'module':'compras',   'company_id':'metatronix','payload':{'pct_used':82,'month':'Abril'},'revenue_impact':None,'severity':'warn'},
            {'event_type':'collection.started',  'module':'cobranza',  'company_id':'metatronix','payload':{'client':'DataCorp MX','amount':95000,'overdue_days':35},'revenue_impact':95000,'severity':'critical'},
          ]

          body = json.dumps(events_mtx).encode()
          req  = urllib.request.Request(SB+'/rest/v1/events', data=body, headers=H, method='POST')
          try:
              resp = urllib.request.urlopen(req)
              print(f'✅ {len(events_mtx)} eventos METATRONIX — HTTP {resp.status}')
          except urllib.error.HTTPError as e:
              print(f'❌ Error METATRONIX: {e.code} — {e.read().decode()[:200]}')
          PYEOF

      - name: "Insertar eventos para IBANOR"
