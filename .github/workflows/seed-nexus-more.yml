      - name: "Resumen final — todos los datos de Nexus"
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, os

          SB = os.environ['SB']
          SK = os.environ['SK']
          H  = {'apikey': SK, 'Authorization': f'Bearer {SK}'}
          ctx = json.load(open('/tmp/ctx.json'))
          demo_id = ctx['demo_id']

          print(f'\n╔══════════════════════════════════════════════════════╗')
          print(f'  NEXUS ({demo_id}) — Inventario completo de datos')
          print(f'╚══════════════════════════════════════════════════════╝\n')

          checks = [
              ('leads',               f'?company_id=eq.{demo_id}&select=id'),
              ('metatronix_docs',     f'?company_id=eq.{demo_id}&select=id'),
              ('accounts_receivable', f'?company_id=eq.{demo_id}&select=id'),
              ('feature_requests',    f'?company_id=eq.{demo_id}&select=id'),
              ('events',              f'?company_id=eq.{demo_id}&select=id'),
              ('org_pulse',           f'?company_id=eq.{demo_id}&select=id'),
              ('executive_decisions', f'?company_id=eq.{demo_id}&select=id'),
              ('activity_logs',       f'?select=id&limit=1'),
          ]

          for table, qs in checks:
              url = f'{SB}/rest/v1/{table}{qs}'
              try:
                  data = json.loads(urllib.request.urlopen(urllib.request.Request(url, headers=H)).read())
                  icon = '✅' if len(data) > 0 else '⚠️ '
                  print(f'  {icon} {table:25} → {len(data):4} registros')
              except Exception as ex:
                  print(f'  ❌ {table:25} → {str(ex)[:60]}')

          # Pipeline breakdown
          url = f'{SB}/rest/v1/leads?company_id=eq.{demo_id}&select=stage,valor_estimado&limit=100'
          leads = json.loads(urllib.request.urlopen(urllib.request.Request(url, headers=H)).read())
          pipeline = {}
          for l in leads:
              s = l.get('stage','?')
              pipeline[s] = pipeline.get(s, {'count':0,'value':0})
              pipeline[s]['count'] += 1
              pipeline[s]['value'] += float(l.get('valor_estimado') or 0)

          print(f'\n  Pipeline por etapa:')
          total_pipeline = 0
          for s in ['prospecto','calificado','demo','propuesta','negociacion','cierre','postventa','retencion','perdido']:
              if s in pipeline:
                  p = pipeline[s]
                  total_pipeline += p['value'] if s not in ['perdido'] else 0
                  print(f'    {s:20} → {p["count"]:2} leads  ${p["value"]:>12,.0f} MXN')
          print(f'    {"TOTAL PIPELINE":20} → {"":2}      ${total_pipeline:>12,.0f} MXN')
          print(f'\n✅ Nexus lista para demo completa del portal')
          PYEOF
