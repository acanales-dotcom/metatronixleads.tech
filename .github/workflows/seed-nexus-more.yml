name: Seed Nexus — Datos adicionales completos (todos los módulos)

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    env:
      SB: "https://hodrfonbpmqulkyzrzpq.supabase.co"
      SK: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: "Setup — obtener contexto"
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, os

          SB = os.environ['SB']
          SK = os.environ['SK']
          H  = {'apikey': SK, 'Authorization': f'Bearer {SK}'}

          cos = json.loads(urllib.request.urlopen(urllib.request.Request(SB+'/rest/v1/companies?select=id,slug', headers=H)).read())
          demo_id = next((c['id'] for c in cos if c.get('slug') in ('nexus','demo') or c.get('id') in ('nexus','demo')), 'nexus')
          profiles = json.loads(urllib.request.urlopen(urllib.request.Request(SB+'/rest/v1/profiles?select=id,email,full_name,role&limit=20', headers=H)).read())
          # Get existing leads to use their IDs
          leads = json.loads(urllib.request.urlopen(urllib.request.Request(
              f'{SB}/rest/v1/leads?company_id=eq.{demo_id}&select=id,name,stage,user_id&limit=50', headers=H)).read())
          print(f'Demo: {demo_id}, Users: {len(profiles)}, Leads: {len(leads)}')
          with open('/tmp/ctx.json','w') as f:
              json.dump({'demo_id': demo_id, 'profiles': profiles, 'leads': leads}, f)
          PYEOF

      - name: "Org Pulse — métricas ejecutivas diarias"
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os, random
          from datetime import datetime, timedelta

          SB = os.environ['SB']
          SK = os.environ['SK']
          H  = {'apikey': SK, 'Authorization': f'Bearer {SK}', 'Content-Type': 'application/json',
                'Prefer': 'resolution=ignore-duplicates,return=minimal'}
          ctx = json.load(open('/tmp/ctx.json'))
          demo_id = ctx['demo_id']

          # Generar 60 días de org_pulse
          pulsos = []
          base_pipeline = 1_850_000
          base_deals = 18
          for i in range(60, 0, -1):
              fecha = (datetime.now() - timedelta(days=i)).strftime('%Y-%m-%d')
              var = random.uniform(0.95, 1.06)
              pulsos.append({
                  'company_id': demo_id,
                  'fecha': fecha,
                  'pipeline_value': round(base_pipeline * var),
                  'deals_activos': base_deals + random.randint(-2, 3),
                  'deals_ganados_mes': random.randint(2, 5),
                  'deals_perdidos_mes': random.randint(1, 3),
                  'revenue_mes': round(random.uniform(280000, 420000)),
                  'tasa_cierre': round(random.uniform(28, 42), 1),
                  'ciclo_promedio_dias': random.randint(22, 45),
                  'leads_nuevos': random.randint(8, 18),
                  'actividad_equipo': round(random.uniform(70, 95), 1),
                  'created_at': (datetime.now() - timedelta(days=i)).isoformat()
              })
              base_pipeline = round(base_pipeline * random.uniform(0.98, 1.03))

          # Insertar en lotes de 20
          for i in range(0, len(pulsos), 20):
              batch = pulsos[i:i+20]
              body = json.dumps(batch).encode()
              req = urllib.request.Request(SB+'/rest/v1/org_pulse', data=body, headers=H, method='POST')
              try:
                  resp = urllib.request.urlopen(req)
                  print(f'  Lote {i//20+1}: {len(batch)} pulsos — HTTP {resp.status}')
              except urllib.error.HTTPError as e:
                  print(f'  Error lote {i//20+1}: {e.code} — {e.read().decode()[:200]}')
          print(f'✅ {len(pulsos)} días de org_pulse insertados')
          PYEOF

      - name: "Activity Logs — historial de actividad del equipo"
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os, random
          from datetime import datetime, timedelta

          SB = os.environ['SB']
          SK = os.environ['SK']
          H  = {'apikey': SK, 'Authorization': f'Bearer {SK}', 'Content-Type': 'application/json',
                'Prefer': 'resolution=ignore-duplicates,return=minimal'}
          ctx = json.load(open('/tmp/ctx.json'))
          demo_id = ctx['demo_id']
          profiles = ctx['profiles']
          leads = ctx['leads']
          uids = [p['id'] for p in profiles] or [None]

          actions = [
              ('lead_created', 'lead'),('lead_updated', 'lead'),('lead_won', 'lead'),
              ('document_uploaded', 'document'),('document_downloaded', 'document'),
              ('invoice_created', 'invoice'),('payment_received', 'invoice'),
              ('login', 'user'),('campaign_launched', 'campaign'),
              ('proposal_sent', 'lead'),('call_logged', 'lead'),('email_sent', 'lead'),
          ]

          logs = []
          lead_ids = [l['id'] for l in leads] if leads else [None]
          for i in range(200):
              action, entity_type = random.choice(actions)
              uid = uids[i % len(uids)]
              days_back = random.randint(0, 30)
              logs.append({
                  'user_id': uid,
                  'action': action,
                  'entity_type': entity_type,
                  'entity_id': random.choice(lead_ids) if entity_type == 'lead' and lead_ids[0] else None,
                  'metadata': {'company_id': demo_id, 'source': 'nexus_portal'},
                  'created_at': (datetime.now() - timedelta(days=days_back, hours=random.randint(0,23))).isoformat()
              })

          for i in range(0, len(logs), 50):
              batch = logs[i:i+50]
              body = json.dumps(batch).encode()
              req = urllib.request.Request(SB+'/rest/v1/activity_logs', data=body, headers=H, method='POST')
              try:
                  resp = urllib.request.urlopen(req)
                  print(f'  Lote {i//50+1}: {len(batch)} logs — HTTP {resp.status}')
              except urllib.error.HTTPError as e:
                  print(f'  Error: {e.code} — {e.read().decode()[:150]}')
          print(f'✅ {len(logs)} activity logs insertados')
          PYEOF

