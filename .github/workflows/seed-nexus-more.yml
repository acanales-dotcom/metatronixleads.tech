name: Seed Nexus — Datos adicionales completos (todos los módulos)

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    env:
      SB: "https://hodrfonbpmqulkyzrzpq.supabase.co"
      SK: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: "Setup — contexto nexus"
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, os

          SB = os.environ['SB']
          SK = os.environ['SK']
          H  = {'apikey': SK, 'Authorization': f'Bearer {SK}'}

          def safe_get(url):
              try:
                  return json.loads(urllib.request.urlopen(urllib.request.Request(url, headers=H)).read())
              except Exception as ex:
                  print(f'  WARN {url.split("?")[0].split("/")[-1]}: {ex}')
                  return []

          cos      = safe_get(SB+'/rest/v1/companies?select=id,slug,name')
          demo_id  = next((c['id'] for c in cos if c.get('slug') in ('nexus','demo') or c.get('id') in ('nexus','demo')), 'nexus')
          profiles = safe_get(SB+'/rest/v1/profiles?select=id,email,full_name,role&limit=20')
          leads    = safe_get(f'{SB}/rest/v1/leads?company_id=eq.{demo_id}&select=id,name,stage&limit=50')

          print(f'Demo: {demo_id}  |  Perfiles: {len(profiles)}  |  Leads existentes: {len(leads)}')
          with open('/tmp/ctx.json','w') as f:
              json.dump({'demo_id': demo_id, 'profiles': profiles, 'leads': leads}, f)
          PYEOF

      - name: "Org Pulse — 60 días de métricas ejecutivas"
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os, random
          from datetime import datetime, timedelta

          SB = os.environ['SB']
          SK = os.environ['SK']
          H  = {'apikey': SK, 'Authorization': f'Bearer {SK}', 'Content-Type': 'application/json',
                'Prefer': 'resolution=ignore-duplicates,return=minimal'}

          # Schema real de org_pulse (sin company_id)
          base_pipeline = 8_500_000
          pulsos = []
          for i in range(60, 0, -1):
              ts = (datetime.now() - timedelta(days=i))
              var = random.uniform(0.96, 1.05)
              base_pipeline = round(base_pipeline * var)
              pulsos.append({
                  'pipeline_total':     base_pipeline,
                  'deals_activos':      random.randint(28, 42),
                  'deals_ganados_mes':  random.randint(3, 8),
                  'deals_en_riesgo':    random.randint(2, 6),
                  'leads_nuevos_7d':    random.randint(5, 15),
                  'conversion_rate':    round(random.uniform(24, 38), 1),
                  'cxc_total':          round(random.uniform(1_200_000, 2_800_000)),
                  'cxc_vencida':        round(random.uniform(185_000, 540_000)),
                  'cxp_total':          round(random.uniform(420_000, 890_000)),
                  'cxp_proximos_30d':   round(random.uniform(120_000, 380_000)),
                  'flujo_neto':         round(random.uniform(380_000, 920_000)),
                  'cobranza_urgente':   random.randint(2, 7),
                  'oc_pendientes':      random.randint(3, 12),
                  'oc_monto_pendiente': round(random.uniform(80_000, 320_000)),
                  'requisiciones_abiertas': random.randint(1, 5),
                  'usuarios_activos':   random.randint(6, 9),
                  'ai_queries_24h':     random.randint(12, 48),
                  'ai_queries_7d':      random.randint(85, 320),
                  'org_health_score':   random.randint(62, 88),
                  'source':             'seed_demo',
                  'created_at':         ts.isoformat(),
              })

          ok = 0
          for i in range(0, len(pulsos), 20):
              batch = pulsos[i:i+20]
              body = json.dumps(batch).encode()
              req = urllib.request.Request(SB+'/rest/v1/org_pulse', data=body, headers=H, method='POST')
              try:
                  resp = urllib.request.urlopen(req)
                  ok += len(batch)
              except urllib.error.HTTPError as e:
                  print(f'  Lote {i//20+1} error: {e.code} — {e.read().decode()[:200]}')
          print(f'✅ {ok}/{len(pulsos)} registros org_pulse insertados')
          PYEOF

      - name: "Activity Logs — 200 registros de actividad"
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os, random
          from datetime import datetime, timedelta

          SB = os.environ['SB']
          SK = os.environ['SK']
          H  = {'apikey': SK, 'Authorization': f'Bearer {SK}', 'Content-Type': 'application/json',
                'Prefer': 'resolution=ignore-duplicates,return=minimal'}
          ctx = json.load(open('/tmp/ctx.json'))
          uids = [p['id'] for p in ctx['profiles']] or [None]
          lead_ids = [l['id'] for l in ctx['leads']] or [None]

          actions = [
              ('lead_created','lead'),('lead_updated','lead'),('lead_won','lead'),('lead_lost','lead'),
              ('document_uploaded','document'),('document_downloaded','document'),('document_deleted','document'),
              ('invoice_created','invoice'),('payment_received','invoice'),('invoice_sent','invoice'),
              ('login','user'),('logout','user'),
              ('campaign_launched','campaign'),('proposal_sent','lead'),
              ('call_logged','lead'),('email_sent','lead'),('whatsapp_sent','lead'),
              ('note_added','lead'),('stage_changed','lead'),('task_created','task'),
          ]

          logs = []
          for i in range(200):
              action, entity_type = random.choice(actions)
              uid = uids[i % len(uids)]
              lead_id = random.choice(lead_ids) if entity_type == 'lead' and lead_ids[0] else None
              days_back = random.randint(0, 30)
              logs.append({
                  'user_id': uid,
                  'action': action,
                  'entity_type': entity_type,
                  'entity_id': str(lead_id) if lead_id else None,
                  'metadata': {'source': 'nexus_portal', 'ip': f'192.168.1.{random.randint(1,50)}'},
                  'created_at': (datetime.now() - timedelta(days=days_back, hours=random.randint(0,23), minutes=random.randint(0,59))).isoformat()
              })

          ok = 0
          for i in range(0, len(logs), 50):
              batch = logs[i:i+50]
              body = json.dumps(batch).encode()
              req = urllib.request.Request(SB+'/rest/v1/activity_logs', data=body, headers=H, method='POST')
              try:
                  resp = urllib.request.urlopen(req)
                  ok += len(batch)
              except urllib.error.HTTPError as e:
                  print(f'  Error lote: {e.code} — {e.read().decode()[:150]}')
          print(f'✅ {ok} activity logs insertados')
          PYEOF

