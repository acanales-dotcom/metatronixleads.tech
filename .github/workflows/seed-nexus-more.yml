          print(f'\n╔═══════════════════════════════════════════════════╗')
          print(f'  NEXUS ({demo_id}) — Inventario completo')
          print(f'╚═══════════════════════════════════════════════════╝')
          print(f'  leads               → {count("leads", f"&company_id=eq.{demo_id}")}')
          print(f'  metatronix_docs     → {count("metatronix_docs", f"&company_id=eq.{demo_id}")}')
          print(f'  accounts_receivable → {count("accounts_receivable", f"&company_id=eq.{demo_id}")}')
          print(f'  feature_requests    → {count("feature_requests", f"&company_id=eq.{demo_id}")}')
          print(f'  events              → {count("events", f"&company_id=eq.{demo_id}")}')
          print(f'  org_pulse           → {count("org_pulse")}')
          print(f'  executive_decisions → {count("executive_decisions", f"&company_id=eq.{demo_id}")}')
          print(f'  activity_logs       → {count("activity_logs")} (global)')

          # Pipeline breakdown
          url = f'{SB}/rest/v1/leads?company_id=eq.{demo_id}&select=stage,valor_estimado&limit=100'
          leads_data = json.loads(urllib.request.urlopen(urllib.request.Request(url, headers=H)).read())
          pipeline_val = sum(float(l.get('valor_estimado') or 0) for l in leads_data if l.get('stage') not in ['perdido','cerrado_perdido'])
          by_stage = {}
          for l in leads_data: by_stage[l.get('stage','?')] = by_stage.get(l.get('stage','?'),0)+1
          print(f'\n  Pipeline total activo: ${pipeline_val:,.0f} MXN')
          print(f'  Distribución:')
          for s in ['prospecto','calificado','demo','propuesta','negociacion','cierre','postventa','retencion','perdido']:
              if s in by_stage: print(f'    {s:20} → {by_stage[s]}')
          print(f'\n✅ Nexus lista para demo completa del portal')
          PYEOF
