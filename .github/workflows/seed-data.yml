# ─────────────────────────────────────────────────────────────────────────────
# seed-data.yml
# Inserta seed data en las tablas de Supabase vía Management API.
# REQUIERE: secret SUPABASE_ACCESS_TOKEN en GitHub repository settings.
# Trigger: push a este archivo (auto-ejecución única) o workflow_dispatch.
# ─────────────────────────────────────────────────────────────────────────────
name: Seed Data → Supabase

on:
  push:
    paths:
      - '.github/workflows/seed-data.yml'
  workflow_dispatch:

jobs:
  seed:
    name: Insertar seed data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Insertar seed data via Supabase Management API
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Insertando seed data en Supabase..."
          echo "  Proyecto: hodrfonbpmqulkyzrzpq"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Leer SQL del archivo y escaparlo para JSON
          SQL=$(cat assets/seed_data.sql | python3 -c "
          import sys, json
          sql = sys.stdin.read()
          print(json.dumps(sql))
          ")

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            "https://api.supabase.com/v1/projects/hodrfonbpmqulkyzrzpq/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $SQL}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "✅ Seed data insertado correctamente."
          else
            echo "❌ Error: HTTP $HTTP_CODE"
            echo "   Body: $BODY"
            exit 1
          fi

      - name: Verificar datos insertados
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Verificando tablas..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvZHJmb25icG1xdWxreXpyenBxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTQ5NTUsImV4cCI6MjA5MTQ5MDk1NX0._M-_8jazg7q6Lt9F0Ia4MNWeCO4Q83zAqKsnpCIenFY"
          BASE="https://hodrfonbpmqulkyzrzpq.supabase.co/rest/v1"

          for TABLE in suppliers requisitions invoices_out invoices_in; do
            COUNT=$(curl -s \
              -H "apikey: $ANON_KEY" \
              -H "Authorization: Bearer $ANON_KEY" \
              -H "Prefer: count=exact" \
              -o /dev/null -w "%{response_code}" \
              "$BASE/$TABLE?company_id=eq.a0000000-0000-0000-0000-000000000001&select=id&limit=0")
            echo "  $TABLE → HTTP $COUNT"
          done

          echo "✅ Verificación completa. Ver portal en https://metatronixleads.tech"
