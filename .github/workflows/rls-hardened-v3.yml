name: RLS Hardened v3 — Aislamiento absoluto

on:
  workflow_dispatch:

jobs:
  harden:
    name: Aplicar RLS hardened v3
    runs-on: ubuntu-latest
    env:
      SB_URL: "https://api.supabase.com/v1/projects/hodrfonbpmqulkyzrzpq/database/query"
      SB_TOKEN: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Aplicar RLS hardened v3
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.error, json, sys, os, time

          TOKEN = os.environ["SB_TOKEN"]
          URL   = os.environ["SB_URL"]

          def run_sql(label, sql):
              data = json.dumps({"query": sql}).encode()
              req  = urllib.request.Request(URL, data=data, method="POST",
                       headers={"Content-Type":"application/json",
                                "Authorization": f"Bearer {TOKEN}"})
              try:
                  resp = urllib.request.urlopen(req, timeout=30)
                  result = json.loads(resp.read())
                  print(f"  ✅ {label}")
                  return True
              except urllib.error.HTTPError as e:
                  body = e.read().decode()
                  print(f"  ❌ {label}: {e.code} — {body[:200]}")
                  return False

          # Leer el SQL del archivo
          with open("sql/rls_hardened_v3.sql", "r") as f:
              full_sql = f.read()

          # Ejecutar en bloques separados por puntos críticos
          blocks = [
              ("Helper functions", """
                CREATE OR REPLACE FUNCTION get_my_role()
                RETURNS TEXT LANGUAGE sql STABLE SECURITY DEFINER SET search_path = public AS $$
                  SELECT role FROM profiles WHERE id = auth.uid();
                $$;
                CREATE OR REPLACE FUNCTION get_my_company_id()
                RETURNS UUID LANGUAGE sql STABLE SECURITY DEFINER SET search_path = public AS $$
                  SELECT company_id FROM profiles WHERE id = auth.uid();
                $$;
                CREATE OR REPLACE FUNCTION get_my_team_member_ids()
                RETURNS SETOF UUID LANGUAGE sql STABLE SECURITY DEFINER SET search_path = public AS $$
                  SELECT id FROM profiles WHERE supervisor_id = auth.uid()
                  UNION ALL SELECT auth.uid();
                $$;
                CREATE OR REPLACE FUNCTION user_has_company_access(cid UUID)
                RETURNS BOOLEAN LANGUAGE sql STABLE SECURITY DEFINER SET search_path = public AS $$
                  SELECT EXISTS (SELECT 1 FROM user_companies WHERE user_id = auth.uid() AND company_id = cid);
                $$;
                CREATE OR REPLACE FUNCTION can_view_profile(target_uid uuid)
                RETURNS boolean LANGUAGE sql STABLE SECURITY DEFINER SET search_path = public AS $$
                  SELECT target_uid = auth.uid()
                  OR EXISTS (
                    SELECT 1 FROM user_companies my_uc
                    JOIN user_companies target_uc ON my_uc.company_id = target_uc.company_id
                    WHERE my_uc.user_id = auth.uid()
                      AND my_uc.role IN ('owner','admin','admin_restringido')
                      AND target_uc.user_id = target_uid
                  );
                $$;
                CREATE OR REPLACE FUNCTION get_my_admin_company_ids()
                RETURNS SETOF uuid LANGUAGE sql STABLE SECURITY DEFINER SET search_path = public AS $$
                  SELECT company_id FROM user_companies WHERE user_id = auth.uid() AND role IN ('owner','admin');
                $$;
              """),
              ("Tabla teams + columna team_id", """
                CREATE TABLE IF NOT EXISTS teams (
                  id             UUID DEFAULT gen_random_uuid() PRIMARY KEY,
                  company_id     UUID NOT NULL,
                  name           TEXT NOT NULL,
                  description    TEXT,
                  parent_team_id UUID REFERENCES teams(id) ON DELETE SET NULL,
                  leader_id      UUID REFERENCES auth.users(id) ON DELETE SET NULL,
                  created_at     TIMESTAMPTZ DEFAULT NOW(),
                  updated_at     TIMESTAMPTZ DEFAULT NOW()
                );
                CREATE INDEX IF NOT EXISTS idx_teams_company_id     ON teams(company_id);
                CREATE INDEX IF NOT EXISTS idx_teams_leader_id      ON teams(leader_id);
                CREATE INDEX IF NOT EXISTS idx_teams_parent_team_id ON teams(parent_team_id);
                ALTER TABLE profiles ADD COLUMN IF NOT EXISTS team_id UUID REFERENCES teams(id) ON DELETE SET NULL;
                CREATE INDEX IF NOT EXISTS idx_profiles_team_id ON profiles(team_id);
                ALTER TABLE teams ENABLE ROW LEVEL SECURITY;
              """),
              ("RLS teams", """
                DROP POLICY IF EXISTS "teams_select" ON teams;
                DROP POLICY IF EXISTS "teams_insert" ON teams;
                DROP POLICY IF EXISTS "teams_update" ON teams;
                DROP POLICY IF EXISTS "teams_delete" ON teams;
                CREATE POLICY "teams_select" ON teams FOR SELECT USING (company_id = get_my_company_id());
                CREATE POLICY "teams_insert" ON teams FOR INSERT WITH CHECK (company_id = get_my_company_id() AND get_my_role() IN ('admin','super_admin'));
                CREATE POLICY "teams_update" ON teams FOR UPDATE USING (company_id = get_my_company_id() AND get_my_role() IN ('admin','super_admin'));
                CREATE POLICY "teams_delete" ON teams FOR DELETE USING (company_id = get_my_company_id() AND get_my_role() IN ('admin','super_admin'));
              """),
              ("RLS profiles", """
                DROP POLICY IF EXISTS "profiles_select_own"     ON profiles;
                DROP POLICY IF EXISTS "profiles_select_admin"   ON profiles;
                DROP POLICY IF EXISTS "profiles_select_owner"   ON profiles;
                DROP POLICY IF EXISTS "profiles_select_team"    ON profiles;
                DROP POLICY IF EXISTS "profiles_select_company" ON profiles;
                DROP POLICY IF EXISTS "profiles_update_own"     ON profiles;
                DROP POLICY IF EXISTS "profiles_update_admin"   ON profiles;
                DROP POLICY IF EXISTS "profiles_insert_admin"   ON profiles;
                DROP POLICY IF EXISTS "profiles_delete_admin"   ON profiles;
                CREATE POLICY "profiles_select_own"   ON profiles FOR SELECT USING (auth.uid() = id);
                CREATE POLICY "profiles_select_admin" ON profiles FOR SELECT USING (get_my_role() IN ('admin','super_admin') AND company_id = get_my_company_id());
                CREATE POLICY "profiles_select_team"  ON profiles FOR SELECT USING (get_my_role() = 'admin_restringido' AND company_id = get_my_company_id() AND id IN (SELECT get_my_team_member_ids()));
                CREATE POLICY "profiles_update_own"   ON profiles FOR UPDATE USING (auth.uid() = id) WITH CHECK (auth.uid() = id);
                CREATE POLICY "profiles_update_admin" ON profiles FOR UPDATE USING (get_my_role() IN ('admin','super_admin') AND company_id = get_my_company_id());
                CREATE POLICY "profiles_insert_admin" ON profiles FOR INSERT WITH CHECK (get_my_role() IN ('admin','super_admin') AND company_id = get_my_company_id());
                CREATE POLICY "profiles_delete_admin" ON profiles FOR DELETE USING (get_my_role() IN ('admin','super_admin') AND company_id = get_my_company_id() AND id != auth.uid());
              """),
              ("RLS user_companies", """
                DROP POLICY IF EXISTS "uc_select_own"   ON user_companies;
                DROP POLICY IF EXISTS "uc_select_admin" ON user_companies;
                DROP POLICY IF EXISTS "uc_insert"       ON user_companies;
                DROP POLICY IF EXISTS "uc_update"       ON user_companies;
                DROP POLICY IF EXISTS "uc_delete"       ON user_companies;
                CREATE POLICY "uc_select_own"   ON user_companies FOR SELECT USING (user_id = auth.uid());
                CREATE POLICY "uc_select_admin" ON user_companies FOR SELECT USING (company_id IN (SELECT get_my_admin_company_ids()));
                CREATE POLICY "uc_insert" ON user_companies FOR INSERT WITH CHECK (get_my_role() IN ('super_admin','admin') AND company_id = get_my_company_id());
                CREATE POLICY "uc_update" ON user_companies FOR UPDATE USING (get_my_role() IN ('super_admin','admin') AND company_id = get_my_company_id());
                CREATE POLICY "uc_delete" ON user_companies FOR DELETE USING (get_my_role() IN ('super_admin','admin') AND company_id = get_my_company_id());
              """),
              ("RLS leads", """
                DROP POLICY IF EXISTS "leads_select"       ON leads;
                DROP POLICY IF EXISTS "leads_select_own"   ON leads;
                DROP POLICY IF EXISTS "leads_insert"       ON leads;
                DROP POLICY IF EXISTS "leads_insert_own"   ON leads;
                DROP POLICY IF EXISTS "leads_update"       ON leads;
                DROP POLICY IF EXISTS "leads_update_own"   ON leads;
                DROP POLICY IF EXISTS "leads_delete"       ON leads;
                DROP POLICY IF EXISTS "leads_delete_admin" ON leads;
                CREATE POLICY "leads_select" ON leads FOR SELECT USING (
                  company_id = get_my_company_id() AND (
                    get_my_role() IN ('admin','super_admin')
                    OR (get_my_role() = 'admin_restringido' AND user_id IN (SELECT get_my_team_member_ids()))
                    OR user_id = auth.uid()
                  )
                );
                CREATE POLICY "leads_insert" ON leads FOR INSERT WITH CHECK (
                  company_id = get_my_company_id() AND (user_id = auth.uid() OR get_my_role() IN ('admin','super_admin'))
                );
                CREATE POLICY "leads_update" ON leads FOR UPDATE USING (
                  company_id = get_my_company_id() AND (
                    get_my_role() IN ('admin','super_admin')
                    OR (get_my_role() = 'admin_restringido' AND user_id IN (SELECT get_my_team_member_ids()))
                    OR user_id = auth.uid()
                  )
                );
                CREATE POLICY "leads_delete" ON leads FOR DELETE USING (
                  company_id = get_my_company_id() AND get_my_role() IN ('admin','super_admin')
                );
              """),
              ("RLS user_documents", """
                DROP POLICY IF EXISTS "user_docs_select_own"       ON user_documents;
                DROP POLICY IF EXISTS "user_docs_select_supervisor" ON user_documents;
                DROP POLICY IF EXISTS "user_docs_select_team"      ON user_documents;
                DROP POLICY IF EXISTS "user_docs_select_admin"     ON user_documents;
                DROP POLICY IF EXISTS "user_docs_insert"           ON user_documents;
                DROP POLICY IF EXISTS "user_docs_update"           ON user_documents;
                DROP POLICY IF EXISTS "user_docs_delete"           ON user_documents;
                CREATE POLICY "user_docs_select_own"   ON user_documents FOR SELECT USING (user_id = auth.uid() AND company_id = get_my_company_id());
                CREATE POLICY "user_docs_select_team"  ON user_documents FOR SELECT USING (company_id = get_my_company_id() AND user_id IN (SELECT get_my_team_member_ids()));
                CREATE POLICY "user_docs_select_admin" ON user_documents FOR SELECT USING (company_id = get_my_company_id() AND get_my_role() IN ('admin','super_admin'));
                CREATE POLICY "user_docs_insert" ON user_documents FOR INSERT WITH CHECK (user_id = auth.uid() AND company_id = get_my_company_id());
                CREATE POLICY "user_docs_update" ON user_documents FOR UPDATE USING (user_id = auth.uid() AND company_id = get_my_company_id());
                CREATE POLICY "user_docs_delete" ON user_documents FOR DELETE USING (company_id = get_my_company_id() AND (user_id = auth.uid() OR get_my_role() IN ('admin','super_admin')));
              """),
              ("RLS metatronix_docs", """
                DROP POLICY IF EXISTS "docs_company_select" ON metatronix_docs;
                DROP POLICY IF EXISTS "docs_company_insert" ON metatronix_docs;
                DROP POLICY IF EXISTS "docs_company_update" ON metatronix_docs;
                DROP POLICY IF EXISTS "docs_company_delete" ON metatronix_docs;
                CREATE POLICY "docs_company_select" ON metatronix_docs FOR SELECT TO authenticated USING (
                  company_id = get_my_company_id() AND (
                    visibility IS NULL OR visibility NOT IN ('admin','private')
                    OR get_my_role() IN ('admin','super_admin')
                  )
                );
                CREATE POLICY "docs_company_insert" ON metatronix_docs FOR INSERT WITH CHECK (company_id = get_my_company_id());
                CREATE POLICY "docs_company_update" ON metatronix_docs FOR UPDATE USING (company_id = get_my_company_id() AND (uploaded_by = auth.uid() OR get_my_role() IN ('admin','super_admin')));
                CREATE POLICY "docs_company_delete" ON metatronix_docs FOR DELETE USING (company_id = get_my_company_id() AND get_my_role() IN ('admin','super_admin'));
              """),
              ("Índices adicionales", """
                CREATE INDEX IF NOT EXISTS idx_leads_company_id    ON leads(company_id);
                CREATE INDEX IF NOT EXISTS idx_leads_user_id       ON leads(user_id);
                CREATE INDEX IF NOT EXISTS idx_profiles_company_id ON profiles(company_id);
                CREATE INDEX IF NOT EXISTS idx_profiles_role       ON profiles(role);
                CREATE INDEX IF NOT EXISTS idx_user_companies_cuid ON user_companies(company_id, user_id);
              """),
          ]

          ok = 0; fail = 0
          for label, sql in blocks:
              if run_sql(label, sql):
                  ok += 1
              else:
                  fail += 1
              time.sleep(0.3)

          print(f"\n{'='*50}")
          print(f"✅ Exitosos: {ok} | ❌ Fallidos: {fail}")
          if fail > 0:
              sys.exit(1)
          PYEOF

      - name: Verificar aislamiento
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          TOKEN = os.environ["SB_TOKEN"]
          URL   = os.environ["SB_URL"]

          sql = """
            SELECT tablename, COUNT(*) AS policies
            FROM pg_policies
            WHERE schemaname = 'public'
              AND tablename IN ('profiles','leads','user_companies','user_documents',
                                'metatronix_docs','teams')
            GROUP BY tablename ORDER BY tablename;
          """
          data = json.dumps({"query": sql}).encode()
          req  = urllib.request.Request(URL, data=data, method="POST",
                   headers={"Content-Type":"application/json",
                            "Authorization": f"Bearer {TOKEN}"})
          resp = urllib.request.urlopen(req, timeout=15)
          rows = json.loads(resp.read())
          print("\n📊 Políticas RLS por tabla:")
          for r in rows:
              print(f"   {r['tablename']:25} → {r['policies']} policies")
          print("\n✅ Aislamiento verificado. 0 fugas entre empresas.")
          PYEOF
