name: "Fix User Access — Frida y Ana"

on:
  workflow_dispatch:

jobs:
  fix-access:
    name: Diagnose and Fix User Login
    runs-on: ubuntu-latest
    env:
      SB: "https://hodrfonbpmqulkyzrzpq.supabase.co"
      SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
      ANON: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvZHJmb25icG1xdWxreXpyenBxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTQ5NTUsImV4cCI6MjA5MTQ5MDk1NX0._M-_8jazg7q6Lt9F0Ia4MNWeCO4Q83zAqKsnpCIenFY"

    steps:
      - name: "Verificar conexión"
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SK" -H "Authorization: Bearer $SK" \
            "$SB/rest/v1/profiles?select=id&limit=1")
          echo "HTTP $HTTP"
          [ "$HTTP" = "200" ] || { echo "❌ SUPABASE_SERVICE_KEY inválido"; exit 1; }
          echo "✅ Conexión OK"

      - name: "Diagnóstico rápido"
        run: |
          echo "=== AUTH.USERS ==="
          for EMAIL in frida@retaillab.com.mx aamaya@todoretail.com; do
            echo "-- $EMAIL --"
            curl -s -H "apikey: $SK" -H "Authorization: Bearer $SK" \
              "$SB/auth/v1/admin/users?email=${EMAIL}&email_filter=exact" | \
              python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          u=d.get('users',[])
          if not u: print('  NOT FOUND')
          else:
            x=u[0]
            print(f'  id={x.get(\"id\")}')
            print(f'  email={x.get(\"email\")}')
            print(f'  has_pw={bool(x.get(\"encrypted_password\"))}')
            print(f'  confirmed={bool(x.get(\"email_confirmed_at\"))}')
          " 2>/dev/null || echo "  parse error"
          done

      - name: "Fix — Crear/actualizar usuarios via Admin API"
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os

          SB   = os.environ['SB']
          SK   = os.environ['SK']
          PWD  = 'MetaTronix2026!'
          H    = {'apikey': SK, 'Authorization': f'Bearer {SK}', 'Content-Type': 'application/json'}

          def api(method, path, body=None):
              url = SB + path
              data = json.dumps(body).encode() if body else None
              req = urllib.request.Request(url, data=data, headers=H, method=method)
              try:
                  resp = urllib.request.urlopen(req)
                  return json.loads(resp.read()), resp.status
              except urllib.error.HTTPError as e:
                  err = e.read().decode()
                  print(f'  HTTP {e.code}: {err[:300]}')
                  return json.loads(err) if err else {}, e.code

          def get_uid(email):
              d, _ = api('GET', f'/auth/v1/admin/users?email={email}&email_filter=exact')
              users = d.get('users', [])
              # Find exact match
              for u in users:
                  if u.get('email','').lower() == email.lower():
                      return u['id']
              return None

          def fix_user(email, name):
              print(f'\n── {email} ──')
              existing_uid = get_uid(email)

              if existing_uid:
                  print(f'  Encontrado: {existing_uid}')
                  print(f'  Actualizando password...')
                  result, code = api('PUT', f'/auth/v1/admin/users/{existing_uid}', {
                      'password': PWD,
                      'email_confirm': True,
                      'ban_duration': 'none',
                  })
                  if 'error' in result:
                      print(f'  ❌ ERROR: {result.get("error")} - {result.get("message","")}')
                  else:
                      print(f'  ✅ Password actualizado OK')
                      print(f'  confirmed: {bool(result.get("email_confirmed_at"))}')
                  user_id = existing_uid
              else:
                  print(f'  No encontrado. Creando...')
                  result, code = api('POST', '/auth/v1/admin/users', {
                      'email': email,
                      'password': PWD,
                      'email_confirm': True,
                      'user_metadata': {'full_name': name, 'role': 'user'},
                  })
                  if 'error' in result:
                      print(f'  ❌ ERROR al crear: {result.get("error")} - {result.get("message","")}')
                      return
                  user_id = result.get('id')
                  print(f'  ✅ Creado: {user_id}')

              if not user_id:
                  print('  ❌ Sin UID, abortando')
                  return

              # Upsert profile
              print(f'  Upsertando profile...')
              result, code = api('POST', '/rest/v1/profiles', {
                  'id': user_id, 'email': email, 'full_name': name,
                  'role': 'user', 'is_active': True,
              })
              # Use Prefer header for upsert
              url = SB + '/rest/v1/profiles'
              body = json.dumps({'id': user_id, 'email': email, 'full_name': name,
                                 'role': 'user', 'is_active': True}).encode()
              H2 = {**H, 'Prefer': 'resolution=merge-duplicates,return=minimal'}
              req = urllib.request.Request(url, data=body, headers=H2, method='POST')
              try:
                  resp = urllib.request.urlopen(req)
                  print(f'  Profile HTTP {resp.status}')
              except urllib.error.HTTPError as e:
                  print(f'  Profile HTTP {e.code}: {e.read().decode()[:200]}')

              # Find MetaTronix company
              d, _ = api('GET', '/rest/v1/companies?slug=eq.metatronix&select=id')
              co_id = d[0]['id'] if d else None
              if not co_id:
                  d, _ = api('GET', f'/rest/v1/companies?id=eq.c0000000-0000-0000-0000-000000000001&select=id')
                  co_id = d[0]['id'] if d else None
              if not co_id:
                  d, _ = api('GET', '/rest/v1/companies?select=id,name,slug&limit=10')
                  co_info = [str(c.get('id','?')) + ' ' + str(c.get('name','?')) for c in d]
                  print('  Empresas disponibles: ' + str(co_info))

              if co_id:
                  url2 = SB + '/rest/v1/user_companies'
                  body2 = json.dumps({'user_id': user_id, 'company_id': co_id, 'role': 'member'}).encode()
                  H3 = {**H, 'Prefer': 'resolution=merge-duplicates,return=minimal'}
                  req2 = urllib.request.Request(url2, data=body2, headers=H3, method='POST')
                  try:
                      resp2 = urllib.request.urlopen(req2)
                      print(f'  Membresía MetaTronix ({co_id}) HTTP {resp2.status}')
                  except urllib.error.HTTPError as e:
                      print(f'  Membresía HTTP {e.code}: {e.read().decode()[:200]}')
              else:
                  print('  ⚠ No se encontró empresa MetaTronix')

          fix_user('frida@retaillab.com.mx', 'Frida')
          fix_user('aamaya@todoretail.com',   'Ana Amaya')
          fix_user('acanales@ibanormexico.com', 'Alejandro Canales')
          print('\n✅ Fix completado')
          PYEOF

      - name: "Verificación — Test de login"
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os

          SB   = os.environ['SB']
          ANON = os.environ['ANON']
          PWD  = 'MetaTronix2026!'

          def test_login(email):
              print(f'\n── {email} ──')
              url  = f'{SB}/auth/v1/token?grant_type=password'
              body = json.dumps({'email': email, 'password': PWD}).encode()
              H    = {'apikey': ANON, 'Content-Type': 'application/json'}
              req  = urllib.request.Request(url, data=body, headers=H, method='POST')
              try:
                  resp = urllib.request.urlopen(req)
                  d = json.loads(resp.read())
                  if 'access_token' in d:
                      print(f'  ✅ LOGIN EXITOSO — user_id: {d.get("user",{}).get("id","?")}')
                  else:
                      print(f'  ⚠ Sin token: {str(d)[:200]}')
              except urllib.error.HTTPError as e:
                  d = json.loads(e.read().decode())
                  print(f'  ❌ LOGIN FALLIDO: {d.get("error","?")} - {d.get("error_description","")}')

          test_login('frida@retaillab.com.mx')
          test_login('aamaya@todoretail.com')
          test_login('acanales@ibanormexico.com')
          print('\nPortal: https://metatronixleads.tech')
          print('Password: MetaTronix2026!')
          PYEOF
