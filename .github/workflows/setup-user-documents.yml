name: Setup — Portal de Documentos de Usuario

on:
  workflow_dispatch:

jobs:
  setup:
    name: Crear tabla user_documents + RLS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: "Ejecutar migración SQL via Management API"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, urllib.error, sys

          PROJECT_REF = "hodrfonbpmqulkyzrzpq"
          MGMT_URL    = f"https://api.supabase.com/v1/projects/{PROJECT_REF}/database/query"
          SB          = f"https://{PROJECT_REF}.supabase.co"
          token = (os.environ.get("SUPABASE_ACCESS_TOKEN") or
                   os.environ.get("SUPABASE_SERVICE_KEY") or "").strip()
          SK    = os.environ.get("SUPABASE_SERVICE_KEY","").strip()

          print("═" * 60)
          print("  Setup — Portal Documentos Usuario")
          print("═" * 60)

          # Read SQL file
          with open("sql/user-documents-schema.sql","r") as f:
              sql = f.read()

          def run_sql(query, label=""):
              """Try Management API first, then exec_sql fallback."""
              data = json.dumps({"query": query}).encode()

              # Try Management API
              req = urllib.request.Request(MGMT_URL, data=data,
                  headers={"Authorization": f"Bearer {token}",
                           "Content-Type": "application/json"}, method="POST")
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return json.loads(r.read()), r.status
              except urllib.error.HTTPError as e:
                  body = e.read().decode()
                  if e.code == 401:
                      # Fallback: exec_sql via service key
                      req2 = urllib.request.Request(f"{SB}/rest/v1/rpc/exec_sql",
                          data=json.dumps({"sql": query}).encode(),
                          headers={"apikey": SK, "Authorization": f"Bearer {SK}",
                                   "Content-Type": "application/json"}, method="POST")
                      try:
                          with urllib.request.urlopen(req2, timeout=30) as r2:
                              return json.loads(r2.read()), r2.status
                      except urllib.error.HTTPError as e2:
                          return {"error": e2.code, "msg": e2.read().decode()[:300]}, e2.code
                  return {"error": e.code, "msg": body[:300]}, e.code

          # Execute full SQL
          print("\n📄 Ejecutando schema...")
          result, status = run_sql(sql, "user-documents-schema.sql")
          if isinstance(result, dict) and result.get("error"):
              print(f"⚠ HTTP {status}: {result}")
              # Try statement by statement
              print("\n↩ Intentando sentencia por sentencia...")
              stmts = [s.strip() for s in sql.split(";") if s.strip() and not s.strip().startswith("--")]
              ok = 0; fail = 0
              for i, stmt in enumerate(stmts, 1):
                  r, s = run_sql(stmt + ";", f"stmt {i}")
                  if isinstance(r, dict) and r.get("error"):
                      # Ignore "already exists" errors
                      msg = r.get("msg","")
                      if "already exists" in msg or "duplicate" in msg.lower():
                          print(f"  [{i}] ✓ (ya existe)")
                          ok += 1
                      else:
                          print(f"  [{i}] ✗ {stmt[:60]}...")
                          print(f"       {msg[:200]}")
                          fail += 1
                  else:
                      ok += 1
              print(f"\n  OK: {ok} | Falló: {fail}")
          else:
              print(f"✅ Schema ejecutado (HTTP {status})")

          # Verify table exists
          print("\n🔍 Verificando tabla user_documents...")
          H = {"apikey": SK, "Authorization": f"Bearer {SK}"}
          req3 = urllib.request.Request(
              f"{SB}/rest/v1/user_documents?select=id&limit=1",
              headers=H)
          try:
              resp = urllib.request.urlopen(req3, timeout=10)
              print(f"✅ Tabla user_documents accesible (HTTP {resp.status})")
          except urllib.error.HTTPError as e:
              print(f"⚠ {e.code}: {e.read().decode()[:200]}")

          # Verify supervisor_id column on profiles
          print("\n🔍 Verificando supervisor_id en profiles...")
          req4 = urllib.request.Request(
              f"{SB}/rest/v1/profiles?select=supervisor_id&limit=1",
              headers=H)
          try:
              resp = urllib.request.urlopen(req4, timeout=10)
              print(f"✅ Columna supervisor_id accesible (HTTP {resp.status})")
          except urllib.error.HTTPError as e:
              print(f"⚠ {e.code}: {e.read().decode()[:200]}")

          print("\n✅ Setup completado.")
          PYEOF

      - name: "Verificar estado final"
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, os
          SB = "https://hodrfonbpmqulkyzrzpq.supabase.co"
          SK = os.environ["SUPABASE_SERVICE_KEY"]
          H  = {"apikey": SK, "Authorization": f"Bearer {SK}"}

          # Count any existing docs
          req = urllib.request.Request(f"{SB}/rest/v1/user_documents?select=id", headers=H)
          try:
              resp = urllib.request.urlopen(req, timeout=10)
              docs = json.loads(resp.read())
              print(f"📊 user_documents: {len(docs)} registros")
          except Exception as e:
              print(f"⚠ Error: {e}")

          print("✅ Portal de documentos listo para usar")
          PYEOF
