name: Attachments Setup → Supabase

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Escribe "attach" para confirmar'
        required: true

jobs:
  setup:
    name: Crear tabla record_attachments + bucket docs
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'attach' }}
    steps:
      - uses: actions/checkout@v4

      - name: Ejecutar SQL via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          SQL=$(python3 -c "import json; print(json.dumps(open('sql/attachments_setup.sql').read()))")
          HTTP=$(curl -s -o /tmp/resp.txt -w "%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/hodrfonbpmqulkyzrzpq/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $SQL}")
          BODY=$(cat /tmp/resp.txt)
          echo "HTTP: $HTTP"
          echo "$BODY"
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "201" ]; then exit 1; fi
          echo "✅ Attachments setup OK"
