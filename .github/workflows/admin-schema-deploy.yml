# ─────────────────────────────────────────────────────────────────────────────
# admin-schema-deploy.yml
# Ejecuta admin-schema.sql via Supabase Management API (solo necesita PAT).
#
# SETUP ÚNICO (una sola vez):
#   1. Ve a: https://supabase.com/dashboard/account/tokens
#   2. Crea un Personal Access Token → nombre: "GitHub Actions MTX"
#   3. GitHub → Settings → Secrets → Actions → New secret:
#      Nombre:  SUPABASE_ACCESS_TOKEN   Valor: (el token)
#   4. Actions → "Admin Schema Deploy" → Run workflow → escribe "ejecutar"
# ─────────────────────────────────────────────────────────────────────────────
name: Admin Schema — Deploy a Supabase

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Escribe "ejecutar" para confirmar'
        required: true
        type: string

jobs:
  deploy-schema:
    name: Ejecutar admin-schema.sql
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'ejecutar' }}

    env:
      PROJECT_REF: hodrfonbpmqulkyzrzpq
      SUPA_API: https://api.supabase.com/v1/projects/hodrfonbpmqulkyzrzpq/database/query
      ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar token
        run: |
          echo "🔑 Verificando token..."
          HTTP=$(curl -s -o /tmp/proj.json -w "%{http_code}" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$PROJECT_REF")
          echo "HTTP $HTTP"
          if [ "$HTTP" != "200" ]; then
            cat /tmp/proj.json
            echo "❌ Token inválido o sin permisos. Verifica SUPABASE_ACCESS_TOKEN."
            exit 1
          fi
          echo "✅ Token OK — proyecto: $(cat /tmp/proj.json | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("name","?"))')"

      - name: Ejecutar SQL (bloque a bloque)
        run: |
          run_sql() {
            local LABEL="$1"
            local SQL="$2"
            echo ""
            echo "▶ $LABEL"
            RESP=$(curl -s -w "\nHTTP:%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\": $(echo "$SQL" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')}" \
              "$SUPA_API")
            HTTP=$(echo "$RESP" | grep "HTTP:" | cut -d: -f2)
            BODY=$(echo "$RESP" | grep -v "HTTP:")
            if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ]; then
              echo "  ✅ OK"
            else
              echo "  ⚠ HTTP $HTTP: $BODY"
              # No salir — algunos bloques pueden dar warning si ya existen
            fi
          }

          # ── suppliers ────────────────────────────────────────────
          run_sql "Tabla suppliers" "
            CREATE TABLE IF NOT EXISTS suppliers (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              company_id UUID NOT NULL REFERENCES companies(id) ON DELETE CASCADE,
              name TEXT NOT NULL,
              rfc TEXT, email TEXT, phone TEXT, address TEXT,
              payment_terms INTEGER DEFAULT 30,
              category TEXT,
              status TEXT NOT NULL DEFAULT 'activo' CHECK (status IN ('activo','inactivo','bloqueado')),
              rating NUMERIC(3,2),
              notes TEXT,
              created_by UUID REFERENCES auth.users(id),
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );
            ALTER TABLE suppliers ENABLE ROW LEVEL SECURITY;
            CREATE POLICY IF NOT EXISTS suppliers_sel ON suppliers FOR SELECT USING (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE POLICY IF NOT EXISTS suppliers_ins ON suppliers FOR INSERT WITH CHECK (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE POLICY IF NOT EXISTS suppliers_upd ON suppliers FOR UPDATE USING (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE INDEX IF NOT EXISTS idx_suppliers_company ON suppliers(company_id);
            CREATE INDEX IF NOT EXISTS idx_suppliers_status  ON suppliers(status);
          "

          # ── requisitions ─────────────────────────────────────────
          run_sql "Tabla requisitions" "
            CREATE TABLE IF NOT EXISTS requisitions (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              company_id UUID NOT NULL REFERENCES companies(id) ON DELETE CASCADE,
              folio TEXT NOT NULL,
              title TEXT NOT NULL,
              description TEXT, category TEXT,
              amount_estimated NUMERIC(14,2),
              currency TEXT NOT NULL DEFAULT 'MXN',
              requested_by UUID REFERENCES auth.users(id),
              requested_date DATE NOT NULL DEFAULT CURRENT_DATE,
              needed_date DATE,
              status TEXT NOT NULL DEFAULT 'borrador' CHECK (status IN ('borrador','pendiente','aprobada','rechazada','cancelada','completada')),
              approved_by UUID REFERENCES auth.users(id),
              approved_at TIMESTAMPTZ,
              rejection_note TEXT,
              purchase_order_id UUID,
              attachments JSONB DEFAULT '[]',
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );
            ALTER TABLE requisitions ENABLE ROW LEVEL SECURITY;
            CREATE POLICY IF NOT EXISTS req_sel ON requisitions FOR SELECT USING (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE POLICY IF NOT EXISTS req_ins ON requisitions FOR INSERT WITH CHECK (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE POLICY IF NOT EXISTS req_upd ON requisitions FOR UPDATE USING (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE INDEX IF NOT EXISTS idx_requisitions_company ON requisitions(company_id);
            CREATE INDEX IF NOT EXISTS idx_requisitions_status  ON requisitions(status);
          "

          # ── purchase_orders ──────────────────────────────────────
          run_sql "Tabla purchase_orders" "
            CREATE TABLE IF NOT EXISTS purchase_orders (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              company_id UUID NOT NULL REFERENCES companies(id) ON DELETE CASCADE,
              folio TEXT NOT NULL,
              requisition_id UUID REFERENCES requisitions(id),
              supplier_id UUID REFERENCES suppliers(id),
              title TEXT NOT NULL,
              items JSONB NOT NULL DEFAULT '[]',
              subtotal NUMERIC(14,2) NOT NULL DEFAULT 0,
              iva NUMERIC(14,2) NOT NULL DEFAULT 0,
              total NUMERIC(14,2) NOT NULL DEFAULT 0,
              currency TEXT NOT NULL DEFAULT 'MXN',
              payment_terms INTEGER DEFAULT 30,
              delivery_date DATE,
              status TEXT NOT NULL DEFAULT 'borrador' CHECK (status IN ('borrador','enviada','confirmada','parcial','completada','cancelada')),
              received_at TIMESTAMPTZ,
              notes TEXT,
              created_by UUID REFERENCES auth.users(id),
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );
            ALTER TABLE purchase_orders ENABLE ROW LEVEL SECURITY;
            CREATE POLICY IF NOT EXISTS po_sel ON purchase_orders FOR SELECT USING (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE POLICY IF NOT EXISTS po_ins ON purchase_orders FOR INSERT WITH CHECK (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE POLICY IF NOT EXISTS po_upd ON purchase_orders FOR UPDATE USING (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE INDEX IF NOT EXISTS idx_po_company  ON purchase_orders(company_id);
            CREATE INDEX IF NOT EXISTS idx_po_supplier ON purchase_orders(supplier_id);
            CREATE INDEX IF NOT EXISTS idx_po_status   ON purchase_orders(status);
          "

          # ── FK circular req → po ─────────────────────────────────
          run_sql "FK circular requisitions→purchase_orders" "
            DO \$\$ BEGIN
              IF NOT EXISTS (
                SELECT 1 FROM information_schema.table_constraints
                WHERE constraint_name = 'fk_req_po'
              ) THEN
                ALTER TABLE requisitions ADD CONSTRAINT fk_req_po
                  FOREIGN KEY (purchase_order_id) REFERENCES purchase_orders(id);
              END IF;
            END \$\$;
          "

          # ── supplier_quotes ──────────────────────────────────────
          run_sql "Tabla supplier_quotes" "
            CREATE TABLE IF NOT EXISTS supplier_quotes (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              company_id UUID NOT NULL REFERENCES companies(id) ON DELETE CASCADE,
              requisition_id UUID REFERENCES requisitions(id),
              supplier_id UUID REFERENCES suppliers(id),
              folio_proveedor TEXT,
              items JSONB NOT NULL DEFAULT '[]',
              subtotal NUMERIC(14,2) NOT NULL DEFAULT 0,
              iva NUMERIC(14,2) NOT NULL DEFAULT 0,
              total NUMERIC(14,2) NOT NULL DEFAULT 0,
              currency TEXT NOT NULL DEFAULT 'MXN',
              validity_date DATE,
              delivery_days INTEGER,
              status TEXT NOT NULL DEFAULT 'recibida' CHECK (status IN ('recibida','en_revision','aceptada','rechazada')),
              ai_analysis TEXT, notes TEXT,
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );
            ALTER TABLE supplier_quotes ENABLE ROW LEVEL SECURITY;
            CREATE POLICY IF NOT EXISTS sq_sel ON supplier_quotes FOR SELECT USING (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE POLICY IF NOT EXISTS sq_ins ON supplier_quotes FOR INSERT WITH CHECK (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE POLICY IF NOT EXISTS sq_upd ON supplier_quotes FOR UPDATE USING (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE INDEX IF NOT EXISTS idx_quotes_company  ON supplier_quotes(company_id);
            CREATE INDEX IF NOT EXISTS idx_quotes_supplier ON supplier_quotes(supplier_id);
          "

          # ── invoices_out ─────────────────────────────────────────
          run_sql "Tabla invoices_out (CXC)" "
            CREATE TABLE IF NOT EXISTS invoices_out (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              company_id UUID NOT NULL REFERENCES companies(id) ON DELETE CASCADE,
              lead_id UUID,
              folio TEXT NOT NULL,
              uuid_cfdi TEXT, customer_name TEXT NOT NULL,
              customer_rfc TEXT, customer_email TEXT,
              items JSONB NOT NULL DEFAULT '[]',
              subtotal NUMERIC(14,2) NOT NULL DEFAULT 0,
              iva NUMERIC(14,2) NOT NULL DEFAULT 0,
              total NUMERIC(14,2) NOT NULL DEFAULT 0,
              currency TEXT NOT NULL DEFAULT 'MXN',
              issue_date DATE NOT NULL DEFAULT CURRENT_DATE,
              due_date DATE, payment_date DATE,
              status TEXT NOT NULL DEFAULT 'emitida' CHECK (status IN ('borrador','emitida','enviada','parcial','pagada','vencida','cancelada')),
              days_overdue INTEGER GENERATED ALWAYS AS (
                CASE WHEN status NOT IN ('pagada','cancelada') AND due_date < CURRENT_DATE
                THEN CURRENT_DATE - due_date ELSE 0 END
              ) STORED,
              collection_priority TEXT DEFAULT 'normal' CHECK (collection_priority IN ('urgente','alta','normal','baja')),
              last_contact_at TIMESTAMPTZ,
              ai_collection_note TEXT, notes TEXT,
              created_by UUID REFERENCES auth.users(id),
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );
            ALTER TABLE invoices_out ENABLE ROW LEVEL SECURITY;
            CREATE POLICY IF NOT EXISTS inv_out_sel ON invoices_out FOR SELECT USING (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE POLICY IF NOT EXISTS inv_out_ins ON invoices_out FOR INSERT WITH CHECK (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE POLICY IF NOT EXISTS inv_out_upd ON invoices_out FOR UPDATE USING (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE INDEX IF NOT EXISTS idx_inv_out_company  ON invoices_out(company_id);
            CREATE INDEX IF NOT EXISTS idx_inv_out_status   ON invoices_out(status);
            CREATE INDEX IF NOT EXISTS idx_inv_out_due_date ON invoices_out(due_date);
          "

          # ── invoices_in ──────────────────────────────────────────
          run_sql "Tabla invoices_in (CXP)" "
            CREATE TABLE IF NOT EXISTS invoices_in (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              company_id UUID NOT NULL REFERENCES companies(id) ON DELETE CASCADE,
              supplier_id UUID REFERENCES suppliers(id),
              purchase_order_id UUID REFERENCES purchase_orders(id),
              folio_proveedor TEXT, uuid_cfdi TEXT,
              supplier_name TEXT NOT NULL, supplier_rfc TEXT,
              items JSONB NOT NULL DEFAULT '[]',
              subtotal NUMERIC(14,2) NOT NULL DEFAULT 0,
              iva NUMERIC(14,2) NOT NULL DEFAULT 0,
              total NUMERIC(14,2) NOT NULL DEFAULT 0,
              currency TEXT NOT NULL DEFAULT 'MXN',
              issue_date DATE NOT NULL DEFAULT CURRENT_DATE,
              due_date DATE, payment_date DATE,
              status TEXT NOT NULL DEFAULT 'recibida' CHECK (status IN ('recibida','revisada','aprobada','programada','pagada','rechazada')),
              notes TEXT,
              created_by UUID REFERENCES auth.users(id),
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );
            ALTER TABLE invoices_in ENABLE ROW LEVEL SECURITY;
            CREATE POLICY IF NOT EXISTS inv_in_sel ON invoices_in FOR SELECT USING (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE POLICY IF NOT EXISTS inv_in_ins ON invoices_in FOR INSERT WITH CHECK (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE POLICY IF NOT EXISTS inv_in_upd ON invoices_in FOR UPDATE USING (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE INDEX IF NOT EXISTS idx_inv_in_company  ON invoices_in(company_id);
            CREATE INDEX IF NOT EXISTS idx_inv_in_supplier ON invoices_in(supplier_id);
            CREATE INDEX IF NOT EXISTS idx_inv_in_due_date ON invoices_in(due_date);
          "

          # ── payments ─────────────────────────────────────────────
          run_sql "Tabla payments" "
            CREATE TABLE IF NOT EXISTS payments (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              company_id UUID NOT NULL REFERENCES companies(id) ON DELETE CASCADE,
              type TEXT NOT NULL CHECK (type IN ('cobro','pago')),
              invoice_out_id UUID REFERENCES invoices_out(id),
              invoice_in_id UUID REFERENCES invoices_in(id),
              amount NUMERIC(14,2) NOT NULL,
              currency TEXT NOT NULL DEFAULT 'MXN',
              payment_date DATE NOT NULL DEFAULT CURRENT_DATE,
              method TEXT CHECK (method IN ('transferencia','cheque','efectivo','tarjeta','otro')),
              reference TEXT, uuid_complemento TEXT,
              status TEXT NOT NULL DEFAULT 'registrado' CHECK (status IN ('registrado','conciliado','cancelado')),
              notes TEXT,
              created_by UUID REFERENCES auth.users(id),
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );
            ALTER TABLE payments ENABLE ROW LEVEL SECURITY;
            CREATE POLICY IF NOT EXISTS pay_sel ON payments FOR SELECT USING (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE POLICY IF NOT EXISTS pay_ins ON payments FOR INSERT WITH CHECK (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE POLICY IF NOT EXISTS pay_upd ON payments FOR UPDATE USING (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE INDEX IF NOT EXISTS idx_payments_company ON payments(company_id);
            CREATE INDEX IF NOT EXISTS idx_payments_date    ON payments(payment_date);
            CREATE INDEX IF NOT EXISTS idx_payments_type    ON payments(type);
          "

          # ── contracts ────────────────────────────────────────────
          run_sql "Tabla contracts" "
            CREATE TABLE IF NOT EXISTS contracts (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              company_id UUID NOT NULL REFERENCES companies(id) ON DELETE CASCADE,
              type TEXT NOT NULL CHECK (type IN ('cliente','proveedor','laboral','otro')),
              counterpart_name TEXT NOT NULL, counterpart_rfc TEXT,
              title TEXT NOT NULL, description TEXT,
              start_date DATE, end_date DATE,
              value NUMERIC(14,2),
              currency TEXT NOT NULL DEFAULT 'MXN',
              status TEXT NOT NULL DEFAULT 'activo' CHECK (status IN ('borrador','activo','vencido','renovado','cancelado')),
              auto_renew BOOLEAN DEFAULT FALSE,
              alert_days INTEGER DEFAULT 30,
              attachments JSONB DEFAULT '[]',
              ai_summary TEXT, clauses_flags JSONB DEFAULT '[]',
              lead_id UUID, supplier_id UUID REFERENCES suppliers(id),
              created_by UUID REFERENCES auth.users(id),
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );
            ALTER TABLE contracts ENABLE ROW LEVEL SECURITY;
            CREATE POLICY IF NOT EXISTS con_sel ON contracts FOR SELECT USING (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE POLICY IF NOT EXISTS con_ins ON contracts FOR INSERT WITH CHECK (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE POLICY IF NOT EXISTS con_upd ON contracts FOR UPDATE USING (company_id IN (SELECT company_id FROM profiles WHERE id = auth.uid()));
            CREATE INDEX IF NOT EXISTS idx_contracts_company  ON contracts(company_id);
            CREATE INDEX IF NOT EXISTS idx_contracts_status   ON contracts(status);
            CREATE INDEX IF NOT EXISTS idx_contracts_end_date ON contracts(end_date);
          "

          # ── trigger updated_at ───────────────────────────────────
          run_sql "Función + triggers updated_at" "
            CREATE OR REPLACE FUNCTION set_updated_at()
            RETURNS TRIGGER LANGUAGE plpgsql AS \$\$
            BEGIN NEW.updated_at = NOW(); RETURN NEW; END;
            \$\$;
            DO \$\$
            DECLARE t TEXT;
            BEGIN
              FOREACH t IN ARRAY ARRAY['suppliers','requisitions','purchase_orders',
                'supplier_quotes','invoices_out','invoices_in','contracts']
              LOOP
                EXECUTE format('
                  CREATE OR REPLACE TRIGGER trg_%I_updated_at
                  BEFORE UPDATE ON %I
                  FOR EACH ROW EXECUTE FUNCTION set_updated_at()',
                  t, t);
              END LOOP;
            END;
            \$\$;
          "

          # ── RPC get_financial_summary ────────────────────────────
          run_sql "RPC get_financial_summary" "
            CREATE OR REPLACE FUNCTION get_financial_summary(p_company_id UUID)
            RETURNS JSON LANGUAGE plpgsql SECURITY DEFINER AS \$\$
            DECLARE
              v_cxc_total NUMERIC; v_cxc_vencida NUMERIC;
              v_cxp_total NUMERIC; v_cxp_proxima NUMERIC;
              v_cobros_mes NUMERIC; v_pagos_mes NUMERIC;
            BEGIN
              SELECT COALESCE(SUM(total),0) INTO v_cxc_total FROM invoices_out WHERE company_id = p_company_id AND status NOT IN ('pagada','cancelada');
              SELECT COALESCE(SUM(total),0) INTO v_cxc_vencida FROM invoices_out WHERE company_id = p_company_id AND status NOT IN ('pagada','cancelada') AND due_date < CURRENT_DATE;
              SELECT COALESCE(SUM(total),0) INTO v_cxp_total FROM invoices_in WHERE company_id = p_company_id AND status NOT IN ('pagada','rechazada');
              SELECT COALESCE(SUM(total),0) INTO v_cxp_proxima FROM invoices_in WHERE company_id = p_company_id AND status NOT IN ('pagada','rechazada') AND due_date BETWEEN CURRENT_DATE AND CURRENT_DATE + 30;
              SELECT COALESCE(SUM(amount),0) INTO v_cobros_mes FROM payments WHERE company_id = p_company_id AND type = 'cobro' AND DATE_TRUNC('month', payment_date) = DATE_TRUNC('month', CURRENT_DATE);
              SELECT COALESCE(SUM(amount),0) INTO v_pagos_mes FROM payments WHERE company_id = p_company_id AND type = 'pago' AND DATE_TRUNC('month', payment_date) = DATE_TRUNC('month', CURRENT_DATE);
              RETURN JSON_BUILD_OBJECT('cxc_total',v_cxc_total,'cxc_vencida',v_cxc_vencida,'cxp_total',v_cxp_total,'cxp_proxima30',v_cxp_proxima,'cobros_mes',v_cobros_mes,'pagos_mes',v_pagos_mes,'flujo_neto_mes',v_cobros_mes - v_pagos_mes);
            END;
            \$\$;
            REVOKE ALL ON FUNCTION get_financial_summary(UUID) FROM PUBLIC;
            GRANT EXECUTE ON FUNCTION get_financial_summary(UUID) TO authenticated;
          "

          echo ""
          echo "═══════════════════════════════════════════"
          echo "  VERIFICACIÓN FINAL"
          echo "═══════════════════════════════════════════"

      - name: Verificar tablas creadas
        run: |
          RESP=$(curl -s \
            -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query": "SELECT table_name FROM information_schema.tables WHERE table_schema = '"'"'public'"'"' AND table_name IN ('"'"'suppliers'"'"','"'"'requisitions'"'"','"'"'purchase_orders'"'"','"'"'supplier_quotes'"'"','"'"'invoices_out'"'"','"'"'invoices_in'"'"','"'"'payments'"'"','"'"'contracts'"'"') ORDER BY table_name"}' \
            "$SUPA_API")
          echo "$RESP" | python3 -c "
import sys, json
d = json.load(sys.stdin)
tablas = [r[0] if isinstance(r, list) else r.get('table_name','?') for r in d]
esperadas = {'suppliers','requisitions','purchase_orders','supplier_quotes','invoices_out','invoices_in','payments','contracts'}
print('Tablas creadas:')
for t in tablas:
    print(f'  ✅ {t}')
faltantes = esperadas - set(tablas)
if faltantes:
    print('Faltantes:', faltantes)
    sys.exit(1)
else:
    print()
    print('✅ Todos los módulos de administración están activos.')
" 2>/dev/null || echo "$RESP"
