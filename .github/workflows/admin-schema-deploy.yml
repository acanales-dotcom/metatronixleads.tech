name: Admin Schema — Deploy a Supabase

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Escribe "ejecutar" para confirmar'
        required: true
        type: string

jobs:
  deploy-schema:
    name: Ejecutar admin-schema.sql
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'ejecutar'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ejecutar schema via Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: python3 scripts/run_admin_schema.py
