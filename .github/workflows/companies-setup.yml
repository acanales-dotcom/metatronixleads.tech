name: Companies Setup IBANOR METATRONIX

on:
  workflow_dispatch:
    inputs:
      service_role_key:
        description: 'Supabase service_role key'
        required: true
        type: string

jobs:
  setup:
    name: Crear empresas, perfiles y membresias
    runs-on: ubuntu-latest

    env:
      SB: "https://hodrfonbpmqulkyzrzpq.supabase.co"
      SK: ${{ github.event.inputs.service_role_key }}

    steps:
      - name: "Verificar conexion"
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SK" -H "Authorization: Bearer $SK" \
            "$SB/rest/v1/profiles?select=id&limit=1")
          echo "HTTP $HTTP"
          [ "$HTTP" = "200" ] || { echo "FAIL conexion"; exit 1; }

      - name: "Crear empresa IBANOR"
        run: |
          curl -s -w "\nHTTP %{http_code}\n" \
            -X POST \
            -H "apikey: $SK" -H "Authorization: Bearer $SK" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates,return=minimal" \
            -d '{"id":"ibanor","name":"IBANOR SA de CV","owner_email":"acanales@ibanormexico.com","plan":"enterprise","is_active":true}' \
            "$SB/rest/v1/companies"

      - name: "Crear empresa METATRONIX"
        run: |
          curl -s -w "\nHTTP %{http_code}\n" \
            -X POST \
            -H "apikey: $SK" -H "Authorization: Bearer $SK" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates,return=minimal" \
            -d '{"id":"metatronix","name":"MetaTronix","owner_email":"acanales@ibanormexico.com","plan":"enterprise","is_active":true}' \
            "$SB/rest/v1/companies"

      - name: "Obtener UUIDs de auth.users"
        run: |
          for EMAIL in acanales@ibanormexico.com ncanales@ibanormexico.com nibarra@ibanormexico.com acanalesf@ibanormexico.com jorge@retaillab.com.mx noe@grupoamsg.com; do
            RESULT=$(curl -s \
              -H "apikey: $SK" -H "Authorization: Bearer $SK" \
              "$SB/auth/v1/admin/users?email=${EMAIL}")
            UID=$(echo "$RESULT" | python3 -c "
import json,sys
d=json.load(sys.stdin)
u=d.get('users',[])
print(u[0]['id'] if u else '')
" 2>/dev/null)
            echo "${EMAIL}=${UID}" | tee -a /tmp/uids.env
          done
          cat /tmp/uids.env

      - name: "Upsert perfiles METATRONIX"
        run: |
          get_uid() { grep "^$1=" /tmp/uids.env | cut -d= -f2; }

          ACANALES=$(get_uid "acanales@ibanormexico.com")
          NCANALES=$(get_uid "ncanales@ibanormexico.com")
          NIBARRA=$(get_uid "nibarra@ibanormexico.com")
          ACANALESF=$(get_uid "acanalesf@ibanormexico.com")
          JORGE=$(get_uid "jorge@retaillab.com.mx")
          NOE=$(get_uid "noe@grupoamsg.com")

          echo "UIDs: acanales=$ACANALES ncanales=$NCANALES nibarra=$NIBARRA acanalesf=$ACANALESF jorge=$JORGE noe=$NOE"

          upsert() {
            UID=$1 EMAIL=$2 ROLE=$3 CO=$4 NAME=$5 DEPT=$6 TITLE=$7 LIM=$8
            [ -z "$UID" ] && { echo "SKIP $EMAIL (no UID)"; return; }
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "apikey: $SK" -H "Authorization: Bearer $SK" \
              -H "Content-Type: application/json" \
              -H "Prefer: resolution=merge-duplicates,return=minimal" \
              --data-raw "{\"id\":\"$UID\",\"email\":\"$EMAIL\",\"role\":\"$ROLE\",\"company_id\":\"$CO\",\"full_name\":\"$NAME\",\"department\":\"$DEPT\",\"job_title\":\"$TITLE\",\"consejo_limit\":$LIM,\"is_active\":true}" \
              "$SB/rest/v1/profiles")
            echo "$EMAIL -> $ROLE @ $CO : HTTP $HTTP"
          }

          upsert "$ACANALES"  "acanales@ibanormexico.com"  "super_admin"       "metatronix" "A. Canales"    "direccion" "CEO"                       9999
          upsert "$NCANALES"  "ncanales@ibanormexico.com"  "super_admin"       "metatronix" "N. Canales"    "direccion" "CEO"                       9999
          upsert "$NIBARRA"   "nibarra@ibanormexico.com"   "admin"             "metatronix" "N. Ibarra"     "finanzas"  "Dir Admin y Finanzas"      200
          upsert "$ACANALESF" "acanalesf@ibanormexico.com" "admin"             "metatronix" "A. Canales F." "finanzas"  "Dir Admin y Finanzas"      200
          upsert "$JORGE"     "jorge@retaillab.com.mx"     "admin_restringido" "metatronix" "Jorge"         "ventas"    "Director de Ventas"        100
          upsert "$NOE"       "noe@grupoamsg.com"          "admin_restringido" "metatronix" "Noe"           "ventas"    "Director de Ventas"        100

      - name: "Upsert perfiles IBANOR"
        run: |
          get_uid() { grep "^$1=" /tmp/uids.env | cut -d= -f2; }
          ACANALES=$(get_uid "acanales@ibanormexico.com")
          NIBARRA=$(get_uid "nibarra@ibanormexico.com")
          ACANALESF=$(get_uid "acanalesf@ibanormexico.com")

          upsert() {
            UID=$1 EMAIL=$2 ROLE=$3 CO=$4 NAME=$5 DEPT=$6 TITLE=$7 LIM=$8
            [ -z "$UID" ] && { echo "SKIP $EMAIL (no UID)"; return; }
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "apikey: $SK" -H "Authorization: Bearer $SK" \
              -H "Content-Type: application/json" \
              -H "Prefer: resolution=merge-duplicates,return=minimal" \
              --data-raw "{\"id\":\"$UID\",\"email\":\"$EMAIL\",\"role\":\"$ROLE\",\"company_id\":\"$CO\",\"full_name\":\"$NAME\",\"department\":\"$DEPT\",\"job_title\":\"$TITLE\",\"consejo_limit\":$LIM,\"is_active\":true}" \
              "$SB/rest/v1/profiles")
            echo "$EMAIL -> $ROLE @ $CO : HTTP $HTTP"
          }

          upsert "$ACANALES"  "acanales@ibanormexico.com"  "super_admin" "ibanor" "A. Canales"    "direccion" "CEO"              9999
          upsert "$NIBARRA"   "nibarra@ibanormexico.com"   "super_admin" "ibanor" "N. Ibarra"     "finanzas"  "Dir Admin"        9999
          upsert "$ACANALESF" "acanalesf@ibanormexico.com" "super_admin" "ibanor" "A. Canales F." "finanzas"  "Dir Admin"        9999

      - name: "Crear membresias user_companies"
        run: |
          get_uid() { grep "^$1=" /tmp/uids.env | cut -d= -f2; }
          ACANALES=$(get_uid "acanales@ibanormexico.com")
          NCANALES=$(get_uid "ncanales@ibanormexico.com")
          NIBARRA=$(get_uid "nibarra@ibanormexico.com")
          ACANALESF=$(get_uid "acanalesf@ibanormexico.com")
          JORGE=$(get_uid "jorge@retaillab.com.mx")
          NOE=$(get_uid "noe@grupoamsg.com")

          member() {
            UID=$1 CO=$2 ROLE=$3 EMAIL=$4
            [ -z "$UID" ] && { echo "SKIP $EMAIL"; return; }
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "apikey: $SK" -H "Authorization: Bearer $SK" \
              -H "Content-Type: application/json" \
              -H "Prefer: resolution=merge-duplicates,return=minimal" \
              -d "{\"user_id\":\"$UID\",\"company_id\":\"$CO\",\"role\":\"$ROLE\"}" \
              "$SB/rest/v1/user_companies")
            echo "$EMAIL -> $CO ($ROLE) : HTTP $HTTP"
          }

          echo "=== IBANOR ==="
          member "$ACANALES"  "ibanor" "owner" "acanales@ibanormexico.com"
          member "$NIBARRA"   "ibanor" "admin" "nibarra@ibanormexico.com"
          member "$ACANALESF" "ibanor" "admin" "acanalesf@ibanormexico.com"

          echo "=== METATRONIX ==="
          member "$ACANALES"  "metatronix" "owner"  "acanales@ibanormexico.com"
          member "$NCANALES"  "metatronix" "owner"  "ncanales@ibanormexico.com"
          member "$NIBARRA"   "metatronix" "admin"  "nibarra@ibanormexico.com"
          member "$ACANALESF" "metatronix" "admin"  "acanalesf@ibanormexico.com"
          member "$JORGE"     "metatronix" "member" "jorge@retaillab.com.mx"
          member "$NOE"       "metatronix" "member" "noe@grupoamsg.com"

      - name: "Verificacion final"
        run: |
          echo "=== EMPRESAS ==="
          curl -s -H "apikey: $SK" -H "Authorization: Bearer $SK" \
            "$SB/rest/v1/companies?select=id,name,is_active" | \
            python3 -c "import json,sys; [print(f'  {c[\"id\"]:15} {c[\"name\"]:20} activo:{c.get(\"is_active\")}') for c in json.load(sys.stdin)]"

          echo "=== PERFILES ==="
          curl -s -H "apikey: $SK" -H "Authorization: Bearer $SK" \
            "$SB/rest/v1/profiles?select=email,role,company_id,department&order=company_id,email" | \
            python3 -c "import json,sys; [print(f'  {u[\"email\"]:40} {u[\"role\"]:20} {u.get(\"company_id\",\"?\"):12} {u.get(\"department\",\"?\")}') for u in json.load(sys.stdin)]"

          echo "=== MEMBRESIAS ==="
          curl -s -H "apikey: $SK" -H "Authorization: Bearer $SK" \
            "$SB/rest/v1/user_companies?select=user_id,company_id,role" | \
            python3 -c "import json,sys; rows=json.load(sys.stdin); print(f'  Total: {len(rows)}')"

          echo "DONE"
