          import json, urllib.request, os
          SB,SK = os.environ['SB'], os.environ['SK']
          H = {'apikey':SK,'Authorization':f'Bearer {SK}'}
          def safe(url):
              try: return json.loads(urllib.request.urlopen(urllib.request.Request(url,headers=H)).read())
              except: return []
          cos = safe(SB+'/rest/v1/companies?select=id,slug,name')
          demo_id = next((c['id'] for c in cos if c.get('slug') in ('nexus','demo') or c.get('id') in ('nexus','demo')),'nexus')
          profiles = safe(SB+'/rest/v1/profiles?select=id,email,role&limit=20')
          print(f'Demo: {demo_id} | Perfiles: {len(profiles)}')
          with open('/tmp/ctx.json','w') as f: json.dump({'demo_id':demo_id,'profiles':profiles},f)
          PYEOF

