name: Configurar Secrets del Cloudflare Worker

on:
  workflow_dispatch:
    inputs:
      anthropic_api_key:
        description: 'ANTHROPIC_API_KEY (sk-ant-...)'
        required: true
        type: string
      hf_api_key:
        description: 'HF_API_KEY (opcional, hf_xxx)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  set-secrets:
    name: 🔐 Set Worker Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # account_id no es sensible — visible en dash.cloudflare.com/...
      CF_ACCOUNT_ID: "7d424ed86707327fa5b7bec1a0fe373a"
      WORKER_NAME: "claude-proxy"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler@latest --silent

      - name: Create wrangler.toml
        run: |
          cat > wrangler.toml <<EOF
name = "${WORKER_NAME}"
main = "worker/claude-proxy.js"
compatibility_date = "2024-01-15"
account_id = "${CF_ACCOUNT_ID}"
EOF
          echo "--- wrangler.toml ---"
          cat wrangler.toml

      - name: Verify Cloudflare token
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}")
          echo "Worker API status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "404" ]; then
            echo "✅ Token válido"
          else
            echo "❌ Token inválido o sin permisos (HTTP $STATUS)"
            exit 1
          fi

      - name: Set ANTHROPIC_API_KEY
        run: |
          echo "${{ github.event.inputs.anthropic_api_key }}" | \
            wrangler secret put ANTHROPIC_API_KEY --name "${WORKER_NAME}"
          echo "✅ ANTHROPIC_API_KEY configurada"

      - name: Set SUPABASE_URL
        run: |
          echo "https://hodrfonbpmqulkyzrzpq.supabase.co" | \
            wrangler secret put SUPABASE_URL --name "${WORKER_NAME}"
          echo "✅ SUPABASE_URL configurada"

      - name: Set SUPABASE_ANON_KEY
        run: |
          echo "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvZHJmb25icG1xdWxreXpyenBxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTQ5NTUsImV4cCI6MjA5MTQ5MDk1NX0._M-_8jazg7q6Lt9F0Ia4MNWeCO4Q83zAqKsnpCIenFY" | \
            wrangler secret put SUPABASE_ANON_KEY --name "${WORKER_NAME}"
          echo "✅ SUPABASE_ANON_KEY configurada"

      - name: Set HF_API_KEY (if provided)
        if: ${{ github.event.inputs.hf_api_key != '' }}
        run: |
          echo "${{ github.event.inputs.hf_api_key }}" | \
            wrangler secret put HF_API_KEY --name "${WORKER_NAME}"
          echo "✅ HF_API_KEY configurada"

      - name: Verify Worker responds
        run: |
          sleep 3
          STATUS=$(curl -s -o /tmp/wk_resp.json -w "%{http_code}" -X POST \
            "https://${WORKER_NAME}.acanales-7d4.workers.dev" \
            -H "Content-Type: application/json" \
            -d '{"model":"claude-haiku-4-5-20251001","max_tokens":5,"messages":[{"role":"user","content":"hi"}]}' \
            || echo "000")
          echo "Worker status: $STATUS"
          cat /tmp/wk_resp.json 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(json.dumps(d, indent=2))" 2>/dev/null || true
          if [ "$STATUS" = "401" ]; then
            echo "✅ Worker activo — 401 = requiere JWT (correcto)"
          elif [ "$STATUS" = "200" ]; then
            echo "✅ Worker respondió 200"
          elif [ "$STATUS" = "500" ]; then
            echo "⚠️  Worker activo pero error 500 — revisar ANTHROPIC_API_KEY"
          else
            echo "ℹ️  Status $STATUS — puede estar propagando aún"
          fi
