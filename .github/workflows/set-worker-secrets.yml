name: Configurar Secrets del Cloudflare Worker

on:
  workflow_dispatch:
    inputs:
      anthropic_api_key:
        description: 'ANTHROPIC_API_KEY (sk-ant-...)'
        required: true
        type: string
      hf_api_key:
        description: 'HF_API_KEY (opcional, hf_xxx)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  set-secrets:
    name: 🔐 Set Worker Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Create wrangler.toml
        run: |
          cat > wrangler.toml << 'EOF'
          name = "claude-proxy"
          main = "worker/claude-proxy.js"
          compatibility_date = "2024-01-15"
          account_id = "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          EOF

      - name: Set ANTHROPIC_API_KEY
        run: |
          echo "${{ github.event.inputs.anthropic_api_key }}" | wrangler secret put ANTHROPIC_API_KEY
          echo "✅ ANTHROPIC_API_KEY configurada"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set SUPABASE_URL
        run: |
          echo "https://hodrfonbpmqulkyzrzpq.supabase.co" | wrangler secret put SUPABASE_URL
          echo "✅ SUPABASE_URL configurada"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set SUPABASE_ANON_KEY
        run: |
          echo "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvZHJmb25icG1xdWxreXpyenBxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTQ5NTUsImV4cCI6MjA5MTQ5MDk1NX0._M-_8jazg7q6Lt9F0Ia4MNWeCO4Q83zAqKsnpCIenFY" | wrangler secret put SUPABASE_ANON_KEY
          echo "✅ SUPABASE_ANON_KEY configurada"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set HF_API_KEY (if provided)
        if: ${{ github.event.inputs.hf_api_key != '' }}
        run: |
          echo "${{ github.event.inputs.hf_api_key }}" | wrangler secret put HF_API_KEY
          echo "✅ HF_API_KEY configurada"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify Worker responds
        run: |
          sleep 3
          STATUS=$(curl -s -o /tmp/wk_resp.json -w "%{http_code}" -X POST \
            https://claude-proxy.acanales-7d4.workers.dev \
            -H "Content-Type: application/json" \
            -d '{"model":"claude-haiku-4-5-20251001","max_tokens":5,"messages":[{"role":"user","content":"hi"}]}' || echo "000")
          echo "Status: $STATUS"
          cat /tmp/wk_resp.json 2>/dev/null || true
          if [ "$STATUS" = "401" ]; then
            echo "✅ Worker activo — 401 = requiere JWT (correcto)"
          elif [ "$STATUS" = "500" ]; then
            echo "⚠️  Worker activo pero error 500 — revisar secrets"
          elif [ "$STATUS" = "200" ]; then
            echo "✅ Worker respondió 200"
          else
            echo "Status $STATUS — puede estar propagando (~30s)"
          fi
