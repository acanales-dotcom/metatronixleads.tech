name: Set Temp Passwords

on:
  workflow_dispatch:
    inputs:
      service_role_key:
        description: 'Supabase service_role key'
        required: true
        type: string

jobs:
  set-passwords:
    runs-on: ubuntu-latest
    env:
      SB: "https://hodrfonbpmqulkyzrzpq.supabase.co"
      SK: ${{ github.event.inputs.service_role_key }}
      PASS: "MetaTronix2026!"
    steps:
      - name: Obtener UIDs
        run: |
          curl -s -H "apikey: $SK" -H "Authorization: Bearer $SK" "$SB/auth/v1/admin/users?page=1&per_page=1000" > /tmp/users.json
          python3 -c "import json; d=json.load(open('/tmp/users.json')); users=d.get('users',[]) if isinstance(d,dict) else d; tgt=['jorge@retaillab.com.mx','noe@grupoamsg.com']; lines=[f\"{u['email']}={u['id']}\" for u in users if u.get('email','').lower() in tgt]; print('\n'.join(lines)); open('/tmp/uids.env','w').write('\n'.join(lines))"
          cat /tmp/uids.env

      - name: Set passwords + temp_password flag
        run: |
          while IFS='=' read -r EMAIL UID; do
            [ -z "$UID" ] && { echo "SKIP $EMAIL (no UID)"; continue; }
            HTTP=$(curl -s -o /tmp/r_${UID}.json -w "%{http_code}" \
              -X PUT \
              -H "apikey: $SK" -H "Authorization: Bearer $SK" \
              -H "Content-Type: application/json" \
              --data-raw "{\"password\":\"$PASS\",\"email_confirm\":true,\"user_metadata\":{\"temp_password\":true}}" \
              "$SB/auth/v1/admin/users/$UID")
            echo "$EMAIL ($UID): HTTP $HTTP"
            [ "$HTTP" = "200" ] || cat /tmp/r_${UID}.json
          done < /tmp/uids.env

      - name: Verificar
        run: |
          while IFS='=' read -r EMAIL UID; do
            [ -z "$UID" ] && continue
            RESULT=$(curl -s -H "apikey: $SK" -H "Authorization: Bearer $SK" "$SB/auth/v1/admin/users/$UID")
            python3 -c "import json; d=json.load(open('/dev/stdin')); print(f'  {d.get(\"email\")}: temp_password={d.get(\"user_metadata\",{}).get(\"temp_password\")}')" <<< "$RESULT"
          done < /tmp/uids.env
          echo "DONE"
