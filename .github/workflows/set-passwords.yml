name: Set Temp Passwords

on:
  workflow_dispatch:
    inputs:
      service_role_key:
        description: 'Supabase service_role key'
        required: true
        type: string

jobs:
  set-passwords:
    runs-on: ubuntu-latest

    steps:
      - name: Set passwords + temp_password flag
        env:
          SK: ${{ github.event.inputs.service_role_key }}
          PY: |
            import json, urllib.request, urllib.error, sys
            SB  = 'https://hodrfonbpmqulkyzrzpq.supabase.co'
            SK  = __import__('os').environ['SK']
            PWD = 'MetaTronix2026!'
            TGT = ['jorge@retaillab.com.mx', 'noe@grupoamsg.com']
            H   = {'apikey': SK, 'Authorization': 'Bearer ' + SK, 'Content-Type': 'application/json'}
            req = urllib.request.Request(SB + '/auth/v1/admin/users?page=1&per_page=1000',
                                         headers={k:v for k,v in H.items() if k != 'Content-Type'})
            raw  = urllib.request.urlopen(req).read()
            data = json.loads(raw)
            users = data.get('users', []) if isinstance(data, dict) else data
            print(f'Total usuarios en auth: {len(users)}')
            targets = {u['email'].lower(): u['id'] for u in users if u.get('email','').lower() in TGT}
            print(f'Targets encontrados: {list(targets.keys())}')
            for email, uid in targets.items():
                payload = json.dumps({'password': PWD, 'email_confirm': True,
                                      'user_metadata': {'temp_password': True}}).encode()
                req2 = urllib.request.Request(SB + '/auth/v1/admin/users/' + uid,
                                              data=payload, headers=H, method='PUT')
                try:
                    resp = urllib.request.urlopen(req2)
                    body = json.loads(resp.read())
                    meta = body.get('user_metadata', {})
                    print(f'  OK  {email}: temp_password={meta.get("temp_password")}')
                except urllib.error.HTTPError as e:
                    err = e.read().decode()
                    print(f'  ERR {email}: {e.code} {err[:300]}', file=sys.stderr)
        run: echo "$PY" | python3

      - name: Verificar resultado
        env:
          SK: ${{ github.event.inputs.service_role_key }}
          PY: |
            import json, urllib.request
            SB  = 'https://hodrfonbpmqulkyzrzpq.supabase.co'
            SK  = __import__('os').environ['SK']
            TGT = ['jorge@retaillab.com.mx', 'noe@grupoamsg.com']
            H   = {'apikey': SK, 'Authorization': 'Bearer ' + SK}
            raw  = urllib.request.urlopen(urllib.request.Request(
                       SB + '/auth/v1/admin/users?page=1&per_page=1000', headers=H)).read()
            data = json.loads(raw)
            users = data.get('users', []) if isinstance(data, dict) else data
            for u in users:
                if u.get('email','').lower() in TGT:
                    meta = u.get('user_metadata') or {}
                    flag = meta.get('temp_password', 'NOT SET')
                    print(f'  {u["email"]}: temp_password={flag}')
            print('DONE')
        run: echo "$PY" | python3
