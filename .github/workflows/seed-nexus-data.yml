      - name: "Resumen final — verificar todos los datos"
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, os

          SB = os.environ['SB']
          SK = os.environ['SK']
          H  = {'apikey': SK, 'Authorization': f'Bearer {SK}'}

          ctx = json.load(open('/tmp/nexus_ctx.json'))
          demo_id = ctx['demo_id']

          print(f'\n╔═══════════════════════════════════════════════════╗')
          print(f'  NEXUS ({demo_id}) — Datos de prueba completos')
          print(f'╚═══════════════════════════════════════════════════╝\n')

          tables = [
              ('leads', f'?company_id=eq.{demo_id}'),
              ('metatronix_docs', f'?company_id=eq.{demo_id}'),
              ('accounts_receivable', f'?company_id=eq.{demo_id}'),
              ('feature_requests', f'?company_id=eq.{demo_id}'),
              ('events', f'?company_id=eq.{demo_id}'),
          ]

          for table, qs in tables:
              url = f'{SB}/rest/v1/{table}{qs}&select=id'
              try:
                  data = json.loads(urllib.request.urlopen(urllib.request.Request(url, headers=H)).read())
                  print(f'  ✅ {table:25} → {len(data):3} registros')
              except Exception as ex:
                  print(f'  ❌ {table:25} → {ex}')

          # Leads por etapa
          url = f'{SB}/rest/v1/leads?company_id=eq.{demo_id}&select=stage,status&limit=100'
          data = json.loads(urllib.request.urlopen(urllib.request.Request(url, headers=H)).read())
          stages = {}
          for l in data: stages[l.get('stage','?')] = stages.get(l.get('stage','?'),0)+1
          print(f'\n  Pipeline por etapa:')
          order = ['prospecto','calificado','demo','propuesta','negociacion','cierre','postventa','retencion','perdido']
          for s in order:
              if s in stages: print(f'    {s:20} → {stages[s]}')

          # AR por status
          url = f'{SB}/rest/v1/accounts_receivable?company_id=eq.{demo_id}&select=status,amount'
          data = json.loads(urllib.request.urlopen(urllib.request.Request(url, headers=H)).read())
          ar_status = {}
          for a in data: ar_status[a['status']] = ar_status.get(a['status'],0) + float(a['amount'])
          print(f'\n  Cuentas por cobrar:')
          for s, amt in ar_status.items(): print(f'    {s:15} → ${amt:>12,.0f} MXN')

          # Docs
          url = f'{SB}/rest/v1/metatronix_docs?company_id=eq.{demo_id}&select=category'
          data = json.loads(urllib.request.urlopen(urllib.request.Request(url, headers=H)).read())
          carpetas = sum(1 for d in data if d['category']=='carpeta_admin')
          archivos = sum(1 for d in data if d['category']=='archivo_admin')
          print(f'\n  Documentos: {carpetas} carpetas + {archivos} archivos')
          print(f'\n✅ NEXUS listo para demostración completa')
          PYEOF
