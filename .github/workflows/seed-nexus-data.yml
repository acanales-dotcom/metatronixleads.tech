      - name: "Detectar empresa nexus y obtener UIDs"
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, os

          SB = os.environ['SB']
          SK = os.environ['SK']
          H  = {'apikey': SK, 'Authorization': f'Bearer {SK}'}

          cos = json.loads(urllib.request.urlopen(
              urllib.request.Request(SB+'/rest/v1/companies?select=id,slug,name', headers=H)).read())
          demo_id = next((c['id'] for c in cos if c.get('slug') in ('nexus','demo') or c.get('id') in ('nexus','demo')), 'nexus')
          print(f'Demo company: {demo_id}')
          print('Todas las empresas:', [(c['id'], c.get('name')) for c in cos])

          profiles = json.loads(urllib.request.urlopen(
              urllib.request.Request(SB+'/rest/v1/profiles?select=id,email,full_name,role&order=role&limit=20', headers=H)).read())
          print('Usuarios:', [(p['email'], p['role'], p['id'][:8]) for p in profiles])

          with open('/tmp/nexus_ctx.json','w') as f:
              json.dump({'demo_id': demo_id, 'profiles': profiles}, f)
          PYEOF

