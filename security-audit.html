<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetaTronix — Seguridad & Auditoría</title>
  <link rel="stylesheet" href="/assets/style.css?v=20260419">
</head>
<body>
<div id="header-placeholder"></div>
<main class="main-content" style="padding:24px">
  <div style="max-width:900px;margin:0 auto">
    <h1 style="font-family:var(--font-head);font-size:1.6rem;color:var(--accent);margin-bottom:4px">🔒 Seguridad &amp; Auditoría</h1>
    <p style="color:var(--t3);font-size:13px;margin-bottom:24px">Panel de control de seguridad del portal MetaTronix</p>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:24px" id="security-kpis"></div>

    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">
      <div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <span style="font-family:var(--font-head);font-size:.95rem;color:var(--accent)">Log de Auditoría</span>
        <button class="btn btn-secondary btn-sm" onclick="loadAuditLog()">🔄 Actualizar</button>
      </div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead>
            <tr style="background:var(--surface2)">
              <th style="padding:10px 14px;text-align:left;color:var(--t2);font-weight:600;white-space:nowrap">Fecha</th>
              <th style="padding:10px 14px;text-align:left;color:var(--t2);font-weight:600">Acción</th>
              <th style="padding:10px 14px;text-align:left;color:var(--t2);font-weight:600">Usuario</th>
              <th style="padding:10px 14px;text-align:left;color:var(--t2);font-weight:600">Recurso</th>
              <th style="padding:10px 14px;text-align:left;color:var(--t2);font-weight:600">Detalle</th>
            </tr>
          </thead>
          <tbody id="audit-tbody">
            <tr><td colspan="5" style="padding:20px;text-align:center;color:var(--t3)">Cargando…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script>
async function init() {
  const user = await requireAuth(true);
  if (!user) return;
  document.getElementById('header-placeholder').innerHTML = renderHeader(user, 'security-audit');
  buildSecurityKPIs(user);
  loadAuditLog();
}

function buildSecurityKPIs(user) {
  const kpis = [
    { icon:'🛡️', label:'RLS Activo', value:'Todas las tablas', color:'var(--green)' },
    { icon:'🔐', label:'JWT Verificado', value:'Worker + Supabase', color:'var(--green)' },
    { icon:'🚫', label:'CSP Headers', value:'Strict-Origin-When-Cross-Origin', color:'var(--green)' },
    { icon:'⏱️', label:'Rate Limiting', value:'5 intentos / 15 min', color:'var(--green)' },
    { icon:'👁️', label:'XSS Protection', value:'escHtml() en todo el DOM', color:'var(--green)' },
    { icon:'🔑', label:'Credenciales', value:'Solo en Worker (env vars)', color:'var(--green)' },
  ];
  document.getElementById('security-kpis').innerHTML = kpis.map(k => `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px">
      <div style="font-size:22px;margin-bottom:6px">${k.icon}</div>
      <div style="font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">${k.label}</div>
      <div style="font-size:13px;color:${k.color};font-weight:600">${k.value}</div>
    </div>`).join('');
}

async function loadAuditLog() {
  const db = getDB();
  const tbody = document.getElementById('audit-tbody');
  try {
    const { data, error } = await db.from('mtx_activity_log')
      .select('created_at, action, user_email, entity_type, details')
      .order('created_at', { ascending: false })
      .limit(100);
    if (error || !data?.length) {
      tbody.innerHTML = '<tr><td colspan="5" style="padding:20px;text-align:center;color:var(--t3)">Sin registros disponibles</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(r => `
      <tr style="border-top:1px solid var(--border)">
        <td style="padding:9px 14px;color:var(--t3);white-space:nowrap">${new Date(r.created_at).toLocaleString('es-MX',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</td>
        <td style="padding:9px 14px"><span style="font-family:var(--font-mono);font-size:11px;background:var(--surface2);padding:2px 7px;border-radius:4px;color:var(--cyan)">${escHtml(r.action||'-')}</span></td>
        <td style="padding:9px 14px;color:var(--t2)">${escHtml(r.user_email||'-')}</td>
        <td style="padding:9px 14px;color:var(--t3)">${escHtml(r.entity_type||'-')}</td>
        <td style="padding:9px 14px;color:var(--t3);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(JSON.stringify(r.details||{}).slice(0,120))}</td>
      </tr>`).join('');
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="5" style="padding:20px;text-align:center;color:var(--t3)">Error al cargar log de auditoría</td></tr>';
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/config.js"></script>
<script src="/assets/app.js?v=20260420i"></script>
<script src="/assets/agent.js?v=20260422"></script>
<script src="/assets/teamchat.js?v=20260419"></script>
</body>
</html>
