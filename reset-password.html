<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetaTronix — Nueva Contraseña</title>
  <link rel="stylesheet" href="/assets/fonts.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0A0E18; font-family: 'Inter', sans-serif; padding: 20px;
    }
    .wrap { width: 100%; max-width: 420px; }
    .card {
      background: #111827; border: 1px solid rgba(0,255,136,.2);
      border-radius: 16px; padding: 36px 32px;
      box-shadow: 0 0 40px rgba(0,255,136,.06);
    }
    .logo {
      font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600;
      color: #00ff88; letter-spacing: .18em; text-transform: uppercase;
      display: flex; align-items: center; gap: 8px; margin-bottom: 24px;
    }
    .logo-dot { width: 7px; height: 7px; border-radius: 50%; background: #00ff88; box-shadow: 0 0 8px #00ff88; }
    h1 { font-size: 20px; font-weight: 700; color: #F1F5F9; margin-bottom: 6px; }
    .sub { font-size: 13px; color: #64748B; margin-bottom: 24px; line-height: 1.5; }
    .field { margin-bottom: 14px; }
    label { display: block; font-size: 10px; font-weight: 700; color: #94A3B8; letter-spacing: .07em; text-transform: uppercase; margin-bottom: 5px; }
    input {
      width: 100%; padding: 10px 12px; background: #1E293B;
      border: 1px solid rgba(255,255,255,.1); border-radius: 8px;
      color: #F1F5F9; font-size: 14px; outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: #00ff88; }
    .btn {
      width: 100%; padding: 12px; background: #00ff88; color: #0A0E18;
      border: none; border-radius: 8px; font-weight: 700; font-size: 14px;
      cursor: pointer; margin-top: 6px; transition: opacity .15s;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .msg { font-size: 13px; margin-top: 14px; padding: 10px 14px; border-radius: 8px; display: none; }
    .msg.show { display: block; }
    .msg.error { background: rgba(239,68,68,.12); color: #F87171; border: 1px solid rgba(239,68,68,.25); }
    .msg.success { background: rgba(0,255,136,.1); color: #00ff88; border: 1px solid rgba(0,255,136,.25); }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #0A0E18; border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint { font-size: 11px; color: #475569; margin-top: 6px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo"><div class="logo-dot"></div> MetaTronix · Portal</div>
    <h1>Nueva contraseña</h1>
    <p class="sub" id="sub-text">Establece tu nueva contraseña de acceso al portal.</p>

    <!-- Form: set new password -->
    <div id="form-section">
      <form id="reset-form">
        <div class="field">
          <label>Correo electrónico</label>
          <input type="email" id="email-display" readonly style="opacity:.6;cursor:default">
        </div>
        <div class="field">
          <label>Nueva contraseña</label>
          <input type="password" id="pass1" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required minlength="8">
        </div>
        <div class="field">
          <label>Confirmar contraseña</label>
          <input type="password" id="pass2" placeholder="Repite la contraseña" autocomplete="new-password" required>
        </div>
        <p class="hint">Mínimo 8 caracteres. Puedes usar letras, números y símbolos.</p>
        <button class="btn" id="reset-btn" type="submit">Guardar contraseña</button>
      </form>
      <div class="msg" id="msg"></div>
    </div>

    <!-- Invalid/expired link -->
    <div id="invalid-section" style="display:none">
      <div class="msg error show" style="margin-top:0">
        El enlace expiró o no es válido. Solicita uno nuevo desde la pantalla de login.
      </div>
      <a href="/index.html" style="display:block;text-align:center;margin-top:16px;color:#00ff88;font-size:13px;text-decoration:none">← Volver al login</a>
    </div>
  </div>
</div>

<script src="/assets/libs/supabase.min.js"></script>
<script src="/assets/config.js"></script>
<script>
(async () => {
  function getDB() {
    if (window._db) return window._db;
    if (!window.supabase || !window.MTX_CONFIG) return null;
    window._db = window.supabase.createClient(window.MTX_CONFIG.supabaseUrl, window.MTX_CONFIG.supabaseAnonKey);
    return window._db;
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = `msg ${type} show`;
  }

  const db = getDB();
  if (!db) {
    document.getElementById('invalid-section').style.display = 'block';
    document.getElementById('form-section').style.display = 'none';
    return;
  }

  // Supabase puts the recovery token in the URL hash: #access_token=...&type=recovery
  // When this page loads, the Supabase client picks it up automatically.
  // We listen for PASSWORD_RECOVERY event OR check session directly.

  let recoverySession = null;

  // Check for token in URL hash (Supabase v2 format)
  const hash = window.location.hash;
  if (hash && (hash.includes('type=recovery') || hash.includes('access_token'))) {
    // Supabase client processes the hash automatically on getSession()
    const { data: { session } } = await db.auth.getSession();
    if (session) {
      recoverySession = session;
    }
  }

  // Also handle onAuthStateChange for PASSWORD_RECOVERY event
  db.auth.onAuthStateChange(async (event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      recoverySession = session;
      if (session?.user?.email) {
        document.getElementById('email-display').value = session.user.email;
      }
      document.getElementById('form-section').style.display = 'block';
      document.getElementById('invalid-section').style.display = 'none';
    }
  });

  // If we already have a recovery session from the hash
  if (recoverySession) {
    if (recoverySession.user?.email) {
      document.getElementById('email-display').value = recoverySession.user.email;
    }
  } else {
    // Give Supabase 1.5s to process the hash and fire events
    await new Promise(r => setTimeout(r, 1500));
    const { data: { session } } = await db.auth.getSession();
    if (session?.user) {
      recoverySession = session;
      document.getElementById('email-display').value = session.user.email || '';
    } else {
      // No recovery session found — invalid or expired link
      document.getElementById('invalid-section').style.display = 'block';
      document.getElementById('form-section').style.display = 'none';
      return;
    }
  }

  // Handle form submit
  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pass1 = document.getElementById('pass1').value;
    const pass2 = document.getElementById('pass2').value;
    const btn   = document.getElementById('reset-btn');

    if (pass1.length < 8) { showMsg('La contraseña debe tener al menos 8 caracteres.', 'error'); return; }
    if (pass1 !== pass2)  { showMsg('Las contraseñas no coinciden.', 'error'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Guardando...';

    const { error } = await db.auth.updateUser({ password: pass1 });

    if (error) {
      showMsg('Error: ' + (error.message || 'No se pudo actualizar la contraseña.'), 'error');
      btn.disabled = false;
      btn.textContent = 'Guardar contraseña';
      return;
    }

    showMsg('✓ Contraseña actualizada. Redirigiendo...', 'success');
    setTimeout(() => { window.location.href = '/home.html'; }, 1800);
  });
})();
</script>
</body>
</html>
