<!DOCTYPE html>
<html lang="es">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co https://*.workers.dev wss://*.supabase.co https://api.groq.com; object-src 'none'; base-uri 'self';">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>CEO Command Center — MetaTronix</title>
  <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap">
  <link rel="stylesheet" href="/assets/style.css?v=20260416">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/config.js?v=20260418"></script>
  <script src="/assets/app.js?v=20260418"></script>
  <style>
    :root {
      --green:  #00ff88;
      --cyan:   #00e5ff;
      --gold:   #ffb400;
      --purple: #b966ff;
      --red:    #ff4646;
    }

    /* ── Layout ── */
    .ceo-root { display:flex; flex-direction:column; gap:28px; padding:28px; max-width:1500px; margin:0 auto; }

    /* ── Page header ── */
    .page-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
    .page-header h1 { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:.06em; margin:0; }
    .page-header p  { font-size:12px; color:var(--text-muted); margin:3px 0 0; }
    .live-dot { display:inline-block; width:8px; height:8px; background:var(--green); border-radius:50%; animation:pulse 2s ease-in-out infinite; margin-right:8px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── KPI strip ── */
    .kpi-strip { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; }
    .kpi-card {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:10px;
      padding:14px 18px;
      position:relative; overflow:hidden;
      transition:border-color .2s;
    }
    .kpi-card::after {
      content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
      background:var(--kpi-color, var(--green)); opacity:.5;
    }
    .kpi-label { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text-faint); }
    .kpi-value { font-family:'JetBrains Mono',monospace; font-size:24px; font-weight:600; color:var(--kpi-color, var(--text)); margin:6px 0 2px; }
    .kpi-sub   { font-size:11px; color:var(--text-muted); }

    /* ── Agents grid ── */
    .agents-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    @media(max-width:980px){ .agents-grid { grid-template-columns:1fr; } }

    /* ── Agent card ── */
    .agent-card {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:12px;
      display:flex; flex-direction:column;
      overflow:hidden;
      transition:border-color .2s, box-shadow .2s;
    }
    .agent-card:hover { border-color:var(--agent-color); box-shadow:0 0 20px -6px var(--agent-color); }

    .agent-head {
      padding:16px 20px;
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:12px;
      background:linear-gradient(135deg, rgba(0,0,0,.4) 0%, transparent 100%);
    }
    .agent-icon {
      width:42px; height:42px; border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      font-size:20px; flex-shrink:0;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
    }
    .agent-meta { flex:1; min-width:0; }
    .agent-name { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:.08em; color:var(--agent-color); }
    .agent-role { font-size:11px; color:var(--text-muted); margin-top:1px; }
    .agent-status {
      font-size:10px; font-weight:700; padding:3px 10px; border-radius:20px;
      background:rgba(0,255,136,.08); color:var(--green); border:1px solid rgba(0,255,136,.2);
    }

    .agent-body { padding:16px 20px; flex:1; display:flex; flex-direction:column; gap:12px; }

    /* Quick prompts */
    .quick-prompts { display:flex; flex-wrap:wrap; gap:6px; }
    .quick-chip {
      padding:5px 12px; border-radius:20px; font-size:11px; font-weight:600;
      background:rgba(255,255,255,.04); border:1px solid var(--border);
      color:var(--text-muted); cursor:pointer; transition:.15s; white-space:nowrap;
    }
    .quick-chip:hover { border-color:var(--agent-color); color:var(--agent-color); background:rgba(255,255,255,.06); }

    /* Input */
    .agent-input-wrap { display:flex; gap:8px; }
    .agent-input {
      flex:1; background:rgba(255,255,255,.04); border:1px solid var(--border);
      border-radius:8px; padding:9px 14px; color:var(--text); font-size:12px;
      font-family:inherit; resize:none; min-height:44px; max-height:100px;
      transition:border-color .15s;
    }
    .agent-input:focus { outline:none; border-color:var(--agent-color); }
    .agent-send {
      padding:9px 16px; border-radius:8px; font-size:12px; font-weight:700;
      background:var(--agent-color); color:#000; border:none;
      cursor:pointer; transition:opacity .15s; white-space:nowrap;
      align-self:flex-end;
    }
    .agent-send:hover:not(:disabled) { opacity:.85; }
    .agent-send:disabled { opacity:.4; cursor:not-allowed; }

    /* Output */
    .agent-output {
      flex:1; min-height:180px; max-height:320px; overflow-y:auto;
      background:rgba(0,0,0,.35); border:1px solid var(--border); border-radius:8px;
      padding:14px 16px; font-size:12px; line-height:1.75; color:var(--text);
    }
    .agent-output.streaming { border-color:var(--agent-color); animation:glow-border 1.5s ease-in-out infinite; }
    @keyframes glow-border { 0%,100%{border-color:var(--agent-color)} 50%{border-color:transparent} }
    .agent-output h2,.agent-output h3 { font-family:'Bebas Neue',sans-serif; color:var(--agent-color); letter-spacing:.05em; margin:8px 0 4px; }
    .agent-output p  { margin:4px 0; }
    .agent-output ul { margin:4px 0 4px 16px; }
    .agent-output strong { color:#fff; }
    .agent-output table { width:100%; border-collapse:collapse; margin:8px 0; font-size:11px; }
    .agent-output th { padding:5px 8px; text-align:left; border-bottom:1px solid var(--border); font-weight:700; }
    .agent-output td { padding:5px 8px; border-bottom:1px solid rgba(255,255,255,.05); }
    .agent-placeholder { color:var(--text-faint); font-style:italic; text-align:center; padding:30px 16px; font-size:12px; }

    .agent-footer { display:flex; justify-content:space-between; align-items:center; }
    .agent-clear { font-size:11px; color:var(--text-faint); background:none; border:none; cursor:pointer; padding:2px 6px; }
    .agent-clear:hover { color:var(--text-muted); }
    .token-info { font-size:10px; color:var(--text-faint); font-family:monospace; }

    /* ── CEO Briefing full-width ── */
    .ceo-briefing {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:12px;
      overflow:hidden;
    }
    .briefing-head {
      padding:16px 24px;
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
      background:linear-gradient(135deg, rgba(0,0,0,.4) 0%, transparent 100%);
    }
    .briefing-title { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:.06em; display:flex; align-items:center; gap:10px; }
    .briefing-badge { font-size:10px; background:rgba(0,229,255,.08); color:var(--cyan); padding:3px 10px; border-radius:20px; border:1px solid rgba(0,229,255,.2); font-weight:700; }
    .briefing-body { padding:20px 24px; display:flex; flex-direction:column; gap:14px; }
    .briefing-output {
      min-height:200px; max-height:500px; overflow-y:auto;
      background:rgba(0,0,0,.35); border:1px solid var(--border); border-radius:8px;
      padding:16px 20px; font-size:12px; line-height:1.8; color:var(--text);
    }
    .briefing-output.streaming { border-color:var(--cyan); }
    .briefing-output h2 { font-family:'Bebas Neue',sans-serif; color:var(--cyan); letter-spacing:.06em; margin:10px 0 5px; font-size:18px; }
    .briefing-output h3 { font-family:'Bebas Neue',sans-serif; color:var(--gold); letter-spacing:.04em; margin:8px 0 4px; font-size:14px; }
    .briefing-output p  { margin:4px 0; }
    .briefing-output ul { margin:4px 0 4px 18px; }
    .briefing-output table { width:100%; border-collapse:collapse; margin:10px 0; font-size:11px; }
    .briefing-output th { background:rgba(0,229,255,.07); color:var(--cyan); padding:6px 10px; text-align:left; border-bottom:1px solid var(--border); }
    .briefing-output td { padding:6px 10px; border-bottom:1px solid rgba(255,255,255,.04); }
    .briefing-actions { display:flex; gap:10px; flex-wrap:wrap; }
    .btn-brief {
      padding:8px 18px; border-radius:7px; font-size:12px; font-weight:700;
      background:var(--cyan); color:#000; border:none; cursor:pointer; transition:opacity .15s;
      display:inline-flex; align-items:center; gap:6px;
    }
    .btn-brief:hover:not(:disabled) { opacity:.85; }
    .btn-brief:disabled { opacity:.4; cursor:not-allowed; }
    .btn-brief.secondary { background:rgba(0,229,255,.1); color:var(--cyan); border:1px solid rgba(0,229,255,.25); }
    .btn-brief.gold { background:var(--gold); color:#000; }
    .btn-outline-sm {
      padding:7px 14px; border-radius:7px; font-size:12px; font-weight:600;
      background:transparent; border:1px solid var(--border); color:var(--text-muted);
      cursor:pointer; transition:.15s;
    }
    .btn-outline-sm:hover { border-color:var(--cyan); color:var(--text); }

    /* refresh info */
    .refresh-info { font-size:11px; color:var(--text-faint); display:flex; align-items:center; gap:6px; }

    .spin { display:inline-block; width:13px; height:13px; border:2px solid rgba(0,255,136,.25); border-top-color:var(--green); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .spin-cyan { border-color:rgba(0,229,255,.25); border-top-color:var(--cyan); }
  </style>
</head>
<body>

<div id="app-root">
  <div style="padding:40px;text-align:center;color:var(--text-muted)">Cargando...</div>
</div>

<script>
'use strict';
/* ═════════════════════════════════════════════════════
   CEO COMMAND CENTER — 4 Director Agents + KPIs + Briefing
   ═════════════════════════════════════════════════════ */

let _user = null;
let _db   = null;
let _kpis = {};
let _refreshTimer = null;
const _streaming = {};   // { agentId: bool }

const AGENTS = [
  {
    id:      'ventas',
    name:    'MetaVentaX',
    role:    'Director Comercial & Ventas IA',
    icon:    '📈',
    color:   '#00ff88',
    system:  `Eres MetaVentaX, el Director Comercial IA de IBANOR SA de CV / MetaTronix.
Tu especialidad: pipeline de ventas, leads, conversión, estrategia comercial B2B en México.
Respondes en español, con datos precisos, recomendaciones accionables y métricas de negocio.
Formato: HTML semántico (h2, h3, p, ul, table, strong). Sin DOCTYPE ni etiquetas de documento.`,
    prompts: ['Estado del pipeline','Top 5 leads calientes','Forecast del mes','Estrategia de conversión','Análisis de objeciones'],
  },
  {
    id:      'marketing',
    name:    'MetaMKTX',
    role:    'Director de Marketing & Crecimiento IA',
    icon:    '🎯',
    color:   '#00e5ff',
    system:  `Eres MetaMKTX, el Director de Marketing IA de IBANOR SA de CV / MetaTronix.
Tu especialidad: growth marketing, campañas digitales, posicionamiento de marca, generación de demanda B2B en México.
Respondes en español con estrategias concretas, métricas de ROI y tácticas ejecutables.
Formato: HTML semántico (h2, h3, p, ul, table, strong). Sin DOCTYPE ni etiquetas de documento.`,
    prompts: ['Diagnóstico de canales','Plan de contenidos','Campaña generación leads','Análisis competitivo','ROI de marketing'],
  },
  {
    id:      'ops',
    name:    'MetaOps',
    role:    'Director de Operaciones & Procesos IA',
    icon:    '⚙️',
    color:   '#ffb400',
    system:  `Eres MetaOps, el Director de Operaciones IA de IBANOR SA de CV / MetaTronix.
Tu especialidad: eficiencia operacional, procesos internos, KPIs de operación, mejora continua, supply chain y tecnología.
Respondes en español con análisis de cuellos de botella, oportunidades de automatización y quick wins.
Formato: HTML semántico (h2, h3, p, ul, table, strong). Sin DOCTYPE ni etiquetas de documento.`,
    prompts: ['Diagnóstico operacional','Procesos a automatizar','KPIs de productividad','Reducción de costos','Roadmap tecnológico'],
  },
  {
    id:      'admin',
    name:    'MetaAdmin',
    role:    'Director Administrativo & Financiero IA',
    icon:    '💼',
    color:   '#b966ff',
    system:  `Eres MetaAdmin, el Director Administrativo y Financiero IA de IBANOR SA de CV / MetaTronix.
Tu especialidad: flujo de caja, administración empresarial, cobranza, compras, cumplimiento fiscal México (SAT, CFDI, IVA), contratos.
Respondes en español con análisis financiero ejecutivo, alertas de riesgo y recomendaciones de tesorería.
Formato: HTML semántico (h2, h3, p, ul, table, strong). Sin DOCTYPE ni etiquetas de documento.`,
    prompts: ['Estado financiero','Alertas de riesgo','Flujo de caja 30d','Prioridades de cobranza','Cumplimiento fiscal'],
  },
];

async function init() {
  _user = await requireAuth(true);
  if (!_user) return;

  // Solo admin y super_admin
  const role = _user?.profile?.role;
  if (!['admin','super_admin'].includes(role)) {
    window.location.href = '/dashboard.html';
    return;
  }

  _db = getDB();
  document.getElementById('app-root').innerHTML = buildShell();
  if (typeof renderHeader === 'function') {
    document.getElementById('sidebar-slot').innerHTML = renderHeader(_user, 'ceo');
  }
  if (typeof initCompanySwitcher === 'function') setTimeout(initCompanySwitcher, 60);

  await loadKPIs();
  _refreshTimer = setInterval(loadKPIs, 120_000); // auto-refresh cada 2 min
}

function buildShell() {
  return `
  <div style="display:flex;min-height:100vh">
    <div id="sidebar-slot"></div>
    <main style="flex:1;overflow:auto">
      <div class="ceo-root">

        <!-- Header -->
        <div class="page-header">
          <div>
            <h1><span class="live-dot"></span>CEO Command Center</h1>
            <p>Panel ejecutivo en tiempo real · Agentes directivos IA · MetaTronix / IBANOR SA de CV</p>
          </div>
          <div class="refresh-info">
            <span id="last-refresh">Cargando...</span>
            <button class="btn-outline-sm" onclick="loadKPIs()" style="padding:5px 12px;font-size:11px">↺</button>
          </div>
        </div>

        <!-- KPIs -->
        <div class="kpi-strip" id="kpi-strip">
          ${['Pipeline','Deals Activos','Ganados Mes','En Riesgo','Usuarios','IA Queries'].map(l =>
            `<div class="kpi-card"><div class="kpi-label">${l}</div><div class="kpi-value" style="color:var(--text-faint);font-size:18px">—</div></div>`
          ).join('')}
        </div>

        <!-- Agents grid -->
        <div class="agents-grid">
          ${AGENTS.map(a => buildAgentCard(a)).join('')}
        </div>

        <!-- CEO Briefing -->
        <div class="ceo-briefing">
          <div class="briefing-head">
            <div class="briefing-title">
              🧠 Briefing Ejecutivo CEO <span class="briefing-badge">Claude — Análisis Estratégico</span>
            </div>
            <div style="display:flex;gap:8px">
              <button class="btn-outline-sm" onclick="clearBriefing()">✕ Limpiar</button>
            </div>
          </div>
          <div class="briefing-body">
            <div class="briefing-output" id="briefing-out">
              <div class="agent-placeholder">El briefing ejecutivo integra KPIs y contexto de todos los directores.<br>Selecciona el tipo de análisis para generar.</div>
            </div>
            <div class="briefing-actions">
              <button class="btn-brief" id="btn-daily" onclick="generateBriefing('daily')">⚡ Briefing Diario</button>
              <button class="btn-brief secondary" id="btn-strategy" onclick="generateBriefing('strategy')">🎯 Revisión Estratégica</button>
              <button class="btn-brief gold" id="btn-risk" onclick="generateBriefing('risk')">🚨 Análisis de Riesgos</button>
              <button class="btn-outline-sm" id="btn-week" onclick="generateBriefing('week')">📊 Cierre Semana</button>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>`;
}

function buildAgentCard(a) {
  return `
  <div class="agent-card" style="--agent-color:${a.color}">
    <div class="agent-head">
      <div class="agent-icon">${a.icon}</div>
      <div class="agent-meta">
        <div class="agent-name">${a.name}</div>
        <div class="agent-role">${a.role}</div>
      </div>
      <div class="agent-status">● ACTIVO</div>
    </div>
    <div class="agent-body">
      <div class="quick-prompts">
        ${a.prompts.map(p => `<button class="quick-chip" onclick="askAgent('${a.id}','${p.replace(/'/g,"\\'")}')">→ ${p}</button>`).join('')}
      </div>
      <div class="agent-input-wrap">
        <textarea class="agent-input" id="input-${a.id}"
          placeholder="Pregunta al ${a.name}..."
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAgent('${a.id}')}"
          rows="2"></textarea>
        <button class="agent-send" id="send-${a.id}" onclick="sendAgent('${a.id}')" style="background:${a.color}">
          ▶ Enviar
        </button>
      </div>
      <div class="agent-output" id="out-${a.id}" style="--agent-color:${a.color}">
        <div class="agent-placeholder">Listo para responder · ${a.name}</div>
      </div>
      <div class="agent-footer">
        <button class="agent-clear" onclick="clearAgent('${a.id}')">✕ Limpiar</button>
        <span class="token-info" id="tokens-${a.id}"></span>
      </div>
    </div>
  </div>`;
}

/* ── KPIs ── */
async function loadKPIs() {
  const companyId = _user?.profile?.company_id;
  const strip = document.getElementById('kpi-strip');
  if (!strip) return;

  try {
    const [leadsRes, profilesRes, actRes] = await Promise.all([
      _db.from('leads')
        .select('id,status,pipeline_value,created_at')
        .eq('company_id', companyId)
        .limit(1000),
      _db.from('profiles')
        .select('id,role')
        .eq('company_id', companyId),
      _db.from('activity_logs')
        .select('id,created_at')
        .eq('company_id', companyId)
        .gte('created_at', new Date(Date.now()-30*864e5).toISOString())
        .like('action', '%claude%')
        .limit(500),
    ]);

    const leads    = leadsRes.data  || [];
    const profiles = profilesRes.data || [];
    const acts     = actRes.data    || [];

    const now      = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();

    const pipeline    = leads.filter(l => !['ganado','perdido','cancelado'].includes(l.status))
                             .reduce((s,l) => s + (l.pipeline_value||0), 0);
    const activos     = leads.filter(l => !['ganado','perdido','cancelado'].includes(l.status)).length;
    const ganadosMes  = leads.filter(l => l.status === 'ganado' && l.created_at >= monthStart).length;
    const enRiesgo    = leads.filter(l => l.status === 'en_riesgo' || l.status === 'perdido').length;
    const usuarios    = profiles.length;
    const aiQueries   = acts.length;

    _kpis = { pipeline, activos, ganadosMes, enRiesgo, usuarios, aiQueries };

    const fmt = n => n >= 1e6
      ? '$' + (n/1e6).toFixed(1) + 'M'
      : n >= 1e3 ? '$' + (n/1e3).toFixed(0) + 'K'
      : '$' + n.toFixed(0);

    strip.innerHTML = `
      <div class="kpi-card" style="--kpi-color:${pipeline>0?'#00ff88':'#888'}">
        <div class="kpi-label">Pipeline Total</div>
        <div class="kpi-value">${fmt(pipeline)}</div>
        <div class="kpi-sub">${activos} deals activos</div>
      </div>
      <div class="kpi-card" style="--kpi-color:#00e5ff">
        <div class="kpi-label">Deals Activos</div>
        <div class="kpi-value">${activos}</div>
        <div class="kpi-sub">En proceso</div>
      </div>
      <div class="kpi-card" style="--kpi-color:#00ff88">
        <div class="kpi-label">Ganados Mes</div>
        <div class="kpi-value">${ganadosMes}</div>
        <div class="kpi-sub">Deals cerrados</div>
      </div>
      <div class="kpi-card" style="--kpi-color:${enRiesgo>0?'#ff4646':'#888'}">
        <div class="kpi-label">En Riesgo</div>
        <div class="kpi-value" style="color:${enRiesgo>0?'#ff4646':'inherit'}">${enRiesgo}</div>
        <div class="kpi-sub">Requieren atención</div>
      </div>
      <div class="kpi-card" style="--kpi-color:#b966ff">
        <div class="kpi-label">Usuarios</div>
        <div class="kpi-value">${usuarios}</div>
        <div class="kpi-sub">En plataforma</div>
      </div>
      <div class="kpi-card" style="--kpi-color:#ffb400">
        <div class="kpi-label">IA Queries</div>
        <div class="kpi-value">${aiQueries}</div>
        <div class="kpi-sub">Últimos 30 días</div>
      </div>
    `;

    const el = document.getElementById('last-refresh');
    if (el) el.textContent = 'Actualizado ' + new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    console.warn('loadKPIs:', e);
    const el = document.getElementById('last-refresh');
    if (el) el.textContent = 'Error cargando KPIs';
  }
}

/* ── Agent interaction ── */
function askAgent(agentId, prompt) {
  const input = document.getElementById('input-'+agentId);
  if (input) { input.value = prompt; input.focus(); }
  sendAgent(agentId);
}

async function sendAgent(agentId) {
  if (_streaming[agentId]) return;
  const input   = document.getElementById('input-'+agentId);
  const out     = document.getElementById('out-'+agentId);
  const sendBtn = document.getElementById('send-'+agentId);
  const tokEl   = document.getElementById('tokens-'+agentId);
  if (!input || !out) return;

  const question = input.value.trim();
  if (!question) return;

  const agent = AGENTS.find(a => a.id === agentId);
  if (!agent) return;

  _streaming[agentId] = true;
  sendBtn.disabled = true;
  sendBtn.innerHTML = '<span class="spin"></span>';
  out.classList.add('streaming');
  out.innerHTML = `<div style="color:var(--text-faint);font-size:12px;display:flex;align-items:center;gap:8px"><span class="spin"></span> ${agent.name} está procesando...</div>`;
  input.value = '';

  // Build context with KPIs
  const kpiCtx = _kpis.pipeline !== undefined ? `
CONTEXTO EJECUTIVO (datos en tiempo real):
- Pipeline comercial: $${(_kpis.pipeline||0).toLocaleString('es-MX')} MXN
- Deals activos: ${_kpis.activos||0}
- Ganados este mes: ${_kpis.ganadosMes||0}
- En riesgo/perdidos: ${_kpis.enRiesgo||0}
- Usuarios plataforma: ${_kpis.usuarios||0}
- AI queries (30d): ${_kpis.aiQueries||0}
` : '';

  const fullPrompt = kpiCtx + '\nPREGUNTA DEL CEO: ' + question;

  try {
    const session = await getSession();
    const jwt = session?.access_token || '';
    const proxyUrl = (window.MTX_CONFIG?.CLAUDE_PROXY_URL||'').replace(/\/+$/,'');
    if (!proxyUrl) throw new Error('CLAUDE_PROXY_URL no configurado en config.js');

    const resp = await fetch(proxyUrl + '/groq', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+jwt},
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',
        max_tokens:2048,
        system: agent.system,
        messages:[{role:'user', content:fullPrompt}],
        stream:true,
      }),
      signal:AbortSignal.timeout(90000),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(()=>({error:resp.statusText}));
      throw new Error(err.error || 'Error '+resp.status);
    }

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf=''; let html=''; let inputTokens=0; let outputTokens=0;
    out.innerHTML = '';

    while(true) {
      const {done,value} = await reader.read();
      if(done) break;
      buf += dec.decode(value,{stream:true});
      const lines = buf.split('\n');
      buf = lines.pop();
      for(const line of lines) {
        if(!line.startsWith('data:')) continue;
        const d = line.slice(5).trim();
        if(d==='[DONE]') break;
        try {
          const j = JSON.parse(d);
          if(j.type==='content_block_delta'&&j.delta?.type==='text_delta') html += j.delta.text;
          if(j.type==='message_start') { inputTokens = j.message?.usage?.input_tokens||0; }
          if(j.type==='message_delta') { outputTokens = j.usage?.output_tokens||0; }
        } catch {}
      }
      out.innerHTML = html;
      out.scrollTop = out.scrollHeight;
    }
    out.innerHTML = html || '<em style="color:var(--text-faint)">Sin respuesta.</em>';
    if(tokEl) tokEl.textContent = `${inputTokens}↑ ${outputTokens}↓ tokens`;
  } catch(e) {
    out.innerHTML = `<span style="color:#ff4646">Error: ${e.message}</span>`;
  } finally {
    _streaming[agentId] = false;
    sendBtn.disabled = false;
    sendBtn.innerHTML = '▶ Enviar';
    out.classList.remove('streaming');
  }
}

function clearAgent(agentId) {
  const agent = AGENTS.find(a => a.id === agentId);
  const out = document.getElementById('out-'+agentId);
  const tok = document.getElementById('tokens-'+agentId);
  if (out) out.innerHTML = `<div class="agent-placeholder">Listo para responder · ${agent?.name||''}</div>`;
  if (tok) tok.textContent = '';
}
