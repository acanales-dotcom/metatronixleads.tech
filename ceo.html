<!DOCTYPE html>
<html lang="es">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co https://*.workers.dev wss://*.supabase.co https://api.groq.com; object-src 'none'; base-uri 'self';">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>CEO Nerve Center — MetaTronix</title>
  <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/assets/fonts.css">
  <link rel="stylesheet" href="/assets/style.css?v=20260420">
  <script src="/assets/libs/supabase.min.js"></script>
  <script src="/config.js?v=20260420"></script>
  <script src="/assets/app.js?v=20260420i"></script>
  <style>
    :root {
      --green:#00ff88; --cyan:#00e5ff; --gold:#ffb400;
      --purple:#b966ff; --red:#ff4646; --orange:#ff8c00;
    }

    /* ── ROOT ─────────────────────────────────────────────────── */
    .nc-root { display:flex; flex-direction:column; gap:24px; padding:24px; max-width:1440px; margin:0 auto; }

    /* ── HEADER ──────────────────────────────────────────────── */
    .nc-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
    .nc-header-left h1 { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:.06em; margin:0; display:flex; align-items:center; gap:10px; }
    .nc-header-left p { font-size:11px; color:var(--text-muted); margin:2px 0 0; }
    .live-dot { display:inline-block; width:8px; height:8px; background:var(--green); border-radius:50%; animation:blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* ── ORG HEALTH SCORE ─────────────────────────────────────── */
    .health-bar {
      display:flex; align-items:center; gap:12px;
      background:var(--surface); border:1px solid var(--border); border-radius:10px;
      padding:10px 18px;
    }
    .health-score {
      font-family:'JetBrains Mono',monospace; font-size:28px; font-weight:700;
      line-height:1; min-width:52px;
    }
    .health-label { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text-faint); }
    .health-sub { font-size:11px; color:var(--text-muted); }
    .health-track { flex:1; height:6px; background:rgba(255,255,255,.06); border-radius:3px; overflow:hidden; min-width:80px; }
    .health-fill { height:100%; border-radius:3px; transition:width .6s ease; }
    .ts-badge { font-size:10px; color:var(--text-faint); white-space:nowrap; }

    /* ── ORG PULSE STRIP ──────────────────────────────────────── */
    .pulse-strip { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; }
    .pulse-card {
      background:var(--surface); border:1px solid var(--border); border-radius:10px;
      padding:12px 14px; position:relative; overflow:hidden; cursor:default;
      transition:border-color .2s, box-shadow .2s;
    }
    .pulse-card:hover { border-color:var(--pc,var(--border)); box-shadow:0 0 14px -5px var(--pc,transparent); }
    .pulse-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:var(--pc,var(--green)); opacity:.45; }
    .pc-label { font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text-faint); }
    .pc-value { font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:600; color:var(--pc,var(--text)); margin:4px 0 2px; line-height:1; }
    .pc-sub { font-size:10px; color:var(--text-muted); }

    /* ── UNIVERSAL QUERY BAR ─────────────────────────────────── */
    .query-section { display:flex; flex-direction:column; gap:10px; }
    .query-label { font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--text-faint); }
    .query-bar {
      display:flex; gap:10px; align-items:stretch;
      background:var(--surface); border:1px solid var(--border); border-radius:12px;
      padding:10px 14px; transition:border-color .2s;
    }
    .query-bar:focus-within { border-color:var(--cyan); box-shadow:0 0 0 2px rgba(0,229,255,.08); }
    .query-icon { font-size:20px; display:flex; align-items:center; padding-right:4px; opacity:.5; }
    .query-input {
      flex:1; background:transparent; border:none; outline:none; font-size:15px;
      color:var(--text); font-family:'DM Sans',sans-serif; font-weight:500;
      resize:none; min-height:24px; max-height:120px; line-height:1.5;
    }
    .query-input::placeholder { color:var(--text-faint); }
    .query-send {
      padding:8px 20px; border-radius:8px; font-size:12px; font-weight:700;
      background:var(--cyan); color:#000; border:none; cursor:pointer;
      transition:opacity .15s; white-space:nowrap; align-self:flex-end;
    }
    .query-send:hover:not(:disabled) { opacity:.85; }
    .query-send:disabled { opacity:.4; cursor:not-allowed; }
    .query-chips { display:flex; flex-wrap:wrap; gap:6px; }
    .q-chip {
      padding:5px 12px; border-radius:20px; font-size:11px; font-weight:600;
      background:rgba(0,229,255,.06); border:1px solid rgba(0,229,255,.15); color:var(--cyan);
      cursor:pointer; transition:.15s;
    }
    .q-chip:hover { background:rgba(0,229,255,.12); border-color:rgba(0,229,255,.35); }

    /* ── QUERY RESPONSE ──────────────────────────────────────── */
    .query-response {
      background:rgba(0,0,0,.35); border:1px solid var(--border); border-radius:10px;
      padding:18px 22px; font-size:13px; line-height:1.8; color:var(--text);
      min-height:80px; max-height:600px; overflow-y:auto; display:none;
    }
    .query-response.active { display:block; border-color:var(--cyan); }
    .query-response h2 { font-family:'Bebas Neue',sans-serif; color:var(--cyan); letter-spacing:.05em; margin:8px 0 4px; font-size:20px; }
    .query-response h3 { font-family:'Bebas Neue',sans-serif; color:var(--gold); margin:10px 0 4px; font-size:15px; }
    .query-response p { margin:5px 0; }
    .query-response ul { margin:4px 0 4px 16px; }
    .query-response strong { color:#fff; }
    .query-response table { width:100%; border-collapse:collapse; margin:8px 0; font-size:12px; }
    .query-response th { background:rgba(0,229,255,.07); color:var(--cyan); padding:5px 8px; text-align:left; border-bottom:1px solid var(--border); }
    .query-response td { padding:5px 8px; border-bottom:1px solid rgba(255,255,255,.03); }
    .query-meta { display:flex; align-items:center; gap:8px; margin-top:12px; padding-top:10px; border-top:1px solid rgba(255,255,255,.05); }
    .domain-badge { padding:3px 9px; border-radius:20px; font-size:10px; font-weight:700; background:rgba(0,229,255,.08); color:var(--cyan); border:1px solid rgba(0,229,255,.2); }

    /* ── TWO-COL LAYOUT ──────────────────────────────────────── */
    .nc-cols { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
    @media(max-width:900px) { .nc-cols { grid-template-columns:1fr; } }

    /* ── PANEL BASE ──────────────────────────────────────────── */
    .nc-panel {
      background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden;
    }
    .nc-panel-head {
      padding:13px 18px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
      background:linear-gradient(135deg,rgba(0,0,0,.4) 0%,transparent 100%);
    }
    .nc-panel-title { font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:.05em; display:flex; align-items:center; gap:8px; }
    .nc-panel-body { padding:16px 18px; }

    /* ── BRIEFING ────────────────────────────────────────────── */
    .briefing-btns { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
    .btn-brief {
      padding:8px 16px; border-radius:7px; font-size:11px; font-weight:700;
      border:none; cursor:pointer; transition:opacity .15s;
    }
    .btn-brief:hover:not(:disabled) { opacity:.85; }
    .btn-brief:disabled { opacity:.35; cursor:not-allowed; }
    .btn-brief.green  { background:var(--green);  color:#000; }
    .btn-brief.cyan   { background:var(--cyan);   color:#000; }
    .btn-brief.gold   { background:var(--gold);   color:#000; }
    .btn-brief.ghost  { background:rgba(255,255,255,.05); color:var(--text-muted); border:1px solid var(--border); }
    .briefing-out {
      min-height:180px; max-height:500px; overflow-y:auto;
      background:rgba(0,0,0,.35); border:1px solid var(--border); border-radius:8px;
      padding:14px 18px; font-size:13px; line-height:1.8; color:var(--text);
    }
    .briefing-out.streaming { border-color:var(--cyan); }
    .briefing-out h2 { font-family:'Bebas Neue',sans-serif; color:var(--cyan); letter-spacing:.05em; margin:8px 0 4px; font-size:19px; }
    .briefing-out h3 { font-family:'Bebas Neue',sans-serif; color:var(--gold); margin:8px 0 3px; font-size:14px; }
    .briefing-out p { margin:4px 0; }
    .briefing-out ul { margin:3px 0 3px 16px; }
    .briefing-out strong { color:#fff; }
    .briefing-out table { width:100%; border-collapse:collapse; margin:8px 0; font-size:12px; }
    .briefing-out th { background:rgba(0,229,255,.07); color:var(--cyan); padding:5px 8px; text-align:left; border-bottom:1px solid var(--border); }
    .briefing-out td { padding:5px 8px; border-bottom:1px solid rgba(255,255,255,.04); }
    .placeholder-msg { color:var(--text-faint); font-style:italic; text-align:center; padding:40px 20px; font-size:12px; }

    /* ── CEO KB PANEL ────────────────────────────────────────── */
    .ceo-kb-panel {
      background:linear-gradient(135deg,#0a1628 0%,#0d2040 100%);
      border-bottom:1px solid rgba(0,229,255,.15);
      padding:16px 24px; display:none;
    }
    .ceo-kb-panel.open { display:block; }
    .ceo-kb-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:12px; }
    @media(max-width:900px){ .ceo-kb-grid { grid-template-columns:1fr; } }
    .ceo-kb-field { display:flex; flex-direction:column; gap:5px; }
    .ceo-kb-field label { font-size:10px; font-weight:700; color:rgba(0,229,255,.6); letter-spacing:.08em; text-transform:uppercase; }
    .ceo-kb-field textarea,.ceo-kb-field input {
      border:1px solid rgba(0,229,255,.18); background:rgba(0,229,255,.04);
      color:#e2e8f0; border-radius:6px; padding:8px 10px;
      font-family:'DM Sans',sans-serif; font-size:12px; resize:none;
      outline:none; transition:border-color .15s;
    }
    .ceo-kb-field textarea::placeholder,.ceo-kb-field input::placeholder { color:rgba(255,255,255,.3); }
    .ceo-kb-field textarea:focus,.ceo-kb-field input:focus { border-color:var(--cyan); }
    .ceo-kb-status { font-size:10px; color:var(--text-faint); margin-top:8px; display:flex; align-items:center; gap:6px; }
    .ceo-kb-dot { width:6px; height:6px; border-radius:50%; background:#4ADE80; display:inline-block; }
    .ceo-kb-dot.empty { background:#4b5563; }

    /* ── DECISION HISTORY ────────────────────────────────────── */
    .decision-list { display:flex; flex-direction:column; gap:10px; max-height:440px; overflow-y:auto; }
    .decision-item {
      background:rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.05); border-radius:8px;
      padding:11px 14px; cursor:pointer; transition:border-color .2s;
    }
    .decision-item:hover { border-color:rgba(0,229,255,.25); }
    .decision-q { font-size:12px; font-weight:600; color:var(--text); margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .decision-meta { display:flex; align-items:center; gap:8px; }
    .decision-ts { font-size:10px; color:var(--text-faint); }
    .decision-dom { font-size:10px; padding:2px 7px; border-radius:20px; background:rgba(0,229,255,.07); color:var(--cyan); border:1px solid rgba(0,229,255,.15); }
    .decision-preview { font-size:11px; color:var(--text-muted); margin-top:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .empty-state { text-align:center; color:var(--text-faint); font-size:12px; padding:30px 10px; }

    /* ── DIRECTOR GRID ───────────────────────────────────────── */
    .dir-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
    @media(max-width:1100px) { .dir-grid { grid-template-columns:repeat(2,1fr); } }
    .dir-card {
      background:rgba(0,0,0,.2); border:1px solid var(--border); border-radius:10px;
      padding:14px; text-decoration:none; transition:border-color .2s, box-shadow .2s;
      display:flex; flex-direction:column; gap:8px;
    }
    .dir-card:hover { border-color:var(--dc); box-shadow:0 0 16px -6px var(--dc); }
    .dir-icon { font-size:22px; }
    .dir-name { font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:.06em; color:var(--dc); }
    .dir-role { font-size:10px; color:var(--text-muted); line-height:1.4; }
    .dir-arrow { font-size:10px; color:var(--dc); margin-top:auto; opacity:.7; }

    /* ── SPIN ────────────────────────────────────────────────── */
    .spin { display:inline-block; width:14px; height:14px; border:2px solid rgba(0,255,136,.2); border-top-color:var(--green); border-radius:50%; animation:sp .7s linear infinite; }
    .spin-cyan { border-color:rgba(0,229,255,.2); border-top-color:var(--cyan); }
    @keyframes sp { to{transform:rotate(360deg)} }

    /* ── BUTTONS ─────────────────────────────────────────────── */
    .btn-sm {
      padding:6px 12px; border-radius:7px; font-size:11px; font-weight:600;
      background:transparent; border:1px solid var(--border); color:var(--text-muted);
      cursor:pointer; transition:.15s;
    }
    .btn-sm:hover { border-color:var(--cyan); color:var(--text); }
  </style>
</head>
<body>

<div id="app-root">
  <div style="padding:40px;text-align:center;color:var(--text-muted)">
    <span class="spin"></span> Cargando CEO Nerve Center...
  </div>
</div>

<script>
'use strict';

/* ── ESTADO ─────────────────────────────────────────────────────────────── */
let _user = null, _db = null;
let _pulse = {};          // último snapshot org_pulse
let _briefingBusy = false;
let _queryBusy    = false;
let _refreshTimer = null;
let _decisions    = [];   // historial executive_decisions

/* ── DIRECTORES ─────────────────────────────────────────────────────────── */
const DIRECTORS = [
  { id:'ventas',    icon:'📈', name:'MetaVentaX', role:'Director Comercial & Ventas IA',       color:'#00ff88', href:'/ventas.html#director' },
  { id:'marketing', icon:'🎯', name:'MetaMKTX',   role:'Director de Marketing & Crecimiento IA', color:'#00e5ff', href:'/marketing.html#director-mktx' },
  { id:'ops',       icon:'⚙️', name:'MetaOps',    role:'Director de Operaciones & Procesos IA', color:'#ffb400', href:'/director-ops.html' },
  { id:'admin',     icon:'💼', name:'MetaAdmin',  role:'Director Administrativo & Financiero IA', color:'#b966ff', href:'/finanzas.html#director' },
];

/* ── QUICK QUERIES ──────────────────────────────────────────────────────── */
const QUICK_QUERIES = [
  '¿Cuál es el riesgo más urgente esta semana?',
  '¿Cómo está el flujo de caja?',
  '¿Cuánto pipeline tenemos y qué tan sano está?',
  '¿Qué facturas urgentes necesitan atención hoy?',
  '¿Cuál es el estado del equipo y adopción de IA?',
  '¿Qué decisiones necesito tomar hoy?',
];

/* ── INIT ───────────────────────────────────────────────────────────────── */
async function init() {
  _user = await requireAuth(true);
  if (!_user) return;

  const role = _user?.profile?.role;
  if (!['admin','super_admin'].includes(role)) {
    window.location.href = '/home.html';
    return;
  }

  _db = getDB();
  document.getElementById('app-root').innerHTML = buildShell();
  if (typeof renderHeader === 'function') {
    document.getElementById('sidebar-slot').innerHTML = renderHeader(_user, 'ceo');
  }
  if (typeof initCompanySwitcher === 'function') setTimeout(initCompanySwitcher, 60);
  setTimeout(initCEOKB, 80);

  // Carga paralela
  await Promise.all([loadPulse(), loadDecisions()]);
  _refreshTimer = setInterval(() => { loadPulse(); loadDecisions(); }, 90_000);

  // Recargar al cambiar de empresa
  window.addEventListener('mtx:companySwitch', () => {
    clearInterval(_refreshTimer);
    Promise.all([loadPulse(), loadDecisions()]);
    _refreshTimer = setInterval(() => { loadPulse(); loadDecisions(); }, 90_000);
  });
}

/* ── SHELL ──────────────────────────────────────────────────────────────── */
function buildShell() {
  return `
  <div style="display:flex;min-height:100vh">
    <div id="sidebar-slot"></div>
    <main style="flex:1;overflow:auto">
      <div class="nc-root">

        <!-- HEADER -->
        <div class="nc-header">
          <div class="nc-header-left">
            <h1><span class="live-dot"></span> CEO Nerve Center</h1>
            <p>Inteligencia organizacional unificada · <span id="ceo-company-label">IBANOR SA de CV / MetaTronix</span></p>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <div id="health-bar-slot"></div>
            <button class="btn-sm" onclick="toggleCEOKB()" id="ceo-kb-btn" title="Contexto de la empresa" style="background:rgba(0,229,255,.08);border-color:rgba(0,229,255,.2);color:var(--cyan)">🧠 KB</button>
            <button class="btn-sm" onclick="refreshAll()" title="Actualizar datos">↺</button>
          </div>
        </div>

        <!-- CEO KNOWLEDGE BASE PANEL -->
        <div class="ceo-kb-panel" id="ceo-kb-panel">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div style="font-size:11px;font-weight:700;color:var(--cyan);letter-spacing:.08em;text-transform:uppercase">🧠 Contexto Organizacional — CEO Knowledge Base</div>
            <div class="ceo-kb-status"><span class="ceo-kb-dot empty" id="ceo-kb-dot"></span><span id="ceo-kb-status-text">Sin contexto — los agentes usarán datos del sistema únicamente</span></div>
          </div>
          <div class="ceo-kb-grid">
            <div class="ceo-kb-field">
              <label>Empresa</label>
              <input id="ceo-kb-empresa" placeholder="MetaTronix — CRM + IA para LATAM">
            </div>
            <div class="ceo-kb-field">
              <label>Sector / Industria</label>
              <input id="ceo-kb-sector" placeholder="SaaS B2B · Software empresarial · LATAM">
            </div>
            <div class="ceo-kb-field">
              <label>Competidores clave</label>
              <input id="ceo-kb-competidores" placeholder="Salesforce, HubSpot, Pipedrive, Zoho CRM">
            </div>
            <div class="ceo-kb-field" style="grid-column:span 2">
              <label>Prioridades estratégicas 2026</label>
              <textarea id="ceo-kb-estrategia" rows="2" placeholder="Escalar a 100 clientes, lanzar módulo de IA predictiva, expandir a Colombia y Argentina, reducir churn < 5%..."></textarea>
            </div>
            <div class="ceo-kb-field">
              <label>Retos críticos actuales</label>
              <textarea id="ceo-kb-retos" rows="2" placeholder="Pipeline bajo, cobranza vencida alta, adopción de la plataforma por el equipo..."></textarea>
            </div>
          </div>
          <div style="margin-top:10px;display:flex;gap:8px">
            <button onclick="saveCEOKB()" style="padding:6px 14px;font-size:11px;font-weight:700;background:var(--cyan);color:#000;border:none;border-radius:6px;cursor:pointer">Guardar contexto</button>
            <button onclick="clearCEOKB()" style="padding:6px 14px;font-size:11px;font-weight:600;background:rgba(255,255,255,.06);color:var(--text-muted);border:1px solid var(--border);border-radius:6px;cursor:pointer">Limpiar</button>
          </div>
        </div>

        <!-- ORG PULSE STRIP -->
        <div class="pulse-strip" id="pulse-strip">
          ${Array(12).fill(0).map(()=>`
            <div class="pulse-card">
              <div class="pc-label" style="background:rgba(255,255,255,.05);width:60%;height:8px;border-radius:4px;margin-bottom:6px"></div>
              <div class="pc-value" style="color:var(--text-faint)">—</div>
            </div>`).join('')}
        </div>

        <!-- UNIVERSAL QUERY BAR -->
        <div class="query-section">
          <div class="query-label">🧠 Pregunta a la organización</div>
          <div class="query-bar">
            <div class="query-icon">🔍</div>
            <textarea class="query-input" id="query-input"
              placeholder="¿Cuál es el riesgo más grande esta semana? · ¿Cómo está el flujo de caja? · ¿Qué decisiones necesito tomar hoy?"
              rows="1"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendQuery();}"
              oninput="autoResize(this)"></textarea>
            <button class="query-send" id="query-send-btn" onclick="sendQuery()">Preguntar →</button>
          </div>
          <div class="query-chips">
            ${QUICK_QUERIES.map(q=>`<button class="q-chip" onclick="setQuery(this)">${q}</button>`).join('')}
          </div>
          <div class="query-response" id="query-response"></div>
        </div>

        <!-- DIRECTORS ROW -->
        <div>
          <div style="font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);margin-bottom:10px">Directores IA — Acceso Directo</div>
          <div class="dir-grid">
            ${DIRECTORS.map(d=>`
              <a class="dir-card" href="${d.href}" style="--dc:${d.color}">
                <div class="dir-icon">${d.icon}</div>
                <div class="dir-name">${d.name}</div>
                <div class="dir-role">${d.role}</div>
                <div class="dir-arrow">Abrir director →</div>
              </a>`).join('')}
          </div>
        </div>

        <!-- TWO-COL: BRIEFING + HISTORIAL -->
        <div class="nc-cols">

          <!-- CEO BRIEFING -->
          <div class="nc-panel">
            <div class="nc-panel-head">
              <div class="nc-panel-title">🧬 Briefing Ejecutivo <span style="font-size:11px;color:var(--cyan);background:rgba(0,229,255,.07);padding:2px 8px;border-radius:20px;border:1px solid rgba(0,229,255,.2);font-family:'DM Sans',sans-serif;letter-spacing:0">Claude Sonnet</span></div>
              <button class="btn-sm" onclick="clearBriefing()">✕ Limpiar</button>
            </div>

/* ── LOAD PULSE ──────────────────────────────────────────────────────────── */
async function loadPulse() {
  try {
    // Intentar RPC primero
    const { data: rpcData } = await _db.rpc('get_org_pulse_latest');
    if (rpcData && rpcData.length > 0) {
      _pulse = rpcData[0];
    } else {
      // Fallback: calcular desde tablas directas
      _pulse = await computePulseFromDB();
      // Guardar snapshot para futura referencia
      savePulseSnapshot(_pulse);
    }
  } catch(e) {
    // RPC no existe aún — computar desde DB
    try { _pulse = await computePulseFromDB(); } catch(e2) { console.warn('loadPulse:', e2); }
  }
  renderPulse();
}

async function computePulseFromDB() {
  const companyId = getActiveCompanyId() || _user?.profile?.company_id;
  const monthStart = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString();
  const days7  = new Date(Date.now() - 7*864e5).toISOString();
  const days30 = new Date(Date.now() - 30*864e5).toISOString();

  const [leadsR, invOutR, invInR, ocR, reqR, profilesR, actR] = await Promise.all([
    _db.from('leads').select('id,status,valor_estimado,pipeline_stage,created_at').eq('company_id', companyId).limit(2000),
    _db.from('invoices_out').select('id,total,due_date,status').eq('company_id', companyId).limit(1000),
    _db.from('invoices_in').select('id,total,due_date,status').eq('company_id', companyId).limit(1000),
    _db.from('purchase_orders').select('id,total_amount,status').eq('company_id', companyId).limit(500),
    _db.from('requisitions').select('id,status').eq('company_id', companyId).limit(500),
    _db.from('profiles').select('id').eq('company_id', companyId),
    _db.from('activity_logs').select('id').eq('company_id', companyId).gte('created_at', new Date(Date.now()-864e5).toISOString()).like('action','%claude%').limit(500),
  ]);

  const leads    = leadsR.data  || [];
  const invOut   = invOutR.data || [];
  const invIn    = invInR.data  || [];
  const ocs      = ocR.data     || [];
  const reqs     = reqR.data    || [];
  const profiles = profilesR.data || [];
  const acts     = actR.data    || [];
  const today    = new Date().toISOString().split('T')[0];
  const days30Fwd = new Date(Date.now() + 30*864e5).toISOString().split('T')[0];

  const active     = leads.filter(l=>!['cerrado_ganado','cerrado_perdido','cancelado','cierre'].includes(l.status));
  const pipeline   = active.reduce((s,l)=>s+(l.valor_estimado||0),0);
  const ganadosMes = leads.filter(l=>['cerrado_ganado','cierre'].includes(l.status)&&l.created_at>=monthStart).length;
  const enRiesgo   = leads.filter(l=>['cerrado_perdido','en_riesgo'].includes(l.status)).length;
  const leads7d    = leads.filter(l=>l.created_at>=days7).length;
  const closedLst30= leads.filter(l=>l.created_at>=days30&&['ganado','perdido'].includes(l.status));
  const convRate   = closedLst30.length > 0 ? Math.round(closedLst30.filter(l=>l.status==='ganado').length / closedLst30.length * 100) : 0;

  const unpaidOut  = invOut.filter(i=>!['pagada','cancelada'].includes(i.status));
  const cxcTotal   = unpaidOut.reduce((s,i)=>s+(i.total||0),0);
  const cxcVencida = unpaidOut.filter(i=>(i.due_date||'9999')<today).reduce((s,i)=>s+(i.total||0),0);
  const cobUrg     = unpaidOut.filter(i=>{const d=new Date(i.due_date||'9999'); return (new Date()-d)>60*864e5;}).length;

  const unpaidIn   = invIn.filter(i=>!['pagada','cancelada'].includes(i.status));
  const cxpTotal   = unpaidIn.reduce((s,i)=>s+(i.total||0),0);
  const cxp30      = unpaidIn.filter(i=>{const d=(i.due_date||''); return d>=today&&d<=days30Fwd;}).reduce((s,i)=>s+(i.total||0),0);

  const ocPend     = ocs.filter(o=>['pendiente','borrador','enviada'].includes(o.status));
  const ocMonto    = ocPend.reduce((s,o)=>s+(o.total_amount||0),0);
  const reqOpen    = reqs.filter(r=>['borrador','pendiente','aprobada'].includes(r.status)).length;

  // Health score
  const health = computeHealthScore({
    pipeline, cxcTotal, cxcVencida, active: active.length, enRiesgo,
    cobUrg, ocPend: ocPend.length, ai24h: acts.length, convRate
  });

  return {
    captured_at: new Date().toISOString(), source: 'browser',
    pipeline_total: pipeline, deals_activos: active.length,
    deals_ganados_mes: ganadosMes, deals_en_riesgo: enRiesgo,
    leads_nuevos_7d: leads7d, conversion_rate: convRate,
    cxc_total: cxcTotal, cxc_vencida: cxcVencida,
    cxp_total: cxpTotal, cxp_proximos_30d: cxp30,
    flujo_neto: cxcTotal - cxpTotal,
    cobranza_urgente: cobUrg,
    oc_pendientes: ocPend.length, oc_monto_pendiente: ocMonto,
    requisiciones_abiertas: reqOpen,
    usuarios_activos: profiles.length,
    ai_queries_24h: acts.length, ai_queries_7d: 0,
    org_health_score: health.total, health_breakdown: health,
  };
}

function computeHealthScore({ pipeline, cxcTotal, cxcVencida, active, enRiesgo, cobUrg, ocPend, ai24h, convRate }) {
  const s_pipe  = pipeline>5e6?25:pipeline>1e6?20:pipeline>5e5?15:pipeline>1e5?10:pipeline>0?5:0;
  const pctVen  = cxcTotal>0?cxcVencida/cxcTotal:0;
  const s_cxc   = pctVen<0.10?20:pctVen<0.25?15:pctVen<0.40?10:pctVen<0.60?5:0;
  const pctRisk = active>0?enRiesgo/active:0;
  const s_risk  = enRiesgo===0?15:pctRisk<0.10?12:pctRisk<0.20?9:pctRisk<0.35?5:0;
  const s_cob   = cobUrg===0?15:cobUrg<=2?12:cobUrg<=5?8:cobUrg<=10?4:0;
  const s_oc    = ocPend===0?10:ocPend<=3?8:ocPend<=8?5:ocPend<=15?3:0;
  const s_ai    = ai24h>=20?10:ai24h>=10?8:ai24h>=5?6:ai24h>=1?3:0;
  const s_conv  = convRate>=30?5:convRate>=20?4:convRate>=10?3:convRate>=5?2:1;
  const total   = s_pipe+s_cxc+s_risk+s_cob+s_oc+s_ai+s_conv;
  return { total, pipeline:s_pipe, cxc:s_cxc, riesgo:s_risk, cobranza:s_cob, compras:s_oc, ai:s_ai, conv:s_conv };
}

function autoResize(el) {

}

async function sendQuery() {
  if (_queryBusy) return;
  const inp = document.getElementById('query-input');
  const btn = document.getElementById('query-send-btn');
  const out = document.getElementById('query-response');
  if (!inp || !out) return;

  const question = inp.value.trim();
  if (!question) return;

  _queryBusy = true;
  if (btn) btn.disabled = true;
  out.className = 'query-response active';
  out.innerHTML = `<div style="color:var(--text-faint);display:flex;align-items:center;gap:10px;padding:10px 0"><span class="spin spin-cyan"></span> Consultando toda la organización...</div>`;
  out.scrollIntoView({ behavior:'smooth', block:'nearest' });

  try {
    const session = await getSession();
    const jwt = session?.access_token || '';
    const proxyUrl = (window.MTX_CONFIG?.CLAUDE_PROXY_URL||'').replace(/\/+$/,'');
    if (!proxyUrl) throw new Error('CLAUDE_PROXY_URL no configurado');

    // Usar /ceo-query si existe, sino fallback a proxy estándar con contexto completo
    const ceoQueryUrl = proxyUrl.replace(/\/(claude|groq|proxy)$/, '') + '/ceo-query';

    let usedFallback = false;
    let resp;

    try {
      resp = await fetch(ceoQueryUrl, {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+jwt},
        body:JSON.stringify({ question, pulse: _pulse, query_type:'ad_hoc', kb_context: buildCEOKBContext() }),
        signal: AbortSignal.timeout(90000),
      });
      if (resp.status === 404 || resp.status >= 400) throw new Error('endpoint error ' + resp.status);
    } catch (fetchErr) {
      // Fallback: usar proxy estándar con contexto embebido
      usedFallback = true;
      resp = await runQueryFallback(question, jwt, proxyUrl);
    }

    if (!resp || !resp.ok) {
      const errJson = await resp?.json().catch(()=>({error:'Error '+resp?.status}));
      throw new Error(errJson.error || 'Error ' + resp?.status);
    }

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf='', html='', domains=[];

    out.innerHTML = '';

    while(true) {
      const {done,value} = await reader.read();
      if(done) break;
      buf += dec.decode(value,{stream:true});
      const lines = buf.split('\n'); buf = lines.pop();
      for(const line of lines) {
        if(!line.startsWith('data:')) continue;
        const d = line.slice(5).trim();
        if(d==='[DONE]') break;
        try {
          const j = JSON.parse(d);
          if(j.type==='content_block_delta'&&j.delta?.type==='text_delta') html += j.delta.text;
          if(j.type==='meta') domains = j.domains || [];
        } catch {}
      }
      out.innerHTML = html;
      out.scrollTop = out.scrollHeight;
    }

    // Render final con metadata
    if (html) {
      out.innerHTML = html + `
        <div class="query-meta">
          ${domains.map(d=>`<span class="domain-badge">${d}</span>`).join('')}
          <span style="font-size:10px;color:var(--text-faint);margin-left:auto">
            ${usedFallback?'Proxy estándar':'CEO Query Router'} · ${new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})}
          </span>
        </div>`;

      // Guardar en historial
      saveDecision({ question, response: html, domains, pulse: _pulse });
    }

  } catch(e) {
    // Fallback: generar análisis offline con datos del pulse actual
    const p = _pulse || {};
    const fmt = n=>{const v=parseFloat(n)||0;return v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1e3?'$'+(v/1e3).toFixed(0)+'K':'$'+v.toFixed(0);};
    const _isRisk    = /riesgo|risk|alerta|problema|urgente|peligro/i.test(question);
    const _isVentas  = /venta|pipeline|deal|lead|cierre|revenue/i.test(question);
    const _isFinanza = /cobr|CXC|CXP|flujo|factura|pago|finanza/i.test(question);
    const _isPeop    = /equipo|usuario|colaborad|persona|staff/i.test(question);
    let fallbackHtml = `<div style="background:rgba(255,70,70,.08);border:1px solid rgba(255,70,70,.2);border-radius:8px;padding:12px;margin-bottom:12px;font-size:12px;color:rgba(255,200,200,.7)">
      ⚠ Conexión con IA temporalmente no disponible. Análisis generado desde datos actuales del sistema.
    </div>`;
    fallbackHtml += `<h3 style="color:#22D3EE;margin:0 0 8px">Respuesta a: "${question.slice(0,80)}${question.length>80?'…':''}"</h3>`;
    if (_isVentas) {
      fallbackHtml += `<p><strong>Pipeline actual:</strong> ${fmt(p.pipeline_total)} · ${p.deals_activos||0} deals activos · ${p.deals_en_riesgo||0} en riesgo · Conversión: ${p.conversion_rate||0}%</p>
        <p>Deals ganados este mes: ${p.deals_ganados_mes||0} · Leads últimos 7 días: ${p.leads_nuevos_7d||0}</p>`;
    } else if (_isFinanza) {
      fallbackHtml += `<p><strong>CXC total:</strong> ${fmt(p.cxc_total)} · Vencida: ${fmt(p.cxc_vencida)}</p>
        <p><strong>CXP:</strong> ${fmt(p.cxp_total)} · Próximos 30d: ${fmt(p.cxp_proximos_30d)}</p>
        <p><strong>Flujo neto:</strong> ${fmt(p.flujo_neto)}</p>`;
    } else if (_isRisk) {
      const risks = [];
      if (p.cxc_vencida > 0) risks.push(`CXC vencida ${fmt(p.cxc_vencida)}`);
      if (p.deals_en_riesgo > 0) risks.push(`${p.deals_en_riesgo} deals en riesgo`);
      if (p.cobranza_urgente > 0) risks.push(`${p.cobranza_urgente} facturas en cobranza urgente`);
      if (p.oc_pendientes > 0) risks.push(`${p.oc_pendientes} OC pendientes`);
      fallbackHtml += `<p><strong>Alertas activas:</strong> ${risks.length ? risks.join(' · ') : 'Sin alertas críticas detectadas'}</p>`;
    } else {
      fallbackHtml += `<p><strong>Salud org:</strong> ${p.org_health_score||'—'}/100 · <strong>Pipeline:</strong> ${fmt(p.pipeline_total)} · <strong>Usuarios activos:</strong> ${p.usuarios_activos||0}</p>`;
    }
    fallbackHtml += `<p style="margin-top:8px;font-size:11px;color:rgba(255,255,255,.35)">Para análisis completo con IA, verifica la conexión al proxy y reinténtalo.</p>`;
    out.innerHTML = fallbackHtml;
  } finally {
    _queryBusy = false;
    if (btn) btn.disabled = false;
  }
}

/* Fallback cuando /ceo-query no está en el Worker aún */
async function runQueryFallback(question, jwt, proxyUrl) {
  const fmt = n => { const v=parseFloat(n)||0; return v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1e3?'$'+(v/1e3).toFixed(0)+'K':'$'+v.toFixed(0); };
  const p = _pulse;

  const orgCtx = `
ESTADO ORGANIZACIONAL — ${new Date().toLocaleDateString('es-MX')}
Score de Salud: ${p.org_health_score||0}/100

FINANZAS: CXC ${fmt(p.cxc_total)} (vencida: ${fmt(p.cxc_vencida)}) | CXP ${fmt(p.cxp_total)} (próx.30d: ${fmt(p.cxp_proximos_30d)}) | Flujo neto: ${fmt(p.flujo_neto)}
COBRANZA: Urgente (>60d): ${p.cobranza_urgente||0} facturas
COMPRAS: OC pendientes: ${p.oc_pendientes||0} (${fmt(p.oc_monto_pendiente)}) | Req. abiertas: ${p.requisiciones_abiertas||0}
PLATAFORMA: ${p.usuarios_activos||0} usuarios | IA 24h: ${p.ai_queries_24h||0} consultas`;

  return fetch(proxyUrl, {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+jwt},
    body:JSON.stringify({
      model:'claude-sonnet-4-6', max_tokens:2500, stream:true,
      system:`Eres el Consejero Ejecutivo IA de ${getCEOKB().empresa || 'IBANOR SA de CV / MetaTronix'}. Respondes preguntas del CEO con datos reales del sistema en tiempo real. Eres conciso, ejecutivo y accionable.
${buildCEOKBContext() ? '\n' + buildCEOKBContext() + '\n' : ''}
PROTOCOLO ANTI-ALUCINACIÓN NIVEL EJECUTIVO:
1. NUNCA inventes cifras, proyecciones ni datos sin base en el contexto provisto.
2. Cita fuente de cada número: (Fuente: Pipeline), (Fuente: CXC vencida), etc.
3. HECHO vs ANÁLISIS: diferencia explícita dato real de interpretación o recomendación.
4. Si el dato no está disponible: "Sin dato — requiere verificación manual."
5. ⚠ en recomendaciones: validar antes de actuar.
6. † en KPIs financieros: auditar antes de decisiones ejecutivas.
7. HTML semántico (h2, h3, p, ul, table). Sin DOCTYPE.
8. Proyecciones y forecasts: clarifica que son estimaciones basadas en tendencia actual, no certezas.
9. Al final de cada respuesta: incluye 2-3 acciones concretas marcadas con "→ Acción:".`,
      messages:[{role:'user',content:`${orgCtx}\n\nPREGUNTA DEL CEO: "${question}"\n\nResponde directo y ejecutivo (máx 300 palabras). Cita datos del contexto. Finaliza con acciones concretas.`}],
    }),
    signal: AbortSignal.timeout(90000),
  });
}

async function loadDecisions() {
  const list = document.getElementById('decision-list');

  try {
    const { data } = await _db
      .from('executive_decisions')
      .select('id,query_text,response_text,domains_queried,query_type,created_at')
      .eq('user_id', _user?.id)

function renderDecisions() {
  const list = document.getElementById('decision-list');
  if (!list) return;

  if (!_decisions.length) {
    list.innerHTML = `<div class="empty-state">
      <div style="font-size:24px;margin-bottom:8px">🧠</div>
      Usa el Query Bar para hacer tu primera pregunta organizacional.<br>Todas las consultas quedarán registradas aquí.
    </div>`;
    return;
  }

  list.innerHTML = _decisions.map(d => {
    const ts = new Date(d.created_at).toLocaleString('es-MX',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    const domains = (d.domains_queried||[]).slice(0,3).join(', ') || d.query_type;
    const preview = d.response_text ? d.response_text.replace(/<[^>]+>/g,'').substring(0,120)+'...' : '';
    return `
    <div class="decision-item" onclick="expandDecision('${d.id}')">
      <div class="decision-q">${escHtml ? escHtml(d.query_text) : d.query_text}</div>
      <div class="decision-meta">
        <span class="decision-ts">${ts}</span>
        ${domains ? `<span class="decision-dom">${domains}</span>` : ''}
      </div>
      ${preview ? `<div class="decision-preview">${preview}</div>` : ''}
    </div>`;
  }).join('');
}

function expandDecision(id) {
  const dec = _decisions.find(d=>d.id===id);
  if (!dec) return;
  const qr = document.getElementById('query-response');
  const inp = document.getElementById('query-input');
  if (inp) { inp.value = dec.query_text; autoResize(inp); }
  if (qr) {
    qr.className = 'query-response active';
    qr.innerHTML = dec.response_text || '<em style="color:var(--text-faint)">Sin respuesta guardada.</em>';
    qr.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }
}

/* ── CEO BRIEFING ─────────────────────────────────────────────────────────── */
async function generateBriefing(type) {
  if (_briefingBusy) return;
  const out  = document.getElementById('briefing-out');
  const btns = ['btn-daily','btn-strategy','btn-risk','btn-week'].map(id=>document.getElementById(id));
  if (!out) return;

  _briefingBusy = true;
  btns.forEach(b=>{ if(b) b.disabled=true; });
  out.classList.add('streaming');
  out.innerHTML = `<div style="color:var(--text-faint);padding:24px;text-align:center;display:flex;align-items:center;justify-content:center;gap:10px"><span class="spin spin-cyan"></span> Generando análisis con datos reales...</div>`;

  const fecha = new Date().toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const fmt   = n=>{const v=parseFloat(n)||0;return v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1e3?'$'+(v/1e3).toFixed(0)+'K':'$'+v.toFixed(0);};
  const p = _pulse;

  const kpiCtx = `
DATOS REALES — ${fecha}
Score de Salud Org: ${p.org_health_score||0}/100

VENTAS: Pipeline ${fmt(p.pipeline_total)} | Deals activos: ${p.deals_activos||0} | Ganados mes: ${p.deals_ganados_mes||0} | En riesgo: ${p.deals_en_riesgo||0} | Leads 7d: ${p.leads_nuevos_7d||0} | Conversión: ${p.conversion_rate||0}%
FINANZAS: CXC ${fmt(p.cxc_total)} (vencida ${fmt(p.cxc_vencida)}) | CXP ${fmt(p.cxp_total)} (30d: ${fmt(p.cxp_proximos_30d)}) | Flujo neto: ${fmt(p.flujo_neto)}
COBRANZA: Urgente: ${p.cobranza_urgente||0} facturas | Sin contacto: ${p.cobranza_sin_contacto||0}
COMPRAS: OC pendientes: ${p.oc_pendientes||0} (${fmt(p.oc_monto_pendiente)}) | Req. abiertas: ${p.requisiciones_abiertas||0}
PLATAFORMA: ${p.usuarios_activos||0} usuarios | IA 24h: ${p.ai_queries_24h||0} | IA 7d: ${p.ai_queries_7d||0}`;

  const prompts = {
    daily: `Genera un BRIEFING DIARIO ejecutivo:\n${kpiCtx}\n\nEstructura:\n<h2>⚡ Briefing Diario — ${fecha}</h2>\n<h3>🚦 Semáforo Ejecutivo</h3>\n(tabla: Área | Estado | Nota)\n<h3>🎯 Top 3 Prioridades del Día</h3>\n<h3>⚠ Alertas que Requieren Decisión</h3>\n<h3>📊 Métricas Clave</h3>\nMáximo 350 palabras. Directo, ejecutivo.`,
    strategy: `Genera una REVISIÓN ESTRATÉGICA:\n${kpiCtx}\n\nEstructura:\n<h2>🎯 Revisión Estratégica — ${fecha}</h2>\n<h3>Posición Actual</h3>\n<h3>Oportunidades Inmediatas</h3>\n<h3>Brechas Críticas</h3>\n<h3>Plan 90 Días</h3>\nCuantificado, accionable, máximo 400 palabras.`,
    risk: `Genera un ANÁLISIS DE RIESGOS:\n${kpiCtx}\n\nEstructura:\n<h2>🚨 Matriz de Riesgos — ${fecha}</h2>\n(tabla: Riesgo | Prob. | Impacto $ | Acción)\n<h3>Riesgos Críticos</h3>\n<h3>Decisiones Esta Semana</h3>\nCuantifica impactos en MXN cuando posible.`,
    week: `Genera un CIERRE SEMANAL:\n${kpiCtx}\n\nEstructura:\n<h2>📊 Cierre Semanal — ${fecha}</h2>\n<h3>Logros</h3>\n(tabla: Métrica | Real | Meta | Δ)\n<h3>Pendientes Semana Siguiente</h3>\n<h3>Agenda Prioritaria</h3>\nHonesto, sin maquillaje.`,
  };

  try {
    const session = await getSession();
    const jwt = session?.access_token || '';
    const proxyUrl = (window.MTX_CONFIG?.CLAUDE_PROXY_URL||'').replace(/\/+$/,'');
    if (!proxyUrl) throw new Error('CLAUDE_PROXY_URL no configurado');

    const resp = await fetch(proxyUrl, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+jwt},
      body:JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:2500, stream:true,
        system:`Eres el Chief Strategy Officer IA de ${getCEOKB().empresa || 'IBANOR SA de CV / MetaTronix'}.
${buildCEOKBContext() ? buildCEOKBContext() + '\n' : ''}PROTOCOLO ANTI-ALUCINACIÓN NIVEL EJECUTIVO:
- NUNCA inventes cifras, datos ni proyecciones sin base en el contexto provisto.
- Cita fuente de cada número: (Fuente: Pipeline), (Fuente: CXC), etc.
- HECHO vs ANÁLISIS: diferencia dato real de interpretación.
- ⚠ en recomendaciones. † en KPIs financieros: auditar antes de decisiones ejecutivas.
- HTML semántico (h2,h3,p,ul,table). Sin DOCTYPE.`,
        messages:[{role:'user',content:prompts[type]||prompts.daily}],
      }),
      signal:AbortSignal.timeout(120000),
    });

    if(!resp.ok){const e=await resp.json().catch(()=>({error:resp.statusText}));throw new Error(e.error||'Error '+resp.status);}

    const reader=resp.body.getReader();const dec=new TextDecoder();let buf='',html='';
    out.innerHTML='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data:'))continue;
        const d=line.slice(5).trim();if(d==='[DONE]')break;
        try{const j=JSON.parse(d);if(j.type==='content_block_delta'&&j.delta?.type==='text_delta')html+=j.delta.text;}catch{}
      }
      out.innerHTML=html;out.scrollTop=out.scrollHeight;
    }
    out.innerHTML=html||'<em style="color:var(--text-faint)">Sin respuesta.</em>';

    // Guardar como decisión
    if(html) saveDecision({ question:`Briefing ${type}: ${fecha}`, response:html, domains:['estrategia'], pulse:p });

  } catch(e) {
    // Fallback offline: generar briefing básico con datos del pulse
    const p = _pulse || {};
    const fmt2 = n=>{const v=parseFloat(n)||0;return v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1e3?'$'+(v/1e3).toFixed(0)+'K':'$'+v.toFixed(0);};
    const score = p.org_health_score||0;
    const scoreColor = score>=70?'#4ADE80':score>=50?'#FCD34D':'#F87171';
    const risks = [];
    if (p.cxc_vencida > 0) risks.push(`🔴 CXC vencida: ${fmt2(p.cxc_vencida)}`);
    if (p.deals_en_riesgo > 0) risks.push(`🟡 ${p.deals_en_riesgo} deals en riesgo (pipeline: ${fmt2(p.pipeline_total)})`);
    if (p.cobranza_urgente > 0) risks.push(`🔴 ${p.cobranza_urgente} facturas en cobranza urgente (>60d)`);
    if (p.oc_pendientes > 0) risks.push(`🟡 ${p.oc_pendientes} órdenes de compra pendientes (${fmt2(p.oc_monto_pendiente)})`);
    const labels = { daily:'Briefing Diario', strategy:'Revisión Estratégica', risk:'Análisis de Riesgos', week:'Cierre Semanal' };
    out.innerHTML = `
      <div style="background:rgba(255,70,70,.08);border:1px solid rgba(255,70,70,.2);border-radius:8px;padding:10px;margin-bottom:12px;font-size:11px;color:rgba(255,200,200,.7)">
        ⚠ IA no disponible temporalmente — mostrando resumen desde datos del sistema
      </div>
      <h2>${labels[type]||'Análisis Ejecutivo'} — ${fecha}</h2>
      <h3>🏥 Salud Organizacional</h3>
      <p>Score: <strong style="color:${scoreColor}">${score}/100</strong> · Pipeline: ${fmt2(p.pipeline_total)} · Usuarios activos: ${p.usuarios_activos||0} · Consultas IA hoy: ${p.ai_queries_24h||0}</p>
      <h3>📊 Estado Financiero</h3>
      <p>CXC: ${fmt2(p.cxc_total)} (vencida: ${fmt2(p.cxc_vencida)}) · CXP: ${fmt2(p.cxp_total)} · Flujo neto: ${fmt2(p.flujo_neto)}</p>
      <h3>🎯 Ventas</h3>
      <p>Deals activos: ${p.deals_activos||0} · Ganados mes: ${p.deals_ganados_mes||0} · Conversión: ${p.conversion_rate||0}% · Leads 7d: ${p.leads_nuevos_7d||0}</p>
      ${risks.length ? `<h3>⚠ Alertas Activas</h3><ul>${risks.map(r=>`<li>${r}</li>`).join('')}</ul>` : '<p>✅ Sin alertas críticas en este momento.</p>'}
      <p style="margin-top:12px;font-size:11px;color:rgba(255,255,255,.3)">Para análisis completo con IA, verifica conexión al proxy y reinténtalo.</p>`;
  } finally {
    _briefingBusy=false;
    btns.forEach(b=>{if(b)b.disabled=false;});
    out.classList.remove('streaming');
  }
}

function clearBriefing() {
  const o=document.getElementById('briefing-out');
  if(o) o.innerHTML='<div class="placeholder-msg">Selecciona un tipo de análisis o usa el Query Bar arriba.</div>';
}

async function refreshAll() {
  await Promise.all([loadPulse(), loadDecisions()]);
}

/* ── CEO KNOWLEDGE BASE ──────────────────────────────────────────────────── */
function getCEOKB() {
  try { return JSON.parse(localStorage.getItem('ceo_kb_v1') || '{}'); } catch { return {}; }
}

function saveCEOKB() {
  const kb = {
    empresa:      document.getElementById('ceo-kb-empresa')?.value.trim() || '',
    sector:       document.getElementById('ceo-kb-sector')?.value.trim() || '',
    competidores: document.getElementById('ceo-kb-competidores')?.value.trim() || '',
    estrategia:   document.getElementById('ceo-kb-estrategia')?.value.trim() || '',
    retos:        document.getElementById('ceo-kb-retos')?.value.trim() || '',
  };
  localStorage.setItem('ceo_kb_v1', JSON.stringify(kb));
  updateCEOKBStatus(!!kb.empresa || !!kb.estrategia);
  const btn = document.getElementById('ceo-kb-btn');
  if (btn) { btn.textContent = '✅ KB'; setTimeout(() => { btn.textContent = '🧠 KB'; }, 1500); }
}

function clearCEOKB() {
  localStorage.removeItem('ceo_kb_v1');
  ['ceo-kb-empresa','ceo-kb-sector','ceo-kb-competidores','ceo-kb-estrategia','ceo-kb-retos']
    .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  updateCEOKBStatus(false);
}

function toggleCEOKB() {
  const p = document.getElementById('ceo-kb-panel');
  if (p) p.classList.toggle('open');
}

function updateCEOKBStatus(hasData) {
  const dot = document.getElementById('ceo-kb-dot');
  const txt = document.getElementById('ceo-kb-status-text');
  if (dot) { dot.className = 'ceo-kb-dot' + (hasData ? '' : ' empty'); }
  if (txt) txt.textContent = hasData ? 'Contexto activo — todos los análisis usarán este contexto' : 'Sin contexto — los agentes usarán datos del sistema únicamente';
}

function buildCEOKBContext() {
  const kb = getCEOKB();
  if (!kb.empresa && !kb.estrategia && !kb.retos) return '';
  return `
CONTEXTO ORGANIZACIONAL (CEO Knowledge Base):
${kb.empresa ? `EMPRESA: ${kb.empresa}` : ''}
${kb.sector ? `SECTOR: ${kb.sector}` : ''}
${kb.competidores ? `COMPETIDORES: ${kb.competidores}` : ''}
${kb.estrategia ? `PRIORIDADES ESTRATÉGICAS: ${kb.estrategia}` : ''}
${kb.retos ? `RETOS ACTUALES: ${kb.retos}` : ''}`.trim();
}

function initCEOKB() {
  const kb = getCEOKB();
  if (document.getElementById('ceo-kb-empresa')) document.getElementById('ceo-kb-empresa').value = kb.empresa || '';
  if (document.getElementById('ceo-kb-sector')) document.getElementById('ceo-kb-sector').value = kb.sector || '';
  if (document.getElementById('ceo-kb-competidores')) document.getElementById('ceo-kb-competidores').value = kb.competidores || '';
  if (document.getElementById('ceo-kb-estrategia')) document.getElementById('ceo-kb-estrategia').value = kb.estrategia || '';
  if (document.getElementById('ceo-kb-retos')) document.getElementById('ceo-kb-retos').value = kb.retos || '';
  updateCEOKBStatus(!!(kb.empresa || kb.estrategia));
  // Update company label in header if KB has empresa
  if (kb.empresa) {
    const label = document.getElementById('ceo-company-label');
    if (label) label.textContent = kb.empresa;
  }
}

init();
