<!DOCTYPE html>
<html lang="es">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co https://*.workers.dev wss://*.supabase.co; object-src 'none'; base-uri 'self';">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>CEO Command Center — MetaTronix</title>
  <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap">
  <link rel="stylesheet" href="/assets/style.css?v=20260419">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/config.js?v=20260419"></script>
  <script src="/assets/app.js?v=20260419"></script>
  <style>
    :root { --green:#00ff88; --cyan:#00e5ff; --gold:#ffb400; --purple:#b966ff; --red:#ff4646; }

    .ceo-root { display:flex; flex-direction:column; gap:28px; padding:28px; max-width:1400px; margin:0 auto; }

    /* Header */
    .page-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
    .page-header h1 { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:.06em; margin:0; }
    .page-header p  { font-size:12px; color:var(--text-muted); margin:3px 0 0; }
    .live-dot { display:inline-block; width:8px; height:8px; background:var(--green); border-radius:50%; animation:pulse 2s ease-in-out infinite; margin-right:8px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* KPI strip */
    .kpi-strip { display:grid; grid-template-columns:repeat(auto-fit,minmax(155px,1fr)); gap:12px; }
    .kpi-card {
      background:var(--surface); border:1px solid var(--border); border-radius:10px;
      padding:14px 18px; position:relative; overflow:hidden; transition:border-color .2s;
    }
    .kpi-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
      background:var(--kpi-color, var(--green)); opacity:.5; }
    .kpi-label { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text-faint); }
    .kpi-value { font-family:'JetBrains Mono',monospace; font-size:24px; font-weight:600; color:var(--kpi-color, var(--text)); margin:6px 0 2px; }
    .kpi-sub   { font-size:11px; color:var(--text-muted); }

    /* Director nav grid */
    .directors-section-label {
      font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
      color:var(--text-faint); margin-bottom:-8px;
    }
    .directors-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px; }
    .director-card {
      background:var(--surface); border:1px solid var(--border); border-radius:12px;
      overflow:hidden; transition:border-color .2s, box-shadow .2s; display:flex; flex-direction:column;
    }
    .director-card:hover { border-color:var(--dc); box-shadow:0 0 20px -6px var(--dc); }
    .director-head {
      padding:16px 20px; display:flex; align-items:center; gap:12px;
      border-bottom:1px solid var(--border);
      background:linear-gradient(135deg,rgba(0,0,0,.35) 0%,transparent 100%);
    }
    .director-icon {
      width:44px; height:44px; border-radius:10px; display:flex; align-items:center;
      justify-content:center; font-size:22px; flex-shrink:0;
      background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
    }
    .director-name { font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:.08em; color:var(--dc); line-height:1; }
    .director-role { font-size:11px; color:var(--text-muted); margin-top:3px; }
    .director-body { padding:14px 20px 18px; flex:1; display:flex; flex-direction:column; gap:10px; }
    .director-caps { display:flex; flex-wrap:wrap; gap:5px; }
    .director-cap {
      font-size:11px; padding:3px 10px; border-radius:20px;
      background:rgba(255,255,255,.04); border:1px solid var(--border); color:var(--text-muted);
    }
    .director-btn {
      display:block; text-align:center; text-decoration:none;
      padding:9px 16px; border-radius:8px; font-size:12px; font-weight:700;
      background:var(--dc); color:#000; transition:opacity .15s; margin-top:4px;
    }
    .director-btn:hover { opacity:.85; }

    /* CEO Briefing */
    .ceo-briefing {
      background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden;
    }
    .briefing-head {
      padding:16px 24px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
      background:linear-gradient(135deg,rgba(0,0,0,.4) 0%,transparent 100%);
    }
    .briefing-title { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:.06em; display:flex; align-items:center; gap:10px; }
    .briefing-badge { font-size:10px; background:rgba(0,229,255,.08); color:var(--cyan); padding:3px 10px; border-radius:20px; border:1px solid rgba(0,229,255,.2); font-weight:700; }
    .briefing-body { padding:20px 24px; display:flex; flex-direction:column; gap:14px; }
    .briefing-output {
      min-height:200px; max-height:520px; overflow-y:auto;
      background:rgba(0,0,0,.35); border:1px solid var(--border); border-radius:8px;
      padding:16px 20px; font-size:13px; line-height:1.8; color:var(--text);
    }
    .briefing-output.streaming { border-color:var(--cyan); }
    .briefing-output h2 { font-family:'Bebas Neue',sans-serif; color:var(--cyan); letter-spacing:.06em; margin:10px 0 5px; font-size:20px; }
    .briefing-output h3 { font-family:'Bebas Neue',sans-serif; color:var(--gold); letter-spacing:.04em; margin:8px 0 4px; font-size:15px; }
    .briefing-output p  { margin:5px 0; }
    .briefing-output ul { margin:4px 0 4px 18px; }
    .briefing-output table { width:100%; border-collapse:collapse; margin:10px 0; font-size:12px; }
    .briefing-output th { background:rgba(0,229,255,.07); color:var(--cyan); padding:6px 10px; text-align:left; border-bottom:1px solid var(--border); }
    .briefing-output td { padding:6px 10px; border-bottom:1px solid rgba(255,255,255,.04); }
    .briefing-output strong { color:#fff; }
    .briefing-placeholder { color:var(--text-faint); font-style:italic; text-align:center; padding:40px 20px; font-size:13px; }
    .briefing-actions { display:flex; gap:10px; flex-wrap:wrap; }
    .btn-brief {
      padding:9px 20px; border-radius:7px; font-size:12px; font-weight:700;
      background:var(--cyan); color:#000; border:none; cursor:pointer; transition:opacity .15s;
    }
    .btn-brief:hover:not(:disabled) { opacity:.85; }
    .btn-brief:disabled { opacity:.4; cursor:not-allowed; }
    .btn-brief.secondary { background:rgba(0,229,255,.1); color:var(--cyan); border:1px solid rgba(0,229,255,.25); }
    .btn-brief.gold { background:var(--gold); color:#000; }
    .btn-outline-sm {
      padding:7px 14px; border-radius:7px; font-size:12px; font-weight:600;
      background:transparent; border:1px solid var(--border); color:var(--text-muted); cursor:pointer; transition:.15s;
    }
    .btn-outline-sm:hover { border-color:var(--cyan); color:var(--text); }
    .refresh-info { font-size:11px; color:var(--text-faint); display:flex; align-items:center; gap:6px; }
    .spin { display:inline-block; width:13px; height:13px; border:2px solid rgba(0,255,136,.25); border-top-color:var(--green); border-radius:50%; animation:spin .7s linear infinite; }
    .spin-cyan { border-color:rgba(0,229,255,.25); border-top-color:var(--cyan); }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>

<div id="app-root">
  <div style="padding:40px;text-align:center;color:var(--text-muted)">Cargando...</div>
</div>

<script>
'use strict';

let _user = null;
let _db   = null;
let _kpis = {};
let _refreshTimer = null;
let _briefingStreaming = false;

const DIRECTORS = [
  {
    id:    'ventas',
    icon:  '📈',
    name:  'MetaVentaX',
    role:  'Director Comercial & Ventas IA',
    color: '#00ff88',
    caps:  ['Pipeline','Conversión','Forecast','Objeciones','CRM'],
    href:  '/ventas.html#director',
    label: 'Ir a Director Comercial',
  },
  {
    id:    'marketing',
    icon:  '🎯',
    name:  'MetaMKTX',
    role:  'Director de Marketing & Crecimiento IA',
    color: '#00e5ff',
    caps:  ['Campañas','Growth','Posicionamiento','ROI','Leads'],
    href:  '/marketing.html#director',
    label: 'Ir a Director Marketing',
  },
  {
    id:    'ops',
    icon:  '⚙️',
    name:  'MetaOps',
    role:  'Director de Operaciones & Procesos IA',
    color: '#ffb400',
    caps:  ['Procesos','Eficiencia','KPIs Ops','Automatización','Supply Chain'],
    href:  '/ops.html#director',
    label: 'Ir a Director Operaciones',
  },
  {
    id:    'admin',
    icon:  '💼',
    name:  'MetaAdmin',
    role:  'Director Administrativo & Financiero IA',
    color: '#b966ff',
    caps:  ['Flujo de Caja','Cobranza','Fiscal SAT','Tesorería','Contratos'],
    href:  '/finanzas.html#director',
    label: 'Ir a Director Administrativo',
  },
];

async function init() {
  _user = await requireAuth(true);
  if (!_user) return;

  const role = _user?.profile?.role;
  if (!['admin','super_admin'].includes(role)) {
    window.location.href = '/dashboard.html';
    return;
  }

  _db = getDB();
  document.getElementById('app-root').innerHTML = buildShell();
  if (typeof renderHeader === 'function') {
    document.getElementById('sidebar-slot').innerHTML = renderHeader(_user, 'ceo');
  }
  if (typeof initCompanySwitcher === 'function') setTimeout(initCompanySwitcher, 60);

  await loadKPIs();
  _refreshTimer = setInterval(loadKPIs, 120_000);
}

function buildShell() {
  return `
  <div style="display:flex;min-height:100vh">
    <div id="sidebar-slot"></div>
    <main style="flex:1;overflow:auto">
      <div class="ceo-root">

        <!-- Header -->
        <div class="page-header">
          <div>
            <h1><span class="live-dot"></span>CEO Command Center</h1>
            <p>Panel ejecutivo en tiempo real · Briefings estratégicos · MetaTronix / IBANOR SA de CV</p>
          </div>
          <div class="refresh-info">
            <span id="last-refresh">Cargando...</span>
            <button class="btn-outline-sm" onclick="loadKPIs()" style="padding:5px 12px;font-size:11px">↺</button>
          </div>
        </div>

        <!-- KPIs -->
        <div class="kpi-strip" id="kpi-strip">
          ${['Pipeline','Deals Activos','Ganados Mes','En Riesgo','Usuarios','IA Queries'].map(l =>
            `<div class="kpi-card"><div class="kpi-label">${l}</div><div class="kpi-value" style="color:var(--text-faint);font-size:18px">—</div></div>`
          ).join('')}
        </div>

        <!-- Directores -->
        <div class="directors-section-label">Directores IA — acceso directo</div>
        <div class="directors-grid">
          ${DIRECTORS.map(buildDirectorCard).join('')}
        </div>

        <!-- CEO Briefing -->
        <div class="ceo-briefing">
          <div class="briefing-head">
            <div class="briefing-title">
              🧠 Briefing Ejecutivo <span class="briefing-badge">Claude — Análisis Estratégico</span>
            </div>
            <div style="display:flex;gap:8px">
              <button class="btn-outline-sm" onclick="clearBriefing()">✕ Limpiar</button>
            </div>
          </div>
          <div class="briefing-body">
            <div class="briefing-output" id="briefing-out">
              <div class="briefing-placeholder">Selecciona un tipo de análisis para generar el briefing ejecutivo.<br>Los datos del pipeline se incluyen automáticamente.</div>
            </div>
            <div class="briefing-actions">
              <button class="btn-brief"           id="btn-daily"    onclick="generateBriefing('daily')">⚡ Briefing Diario</button>
              <button class="btn-brief secondary"  id="btn-strategy" onclick="generateBriefing('strategy')">🎯 Revisión Estratégica</button>
              <button class="btn-brief gold"       id="btn-risk"     onclick="generateBriefing('risk')">🚨 Análisis de Riesgos</button>
              <button class="btn-outline-sm"       id="btn-week"     onclick="generateBriefing('week')">📊 Cierre Semana</button>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>`;
}

function buildDirectorCard(d) {
  return `
  <div class="director-card" style="--dc:${d.color}">
    <div class="director-head">
      <div class="director-icon">${d.icon}</div>
      <div>
        <div class="director-name">${d.name}</div>
        <div class="director-role">${d.role}</div>
      </div>
    </div>
    <div class="director-body">
      <div class="director-caps">
        ${d.caps.map(c => `<span class="director-cap">${c}</span>`).join('')}
      </div>
      <a href="${d.href}" class="director-btn">${d.label} →</a>
    </div>
  </div>`;
}

/* ── KPIs ── */
async function loadKPIs() {
  const companyId = _user?.profile?.company_id;
  const strip = document.getElementById('kpi-strip');
  if (!strip || !companyId) return;

  try {
    const [leadsRes, profilesRes, actRes] = await Promise.all([
      _db.from('leads').select('id,status,pipeline_value,created_at').eq('company_id', companyId).limit(1000),
      _db.from('profiles').select('id,role').eq('company_id', companyId),
      _db.from('activity_logs').select('id,created_at').eq('company_id', companyId)
        .gte('created_at', new Date(Date.now()-30*864e5).toISOString())
        .like('action','%claude%').limit(500),
    ]);

    const leads    = leadsRes.data  || [];
    const profiles = profilesRes.data || [];
    const acts     = actRes.data    || [];
    const monthStart = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString();

    const pipeline   = leads.filter(l=>!['ganado','perdido','cancelado'].includes(l.status)).reduce((s,l)=>s+(l.pipeline_value||0),0);
    const activos    = leads.filter(l=>!['ganado','perdido','cancelado'].includes(l.status)).length;
    const ganadosMes = leads.filter(l=>l.status==='ganado'&&l.created_at>=monthStart).length;
    const enRiesgo   = leads.filter(l=>l.status==='en_riesgo'||l.status==='perdido').length;
    const usuarios   = profiles.length;
    const aiQueries  = acts.length;

    _kpis = { pipeline, activos, ganadosMes, enRiesgo, usuarios, aiQueries };

    const fmt = n => n>=1e6?'$'+(n/1e6).toFixed(1)+'M':n>=1e3?'$'+(n/1e3).toFixed(0)+'K':'$'+n.toFixed(0);

    strip.innerHTML = `
      <div class="kpi-card" style="--kpi-color:${pipeline>0?'#00ff88':'#888'}">
        <div class="kpi-label">Pipeline Total</div>
        <div class="kpi-value">${fmt(pipeline)}</div>
        <div class="kpi-sub">${activos} deals activos</div>
      </div>
      <div class="kpi-card" style="--kpi-color:#00e5ff">
        <div class="kpi-label">Deals Activos</div>
        <div class="kpi-value">${activos}</div>
        <div class="kpi-sub">En proceso</div>
      </div>
      <div class="kpi-card" style="--kpi-color:#00ff88">
        <div class="kpi-label">Ganados Mes</div>
        <div class="kpi-value">${ganadosMes}</div>
        <div class="kpi-sub">Deals cerrados</div>
      </div>
      <div class="kpi-card" style="--kpi-color:${enRiesgo>0?'#ff4646':'#888'}">
        <div class="kpi-label">En Riesgo</div>
        <div class="kpi-value" style="color:${enRiesgo>0?'#ff4646':'inherit'}">${enRiesgo}</div>
        <div class="kpi-sub">Requieren atención</div>
      </div>
      <div class="kpi-card" style="--kpi-color:#b966ff">
        <div class="kpi-label">Usuarios</div>
        <div class="kpi-value">${usuarios}</div>
        <div class="kpi-sub">En plataforma</div>
      </div>
      <div class="kpi-card" style="--kpi-color:#ffb400">
        <div class="kpi-label">IA Queries</div>
        <div class="kpi-value">${aiQueries}</div>
        <div class="kpi-sub">Últimos 30 días</div>
      </div>`;

    const el = document.getElementById('last-refresh');
    if (el) el.textContent = 'Actualizado ' + new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    console.warn('loadKPIs:', e);
    const el = document.getElementById('last-refresh');
    if (el) el.textContent = 'Error cargando KPIs';
  }
}

/* ── CEO Briefing ── */
async function generateBriefing(type) {
  if (_briefingStreaming) return;
  const out  = document.getElementById('briefing-out');
  const btns = ['btn-daily','btn-strategy','btn-risk','btn-week'].map(id => document.getElementById(id));
  if (!out) return;

  _briefingStreaming = true;
  btns.forEach(b => { if(b) b.disabled = true; });
  out.classList.add('streaming');
  out.innerHTML = `<div style="color:var(--text-faint);padding:30px;text-align:center;display:flex;align-items:center;justify-content:center;gap:10px"><span class="spin spin-cyan"></span> Generando análisis estratégico...</div>`;

  const fecha  = new Date().toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const fmt    = n => n>=1e6?'$'+(n/1e6).toFixed(1)+'M':n>=1e3?'$'+(n/1e3).toFixed(0)+'K':'$'+n.toFixed(0);
  const kpiCtx = `
INDICADORES EJECUTIVOS — ${fecha}:
• Pipeline: ${fmt(_kpis.pipeline||0)} | Deals activos: ${_kpis.activos||0} | Ganados mes: ${_kpis.ganadosMes||0} | En riesgo: ${_kpis.enRiesgo||0}
• Usuarios plataforma: ${_kpis.usuarios||0} | Consultas IA (30d): ${_kpis.aiQueries||0}
`;

  const briefingTypes = {
    daily: { prompt: `Genera un BRIEFING DIARIO para el CEO de IBANOR SA de CV / MetaTronix:\n${kpiCtx}\nEstructura:\n<h2>📊 Estado del Negocio — ${fecha}</h2>\n<h3>Semáforo Ejecutivo</h3>\n<h3>Prioridades del Día (Top 3)</h3>\n<h3>Alertas que Requieren Decisión</h3>\n<h3>Métricas Clave vs. Objetivos</h3>\n<h3>Recomendación Ejecutiva</h3>\nSé directo y accionable. Máximo 400 palabras.` },
    strategy: { prompt: `Genera una REVISIÓN ESTRATÉGICA para IBANOR SA de CV / MetaTronix:\n${kpiCtx}\nEstructura:\n<h2>🎯 Revisión Estratégica — ${fecha}</h2>\n<h3>Posición Competitiva Actual</h3>\n<h3>Oportunidades de Crecimiento Inmediatas</h3>\n<h3>Brechas Críticas a Cerrar</h3>\n<h3>Iniciativas Prioritarias Q2 2026</h3>\n<h3>Plan de 90 Días</h3>\nConcreto, cuantificado, ejecutable.` },
    risk: { prompt: `Genera un ANÁLISIS DE RIESGOS EJECUTIVO para IBANOR SA de CV / MetaTronix:\n${kpiCtx}\nEstructura:\n<h2>🚨 Matriz de Riesgos — ${fecha}</h2>\nTabla: Riesgo | Probabilidad | Impacto | Acción Mitigadora\n<h3>Riesgos Críticos</h3>\n<h3>Riesgos Monitoreados</h3>\n<h3>Decisiones Necesarias Esta Semana</h3>\nCuantifica impactos en pesos cuando sea posible.` },
    week: { prompt: `Genera un CIERRE SEMANAL para IBANOR SA de CV / MetaTronix:\n${kpiCtx}\nEstructura:\n<h2>📊 Cierre Semanal — ${fecha}</h2>\n<h3>Logros de la Semana</h3>\n<h3>Métricas vs. Meta</h3>\nTabla: Métrica | Real | Meta | Variación\n<h3>Pendientes Semana Siguiente</h3>\n<h3>Agenda Prioritaria</h3>\nEjecutivo, honesto, sin maquillaje de cifras.` },
  };

  const cfg = briefingTypes[type] || briefingTypes.daily;

  try {
    const session = await getSession();
    const jwt = session?.access_token || '';
    const proxyUrl = (window.MTX_CONFIG?.CLAUDE_PROXY_URL||'').replace(/\/+$/,'');
    if (!proxyUrl) throw new Error('CLAUDE_PROXY_URL no configurado');

    const resp = await fetch(proxyUrl, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+jwt},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:3000,
        system:`Eres el Chief Strategy Officer IA de IBANOR SA de CV / MetaTronix.
Generas análisis ejecutivos de máxima calidad para el CEO.
Perspectiva: pensamiento estratégico de McKinsey + rigor analítico de Anthropic.
Formato: HTML semántico (h2, h3, p, ul, ol, table, strong, em). Sin DOCTYPE, html, head, body.

PROTOCOLO ANTI-ALUCINACIÓN NIVEL MÉDICO — REGLAS NO NEGOCIABLES:
1. SOLO afirma lo EXPLÍCITAMENTE presente en los datos de esta conversación
2. NUNCA inventes cifras, porcentajes, nombres ni fechas — dato ausente = escribe "Sin dato disponible"
3. HECHO vs ANÁLISIS: usa "Los datos muestran X" para hechos; "Esto podría indicar Y" para análisis
4. INCERTIDUMBRE: si no es certeza, usa "aparentemente", "podría ser", "requiere verificación previa"
5. CAUSALIDAD: nunca la atribuyas sin evidencia directa — escribe "correlación posible, no causalidad confirmada"
6. EXTRAPOLACIÓN: no proyectes más allá del rango explícito de los datos proporcionados
7. AMBIGÜEDAD: si la consulta es incompleta, solicita el dato faltante — no supongas ni rellenes
8. RECOMENDACIONES EJECUTIVAS: termina cada una con "⚠ Verificar con datos actuales antes de implementar"
9. DATOS FINANCIEROS/KPIs: añade al final "† Basado en información proporcionada — auditar antes de decisiones ejecutivas"`,
        messages:[{role:'user', content:cfg.prompt}],
        stream:true,
      }),
      signal:AbortSignal.timeout(120000),
    });

    if (!resp.ok) { const err = await resp.json().catch(()=>({error:resp.statusText})); throw new Error(err.error||'Error '+resp.status); }

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf=''; let html='';
    out.innerHTML = '';

    while(true) {
      const {done,value} = await reader.read();
      if(done) break;
      buf += dec.decode(value,{stream:true});
      const lines = buf.split('\n'); buf = lines.pop();
      for(const line of lines) {
        if(!line.startsWith('data:')) continue;
        const d = line.slice(5).trim();
        if(d==='[DONE]') break;
        try { const j=JSON.parse(d); if(j.type==='content_block_delta'&&j.delta?.type==='text_delta') html+=j.delta.text; } catch {}
      }
      out.innerHTML = html;
      out.scrollTop = out.scrollHeight;
    }
    out.innerHTML = html || '<em style="color:var(--text-faint)">Sin respuesta.</em>';
  } catch(e) {
    out.innerHTML = `<span style="color:#ff4646">Error: ${e.message}</span>`;
  } finally {
    _briefingStreaming = false;
    btns.forEach(b => { if(b) b.disabled = false; });
    out.classList.remove('streaming');
  }
}

function clearBriefing() {
  const out = document.getElementById('briefing-out');
  if (out) out.innerHTML = '<div class="briefing-placeholder">Selecciona un tipo de análisis para generar el briefing ejecutivo.<br>Los datos del pipeline se incluyen automáticamente.</div>';
}

init();
</script>
