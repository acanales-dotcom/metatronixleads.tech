<!DOCTYPE html>
<html lang="es">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co https://*.workers.dev wss://*.supabase.co https://api.groq.com; object-src 'none'; base-uri 'self';">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Director Operaciones IA — MetaTronix</title>
  <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/assets/fonts.css">
  <link rel="stylesheet" href="/assets/style.css?v=20260418">
  <script src="/assets/libs/supabase.min.js"></script>
  <script src="/config.js?v=20260418"></script>
  <script src="/assets/app.js?v=20260420i"></script>
  <style>
    :root { --gold:#ffb400; }
    .dops-root { display:flex; flex-direction:column; gap:24px; padding:28px; max-width:960px; margin:0 auto; }
    .page-header { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:12px; margin-bottom:4px; }
    .page-header h1 { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:1px; margin:0; color:var(--gold); }
    .page-header p  { color:var(--text-muted); font-size:13px; margin:4px 0 0; }
    .agent-badge { font-size:10px; background:rgba(255,180,0,.1); color:var(--gold); padding:3px 12px; border-radius:20px; border:1px solid rgba(255,180,0,.25); font-weight:700; }

    .agent-panel { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
    .agent-chips  { display:flex; flex-wrap:wrap; gap:6px; padding:14px 20px; border-bottom:1px solid var(--border); }
    .agent-chip {
      padding:5px 13px; border-radius:20px; font-size:11px; font-weight:600;
      background:rgba(255,255,255,.04); border:1px solid var(--border); color:var(--text-muted); cursor:pointer; transition:.15s;
    }
    .agent-chip:hover { border-color:var(--gold); color:var(--gold); }
    .agent-row { display:flex; gap:8px; padding:12px 20px; border-bottom:1px solid var(--border); }
    .agent-inp {
      flex:1; background:rgba(255,255,255,.04); border:1px solid var(--border);
      border-radius:8px; padding:9px 14px; color:var(--text); font-size:13px;
      font-family:inherit; resize:none; min-height:44px;
    }
    .agent-inp:focus { outline:none; border-color:var(--gold); }
    .agent-snd {
      padding:9px 18px; border-radius:8px; font-size:12px; font-weight:700;
      background:var(--gold); color:#000; border:none; cursor:pointer; transition:opacity .15s; align-self:flex-end;
    }
    .agent-snd:hover:not(:disabled) { opacity:.85; } .agent-snd:disabled { opacity:.4; cursor:not-allowed; }
    .agent-out {
      min-height:220px; max-height:480px; overflow-y:auto;
      padding:16px 20px; font-size:13px; line-height:1.8; color:var(--text);
    }
    .agent-out.streaming { border-top:1px solid var(--gold); }
    .agent-out h2,.agent-out h3 { font-family:'Bebas Neue',sans-serif; color:var(--gold); margin:8px 0 4px; }
    .agent-out p { margin:4px 0; } .agent-out ul { margin:4px 0 4px 16px; }
    .agent-out strong { color:#fff; }
    .agent-out table { width:100%; border-collapse:collapse; margin:8px 0; font-size:12px; }
    .agent-out th { padding:5px 8px; text-align:left; border-bottom:1px solid var(--border); color:var(--gold); font-weight:700; }
    .agent-out td { padding:5px 8px; border-bottom:1px solid rgba(255,255,255,.05); }
    .agent-foot { display:flex; justify-content:space-between; align-items:center; padding:8px 20px; border-top:1px solid var(--border); }
    .agent-clr { font-size:11px; color:var(--text-faint); background:none; border:none; cursor:pointer; }
    .agent-tok { font-size:10px; color:var(--text-faint); font-family:monospace; }
    .spin-gold { display:inline-block; width:13px; height:13px; border:2px solid rgba(255,180,0,.2); border-top-color:var(--gold); border-radius:50%; animation:gspin .7s linear infinite; }
    @keyframes gspin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>

<div id="app-root">
  <div style="padding:40px;text-align:center;color:var(--text-muted)">Cargando...</div>
</div>

<script>
'use strict';
let _user = null;
let _streaming = false;

function getDirectorOpsCompany() {
  try {
    const fin = JSON.parse(localStorage.getItem('fin_kb_v1') || '{}');
    if (fin.empresa) return fin.empresa;
    const ceo = JSON.parse(localStorage.getItem('ceo_kb_v1') || '{}');
    if (ceo.empresa) return ceo.empresa;
  } catch {}
  return 'MetaTronix';
}

async function init() {
  _user = await requireAuth(true);
  if (!_user) return;

  document.getElementById('app-root').innerHTML = buildShell();
  if (typeof renderHeader === 'function') {
    document.getElementById('sidebar-slot').innerHTML = renderHeader(_user, 'director-ops');
  }
  if (typeof initCompanySwitcher === 'function') setTimeout(initCompanySwitcher, 60);
  // Update company label dynamically from KB
  setTimeout(() => {
    const emp = getDirectorOpsCompany();
    const lbl = document.getElementById('dops-company-label');
    if (lbl) lbl.textContent = `Eficiencia operacional · Procesos · KPIs · Automatización · Supply Chain · ${emp}`;
  }, 80);
}

function buildShell() {
  return `
  <div style="display:flex;min-height:100vh">
    <div id="sidebar-slot"></div>
    <main style="flex:1;overflow:auto">
      <div class="dops-root">

        <div class="page-header">
          <div>
            <h1>⚙️ MetaOps — Director de Operaciones IA</h1>
            <p id="dops-company-label">Eficiencia operacional · Procesos · KPIs · Automatización · Supply Chain · MetaTronix</p>
          </div>
          <span class="agent-badge">Groq — llama-3.3-70b</span>
        </div>

        <div class="agent-panel">
          <div class="agent-chips">
            <button class="agent-chip" onclick="ops_ask('Diagnóstico operacional: principales cuellos de botella')">→ Diagnóstico operacional</button>
            <button class="agent-chip" onclick="ops_ask('Procesos que deberíamos automatizar con mayor prioridad')">→ Procesos a automatizar</button>
            <button class="agent-chip" onclick="ops_ask('KPIs de productividad que debemos medir esta semana')">→ KPIs de productividad</button>
            <button class="agent-chip" onclick="ops_ask('Oportunidades de reducción de costos operativos')">→ Reducción de costos</button>
            <button class="agent-chip" onclick="ops_ask('Roadmap tecnológico para los próximos 6 meses')">→ Roadmap tecnológico</button>
            <button class="agent-chip" onclick="ops_ask('Análisis de riesgos operacionales y plan de contingencia')">→ Riesgos operacionales</button>
            <button class="agent-chip" onclick="ops_ask('Plan de mejora continua — metodología y primeros pasos')">→ Mejora continua</button>
          </div>
          <div class="agent-row">
            <textarea class="agent-inp" id="ops-inp" placeholder="Consulta al Director de Operaciones IA…" rows="2"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();ops_send()}"></textarea>
            <button class="agent-snd" id="ops-btn" onclick="ops_send()">▶ Enviar</button>
          </div>
          <div class="agent-out" id="ops-out">
            <div style="color:var(--text-faint);font-style:italic;text-align:center;padding:40px">MetaOps listo · Director de Operaciones IA</div>
          </div>
          <div class="agent-foot">
            <button class="agent-clr" onclick="clearOps()">✕ Limpiar</button>
            <span class="agent-tok" id="ops-tok"></span>
          </div>
        </div>

        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">
          <span style="font-size:22px">💡</span>
          <div style="flex:1;min-width:200px">
            <div style="font-weight:600;font-size:13px;margin-bottom:2px">Conectar con otros directores</div>
            <div style="font-size:12px;color:var(--text-muted)">MetaOps trabaja en coordinación con Ventas, Marketing y Administración</div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <a href="/ventas.html#director" style="background:rgba(0,255,136,.1);color:#00ff88;border:1px solid rgba(0,255,136,.25);border-radius:7px;padding:7px 14px;font-size:12px;font-weight:600;text-decoration:none">📈 Dir. Comercial</a>
            <a href="/marketing.html#director" style="background:rgba(0,229,255,.1);color:#00e5ff;border:1px solid rgba(0,229,255,.25);border-radius:7px;padding:7px 14px;font-size:12px;font-weight:600;text-decoration:none">🎯 Dir. Marketing</a>
            <a href="/finanzas.html#director" style="background:rgba(185,102,255,.1);color:#b966ff;border:1px solid rgba(185,102,255,.25);border-radius:7px;padding:7px 14px;font-size:12px;font-weight:600;text-decoration:none">💼 Dir. Administrativo</a>
          </div>
        </div>

      </div>
    </main>
  </div>`;
}

function clearOps() {
  const out = document.getElementById('ops-out');
  const tok = document.getElementById('ops-tok');
  if (out) out.innerHTML = '<div style="color:var(--text-faint);font-style:italic;text-align:center;padding:40px">MetaOps listo · Director de Operaciones IA</div>';
  if (tok) tok.textContent = '';
}

window.ops_ask = function(p) {
  const inp = document.getElementById('ops-inp');
  if (inp) { inp.value = p; inp.focus(); }
  ops_send();
};

window.ops_send = async function() {
  if (_streaming) return;
  const inp = document.getElementById('ops-inp');
  const out = document.getElementById('ops-out');
  const btn = document.getElementById('ops-btn');
  const tok = document.getElementById('ops-tok');
  if (!inp || !out) return;
  const q = inp.value.trim(); if (!q) return;

  _streaming = true;
  btn.disabled = true;
  btn.innerHTML = '<span class="spin-gold"></span>';
  out.classList.add('streaming');
  out.innerHTML = '<div style="color:var(--text-faint);display:flex;align-items:center;gap:8px;padding:24px"><span class="spin-gold"></span> MetaOps procesando...</div>';
  inp.value = '';

  try {
    const session = await getSession();
    const jwt = session?.access_token || '';
    const proxyUrl = (window.MTX_CONFIG?.CLAUDE_PROXY_URL||'').replace(/\/+$/,'');
    if (!proxyUrl) throw new Error('CLAUDE_PROXY_URL no configurado');

    const resp = await fetch(proxyUrl + '/groq', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+jwt},
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',
        max_tokens:2048,
        system:`Eres MetaOps, el Director de Operaciones IA de ${getDirectorOpsCompany()}.
Tu especialidad: eficiencia operacional, procesos internos, KPIs de operación, mejora continua, supply chain y tecnología.
Respondes en español con análisis de cuellos de botella, oportunidades de automatización y quick wins ejecutables.
Formato: HTML semántico (h2, h3, p, ul, table, strong). Sin DOCTYPE ni etiquetas de documento.

PROTOCOLO ANTI-ALUCINACIÓN NIVEL MÉDICO — REGLAS NO NEGOCIABLES:
1. SOLO afirma lo EXPLÍCITAMENTE presente en los datos de esta conversación
2. NUNCA inventes cifras, porcentajes, nombres ni fechas — dato ausente = escribe "Sin dato disponible"
3. HECHO vs ANÁLISIS: usa "Los datos muestran X" para hechos; "Esto podría indicar Y" para análisis
4. INCERTIDUMBRE: si no es certeza, usa "aparentemente", "podría ser", "requiere verificación previa"
5. CAUSALIDAD: nunca la atribuyas sin evidencia directa — escribe "correlación posible, no causalidad confirmada"
6. EXTRAPOLACIÓN: no proyectes más allá del rango explícito de los datos proporcionados
7. AMBIGÜEDAD: si la consulta es incompleta, solicita el dato faltante — no supongas ni rellenes
8. RECOMENDACIONES EJECUTIVAS: termina cada una con "⚠ Verificar con datos actuales antes de implementar"
9. KPIs Y MÉTRICAS: añade al final "† Basado en información proporcionada — validar antes de decisiones operativas"`,
        messages:[{role:'user', content:q}],
        stream:true,
      }),
      signal:AbortSignal.timeout(90000),
    });

    if (!resp.ok) { const e=await resp.json().catch(()=>({error:resp.statusText})); throw new Error(e.error||'Error '+resp.status); }

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf=''; let html=''; let iT=0; let oT=0;
    out.innerHTML = '';

    while(true) {
      const {done,value} = await reader.read(); if(done) break;
      buf += dec.decode(value,{stream:true});
      const lines = buf.split('\n'); buf = lines.pop();
      for(const line of lines) {
        if(!line.startsWith('data:')) continue;
        const d = line.slice(5).trim(); if(d==='[DONE]') break;
        try { const j=JSON.parse(d);
          if(j.type==='content_block_delta'&&j.delta?.type==='text_delta') html+=j.delta.text;
          if(j.type==='message_start') iT=j.message?.usage?.input_tokens||0;
          if(j.type==='message_delta') oT=j.usage?.output_tokens||0;
        } catch {}
      }
      out.innerHTML = html; out.scrollTop = out.scrollHeight;
    }
    out.innerHTML = html || '<em style="color:var(--text-faint)">Sin respuesta.</em>';
    if(tok) tok.textContent = `${iT}↑ ${oT}↓ tokens`;
  } catch(e) {
    out.innerHTML = `<span style="color:#ff4646">Error: ${e.message}</span>`;
  } finally {
    _streaming = false;
    btn.disabled = false;
    btn.innerHTML = '▶ Enviar';
    out.classList.remove('streaming');
  }
};

init();
</script>
<script src="/assets/agent.js?v=20260422"></script>
<script src="/assets/teamchat.js?v=20260419"></script>
</body>
</html>
