<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetaTronix — Generar Documento</title>
  <link rel="stylesheet" href="/assets/style.css">
  <link rel="stylesheet" href="/assets/agent.css">
  <style>
    body { overflow: hidden; }
    .gen-wrap { height: calc(100vh - var(--header-h)); padding: 20px 24px; display: flex; flex-direction: column; }
    .gen-layout { display: grid; grid-template-columns: 360px 1fr; gap: 16px; flex: 1; min-height: 0; }
    .gen-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
    .gen-preview { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); display: flex; flex-direction: column; overflow: hidden; }
    .gen-preview-header { padding: 12px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface2); flex-shrink: 0; }
    .gen-preview-title { font-size: 11px; color: var(--text-muted); letter-spacing: .1em; text-transform: uppercase; font-weight: 600; }
    .gen-preview-body { flex: 1; overflow-y: auto; padding: 32px 40px; }
    .gen-preview-body.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-faint); gap: 8px; }
    .gen-preview-body.empty .hint { font-size: 12px; text-align: center; max-width: 300px; line-height: 1.6; }
    .prompt-wrap { position: relative; }
    .prompt-counter { position: absolute; bottom: 8px; right: 10px; font-size: 10px; color: var(--text-faint); font-family: var(--font-mono); }
    .model-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--accent-dim); color: var(--accent); border-radius: 3px; padding: 3px 8px; font-size: 11px; font-family: var(--font-mono); }
    .panel-title { font-family: var(--font-head); font-size: 1.2rem; color: var(--accent); letter-spacing: .04em; }
    .streaming-indicator { display: none; align-items: center; gap: 8px; font-size: 12px; color: var(--accent); }
    .streaming-indicator.active { display: flex; }
    .status-row { display: flex; align-items: center; justify-content: space-between; }
    @media (max-width: 900px) {
      body { overflow: auto; }
      .gen-wrap { height: auto; overflow: visible; padding: 16px; }
      .gen-layout { grid-template-columns: 1fr; height: auto; }
      .gen-preview { height: 70vh; }
    }
  </style>
</head>
<body>
<div id="header-placeholder"></div>

<div class="gen-wrap">
  <div class="gen-layout">

    <!-- LEFT: Config panel -->
    <div class="gen-panel">
      <div class="status-row">
        <span class="panel-title">Configurar</span>
        <span class="model-badge">⚡ Claude</span>
      </div>

      <div class="form-group">
        <label class="form-label">Tipo de Documento</label>
        <select id="doc-type" class="form-select">
          <option value="propuesta">Propuesta Comercial</option>
          <option value="contrato">Contrato de Servicios</option>
          <option value="cotizacion">Cotización</option>
          <option value="reporte">Reporte de Actividades</option>
          <option value="informe">Informe Ejecutivo</option>
          <option value="carta">Carta Formal</option>
          <option value="acuerdo">Acuerdo de Confidencialidad</option>
          <option value="tecnico">Documento Técnico</option>
          <option value="manual">Manual de Procedimientos</option>
          <option value="general">General / Otro</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Título del Documento</label>
        <input type="text" id="doc-title" class="form-input" placeholder="Ej: Propuesta para Cliente XYZ">
      </div>

      <div class="form-group">
        <label class="form-label">Empresa / Cliente</label>
        <input type="text" id="doc-company" class="form-input" placeholder="Nombre del cliente o empresa">
      </div>

      <div class="form-group">
        <label class="form-label">Instrucciones para Claude</label>
        <div class="prompt-wrap">
          <textarea id="doc-prompt" class="form-textarea" style="min-height:180px"
            placeholder="Describe qué debe incluir el documento, contexto, términos, condiciones, datos específicos...&#10;&#10;Cuanto más detallado, mejor será el resultado."></textarea>
          <span class="prompt-counter" id="prompt-counter">0</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Tono</label>
        <select id="doc-tone" class="form-select">
          <option value="formal">Formal y Profesional</option>
          <option value="tecnico">Técnico / Especializado</option>
          <option value="comercial">Comercial / Persuasivo</option>
          <option value="ejecutivo">Ejecutivo / Conciso</option>
        </select>
      </div>

      <div class="divider"></div>

      <button id="gen-btn" class="btn btn-primary btn-lg" onclick="generate()" style="width:100%">
        ⚡ Generar Documento
      </button>

      <div class="streaming-indicator" id="stream-indicator">
        <span class="spinner"></span>
        <span id="stream-words">Generando...</span>
      </div>

      <div class="divider"></div>

      <!-- Save / download actions -->
      <div style="display:flex; flex-direction:column; gap:8px" id="doc-actions" style="display:none">
        <button class="btn btn-secondary" onclick="saveDoc()" id="save-btn">💾 Guardar en Portal</button>
        <button class="btn btn-secondary" onclick="downloadNow()">⬇ Descargar HTML</button>
        <button class="btn btn-ghost btn-sm" onclick="sendReview()" id="review-btn" style="display:none">📤 Enviar a Revisión</button>
      </div>
    </div>

    <!-- RIGHT: Preview -->
    <div class="gen-preview">
      <div class="gen-preview-header">
        <span class="gen-preview-title">Vista Previa del Documento</span>
        <div id="preview-status" style="font-size:12px;color:var(--text-muted)"></div>
      </div>
      <div id="preview-body" class="gen-preview-body empty">
        <div style="font-size:48px;opacity:.2">📄</div>
        <div class="hint">Configura el tipo de documento, escribe las instrucciones y presiona <strong style="color:var(--accent)">Generar Documento</strong>.</div>
      </div>
    </div>

  </div>
</div>

<!-- Review modal -->
<div id="review-modal" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <span class="modal-title">Enviar a Revisión</span>
      <button class="modal-close" onclick="document.getElementById('review-modal').style.display='none'">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Nota para administración</label>
      <textarea id="review-message" class="form-textarea" placeholder="Contexto adicional, instrucciones especiales..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('review-modal').style.display='none'">Cancelar</button>
      <button class="btn btn-primary" id="review-submit-btn" onclick="submitForReview()">Enviar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/config.js"></script>
<script src="/assets/app.js"></script>
<script src="/assets/agent.js"></script>
<script>
let currentUser = null;
let generatedContent = '';
let savedDocId = null;
let wordCount = 0;

async function init() {
  currentUser = await requireAuth();
  if (!currentUser) return;
  document.getElementById('header-placeholder').innerHTML = renderHeader(currentUser, 'generate');

  // Prompt counter
  document.getElementById('doc-prompt').addEventListener('input', e => {
    document.getElementById('prompt-counter').textContent = e.target.value.length;
  });

  // Edit mode
  const params = new URLSearchParams(location.search);
  const editId = params.get('edit');
  if (editId) await loadForEdit(editId);
}

async function loadForEdit(docId) {
  const db = getDB();
  const { data, error } = await db.from('documents').select('*').eq('id', docId).eq('user_id', currentUser.id).single();
  if (error || !data) return;
  savedDocId = docId;
  document.getElementById('doc-type').value = data.doc_type;
  document.getElementById('doc-title').value = data.title;
  document.getElementById('doc-prompt').value = data.prompt || '';
  document.getElementById('prompt-counter').textContent = (data.prompt || '').length;
  generatedContent = data.content;
  renderPreview(data.content, data.title);
  showDocActions(true);
}

async function generate() {
  const docType = document.getElementById('doc-type').value;
  const title   = document.getElementById('doc-title').value.trim();
  const company = document.getElementById('doc-company').value.trim();
  const prompt  = document.getElementById('doc-prompt').value.trim();
  const tone    = document.getElementById('doc-tone').value;

  if (!prompt) { showToast('Escribe las instrucciones para el documento', 'warning'); return; }
  if (!title)  { showToast('Agrega un título al documento', 'warning'); return; }

  const btn = document.getElementById('gen-btn');
  btn.disabled = true; btn.textContent = 'Generando...';
  document.getElementById('stream-indicator').classList.add('active');
  document.getElementById('doc-actions').style.display = 'none';
  document.getElementById('review-btn').style.display = 'none';

  // Render empty preview
  const preview = document.getElementById('preview-body');
  preview.classList.remove('empty');
  preview.innerHTML = '<div class="doc-content" id="doc-live"></div>';
  document.getElementById('preview-status').textContent = '';

  generatedContent = '';
  wordCount = 0;

  const toneMap = {
    formal: 'formal y profesional',
    tecnico: 'técnico y especializado',
    comercial: 'comercial y persuasivo',
    ejecutivo: 'ejecutivo y conciso'
  };

  const systemPrompt = `Eres un redactor experto de documentos empresariales para IBANOR SA de CV / MetaTronix.
Genera documentos en español, con tono ${toneMap[tone]}.
IMPORTANTE:
- Devuelve SOLO HTML semántico y bien estructurado (h1, h2, h3, p, ul, ol, table, strong, em).
- NO incluyas <!DOCTYPE>, <html>, <head>, <body>, <style> ni etiquetas de estructura.
- Usa h1 para el título principal, h2 para secciones, h3 para subsecciones.
- El documento debe verse completo y profesional.
- Incluye fecha actual cuando corresponda: ${new Date().toLocaleDateString('es-MX', { day:'2-digit', month:'long', year:'numeric' })}.
- Si hay tablas de datos, inclúyelas con <table><thead><tr><th>...</th></tr></thead><tbody>...</tbody></table>.`;

  const userMsg = `Genera un documento tipo: ${typeName(docType)}.
Título: ${title}
${company ? `Cliente/Empresa: ${company}` : ''}
Instrucciones: ${prompt}`;

  await generateWithClaude(
    [{ role: 'user', content: userMsg }],
    (chunk, full) => {
      generatedContent = full;
      const live = document.getElementById('doc-live');
      if (live) {
        live.innerHTML = full + '<span class="cursor-blink"></span>';
        // auto-scroll
        preview.scrollTop = preview.scrollHeight;
      }
      wordCount = full.replace(/<[^>]*>/g,'').split(/\s+/).length;
      document.getElementById('stream-words').textContent = `${wordCount} palabras generadas...`;
    },
    (fullText) => {
      generatedContent = fullText;
      const live = document.getElementById('doc-live');
      if (live) live.innerHTML = fullText;
      document.getElementById('stream-indicator').classList.remove('active');
      document.getElementById('preview-status').innerHTML = `<span style="color:var(--accent)">✓ ${wordCount} palabras</span>`;
      btn.disabled = false; btn.textContent = '⚡ Regenerar';
      showDocActions(false);
      logActivity('generate_document', 'document', null, { title, type: docType });
    },
    (errMsg) => {
      preview.classList.add('empty');
      preview.innerHTML = `<div style="color:var(--danger);text-align:center;padding:24px">
        <div style="font-size:32px;margin-bottom:12px">⚠</div>
        <strong>Error al generar</strong><br>
        <span style="font-size:12px;opacity:.7">${escHtml(errMsg)}</span><br>
        <span style="font-size:11px;color:var(--text-faint);margin-top:8px;display:block">Verifica que CLAUDE_PROXY_URL esté configurado en config.js</span>
      </div>`;
      document.getElementById('stream-indicator').classList.remove('active');
      btn.disabled = false; btn.textContent = '⚡ Generar Documento';
    }
  );
}

function renderPreview(content, title) {
  const preview = document.getElementById('preview-body');
  preview.classList.remove('empty');
  preview.innerHTML = `<div class="doc-content">${content}</div>`;
  document.getElementById('preview-status').innerHTML = `<span style="color:var(--accent)">✓ Cargado</span>`;
}

function showDocActions(alreadySaved) {
  document.getElementById('doc-actions').style.display = 'flex';
  const saveBtn = document.getElementById('save-btn');
  saveBtn.textContent = alreadySaved ? '💾 Actualizar en Portal' : '💾 Guardar en Portal';
  document.getElementById('review-btn').style.display = savedDocId ? 'inline-flex' : 'none';
}

async function saveDoc() {
  if (!generatedContent) { showToast('Genera un documento primero', 'warning'); return; }
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Guardando...';
  try {
    const doc = await saveDocument({
      id:       savedDocId || null,
      title:    document.getElementById('doc-title').value.trim() || 'Sin título',
      doc_type: document.getElementById('doc-type').value,
      prompt:   document.getElementById('doc-prompt').value.trim(),
      content:  generatedContent,
    });
    savedDocId = doc.id;
    showToast('Documento guardado ✓', 'success');
    btn.textContent = '💾 Actualizar en Portal';
    document.getElementById('review-btn').style.display = 'inline-flex';
  } catch(e) {
    showToast('Error al guardar: ' + e.message, 'error');
  }
  btn.disabled = false;
}

function downloadNow() {
  if (!generatedContent) { showToast('Genera un documento primero', 'warning'); return; }
  const title = document.getElementById('doc-title').value.trim() || 'documento';
  downloadDocument(title, generatedContent);
  if (savedDocId) logActivity('download_document', 'document', savedDocId, { title });
}

function sendReview() {
  if (!savedDocId) { showToast('Guarda el documento primero', 'warning'); return; }
  document.getElementById('review-message').value = '';
  document.getElementById('review-modal').style.display = 'flex';
}

async function submitForReview() {
  const btn = document.getElementById('review-submit-btn');
  btn.disabled = true; btn.textContent = 'Enviando...';
  try {
    await sendForReview(savedDocId, document.getElementById('review-message').value.trim());
    document.getElementById('review-modal').style.display = 'none';
    showToast('Enviado a revisión ✓', 'success');
    document.getElementById('review-btn').style.display = 'none';
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  }
  btn.disabled = false; btn.textContent = 'Enviar';
}

init();
</script>
</body>
</html>
