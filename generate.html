<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetaTronix — Generar Documento</title>
  <link rel="stylesheet" href="/assets/style.css?v=2">
  <link rel="stylesheet" href="/assets/agent.css">
  <style>
    body { overflow: hidden; }

    .gen-wrap {
      height: 100vh;
      padding: 20px 24px 16px;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    .gen-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
      flex: 1;
      min-height: 0;
    }

    /* ── Left panel ─────────────────────────────────────── */
    .gen-panel {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    .gen-panel-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 8px;
    }
    .gen-panel-title {
      font-family: var(--font-head);
      font-size: 1rem;
      color: var(--accent);
      letter-spacing: .04em;
      white-space: nowrap;
    }
    .gen-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Template cards ──────────────────────────────────── */
    .tpl-card {
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 14px;
      cursor: pointer;
      transition: all .15s;
      background: var(--surface);
    }
    .tpl-card:hover { border-color: var(--accent); background: var(--accent-dim); }
    .tpl-card.selected {
      border-color: var(--accent);
      background: var(--accent-dim);
      box-shadow: 0 0 0 3px var(--accent-mid);
    }
    .tpl-name { font-weight: 700; font-size: 13px; color: var(--text); margin-bottom: 3px; }
    .tpl-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
    .tpl-meta { margin-top: 6px; display: flex; align-items: center; gap: 6px; }
    .tpl-badge {
      font-size: 9px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      padding: 2px 6px; border-radius: 3px;
      background: var(--accent-dim); color: var(--accent);
    }

    /* ── Folder headers ──────────────────────────────────── */
    .tpl-folder-header {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 4px 5px;
      margin-top: 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
    }
    .tpl-folder-header:first-child { margin-top: 0; }
    .tpl-folder-icon { font-size: 13px; }
    .tpl-folder-name {
      font-size: 11px; font-weight: 700; letter-spacing: .06em;
      text-transform: uppercase; color: var(--accent); flex: 1;
    }
    .tpl-folder-count {
      font-size: 10px; font-weight: 700;
      background: var(--accent-dim); color: var(--accent);
      padding: 1px 6px; border-radius: 99px;
      font-family: var(--font-mono);
    }

    .back-btn {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--text-muted);
      background: none; border: none; cursor: pointer; padding: 2px 0;
    }
    .back-btn:hover { color: var(--accent); }

    .selected-tpl-header {
      background: var(--accent-dim); border: 1px solid var(--accent);
      border-radius: var(--radius); padding: 10px 12px;
    }
    .selected-tpl-name { font-weight: 700; font-size: 13px; color: var(--accent); }
    .selected-tpl-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .scope-notice {
      background: var(--warning-dim); border: 1px solid rgba(217,119,6,.3);
      border-radius: var(--radius); padding: 8px 12px;
      font-size: 11px; color: var(--warning); line-height: 1.5;
    }

    /* ── Right: iframe container ─────────────────────────── */
    .gen-preview {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    .gen-preview-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 8px;
    }
    .gen-preview-title {
      font-size: 11px; color: var(--text-muted);
      letter-spacing: .1em; text-transform: uppercase; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .preview-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

    #doc-frame {
      flex: 1;
      border: none;
      width: 100%;
      background: #fff;
    }
    .frame-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-faint);
      gap: 12px;
      padding: 40px;
      text-align: center;
    }
    .frame-empty p { font-size: 12px; color: var(--text-muted); line-height: 1.7; max-width: 300px; }

    /* stream */
    .stream-status { display:none; align-items:center; gap:8px; font-size:12px; color:var(--accent); }
    .stream-status.active { display:flex; }

    /* No templates */
    .no-tpl { text-align:center; padding:32px 12px; color:var(--text-muted); }
    .no-tpl .icon { font-size:36px; opacity:.35; margin-bottom:10px; }
    .no-tpl p { font-size:12px; line-height:1.6; }

    @media (max-width:900px) {
      body { overflow:auto; }
      .gen-wrap { height:auto; padding:14px; }
      .gen-layout { grid-template-columns:1fr; height:auto; }
      #doc-frame, .frame-empty { height:65vh; }
    }
  </style>
</head>
<body>
<div id="header-placeholder"></div>

<div class="gen-wrap">
  <div class="gen-layout">

    <!-- LEFT -->
    <div class="gen-panel">
      <div class="gen-panel-head">
        <span class="gen-panel-title" id="panel-title">Seleccionar Plantilla</span>
        <span id="panel-badge" class="badge badge-accent" style="font-size:10px;white-space:nowrap"></span>
      </div>
      <div class="gen-panel-body" id="panel-body">
        <div style="text-align:center;padding:28px;color:var(--text-muted)">
          <span class="spinner"></span><br><br>Cargando plantillas...
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="gen-preview">
      <div class="gen-preview-header">
        <span class="gen-preview-title" id="preview-title">Vista del Documento</span>
        <div class="preview-actions" id="preview-actions" style="display:none">
          <span id="preview-wc" style="font-size:11px;color:var(--accent);font-family:var(--font-mono)"></span>
          <button class="btn btn-secondary btn-sm" onclick="saveDoc()" id="save-btn">💾 Guardar</button>
          <button class="btn btn-primary btn-sm" onclick="downloadDoc()" id="dl-btn">⬇ Descargar</button>
          <button class="btn btn-ghost btn-sm" onclick="sendReview()" id="review-btn" style="display:none">📤 Enviar a revisión</button>
        </div>
        <div class="stream-status" id="stream-status">
          <span class="spinner"></span>
          <span id="stream-words">Generando...</span>
        </div>
      </div>
      <div id="frame-empty" class="frame-empty">
        <div style="font-size:52px;opacity:.12">📄</div>
        <p>Selecciona una plantilla aprobada por la administración para comenzar a generar documentos dentro del portal.</p>
      </div>
      <iframe id="doc-frame" style="display:none" sandbox="allow-same-origin allow-scripts"></iframe>
    </div>

  </div>
</div>

<!-- Review modal -->
<div id="review-modal" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <span class="modal-title">Enviar a Revisión</span>
      <button class="modal-close" onclick="closeReviewModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Nota para administración</label>
      <textarea id="review-message" class="form-textarea" placeholder="Contexto adicional..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeReviewModal()">Cancelar</button>
      <button class="btn btn-primary" id="review-submit-btn" onclick="submitForReview()">Enviar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/config.js"></script>
<script src="/assets/app.js?v=6"></script>
<script src="/assets/agent.js?v=4"></script>
<!-- ALEX: Sales Coach Agent -->
<script src="/assets/salescoach.js?v=4"></script>
<!-- TEAM CHAT -->
<script src="/assets/teamchat.js?v=4"></script>
<script>
'use strict';
let currentUser   = null;
let isAdmin       = false;
let templates     = [];
let selectedTpl   = null;
let generatedHTML = '';   // full HTML string ready to render + download
let savedDocId    = null;

// ── Init ──────────────────────────────────────────────────
async function init() {
  currentUser = await requireAuth();
  if (!currentUser) return;
  document.getElementById('header-placeholder').innerHTML = renderHeader(currentUser, 'generate');

  const role = currentUser?.profile?.role;
  isAdmin = ['admin', 'super_admin'].includes(role);

  await loadTemplates();
}

// ── Load templates ────────────────────────────────────────
async function loadTemplates() {
  const db = getDB();
  const { data, error } = await db
    .from('metatronix_docs')
    .select('id, title, description, text_content, file_data, file_name, uploaded_by_name, created_at')
    .eq('category', 'plantilla')
    .order('created_at', { ascending: false });

  templates = (error || !data) ? [] : data;
  renderPanel();
}

// ── Get folder name from file_path ────────────────────────
function getFolder(tpl) {
  if (!tpl.file_path) return '';
  const parts = tpl.file_path.split('/');
  // 'plantillas/assessment/file.html' → 'assessment'
  // 'plantillas/file.html'            → ''
  return parts.length >= 3 ? parts[1].toLowerCase() : '';
}

function folderLabel(slug) {
  if (!slug) return '';
  return slug.replace(/-/g,' ').replace(/_/g,' ')
    .replace(/\b\w/g, c => c.toUpperCase());
}

// ── Render left panel (step 1: grid) ─────────────────────
function renderPanel() {
  document.getElementById('panel-title').textContent = 'Seleccionar Plantilla';

  if (templates.length === 0) {
    document.getElementById('panel-badge').textContent = '';
    document.getElementById('panel-body').innerHTML = `
      <div class="no-tpl">
        <div class="icon">📄</div>
        <p><strong>Sin plantillas disponibles.</strong></p>
        <p>Las plantillas son gestionadas internamente por la administración.</p>
      </div>`;
    return;
  }

  document.getElementById('panel-badge').textContent = templates.length + ' plantilla' + (templates.length !== 1 ? 's' : '');

  // ── Group by folder ───────────────────────────────────
  const grouped = {};
  templates.forEach(t => {
    const folder = getFolder(t);
    if (!grouped[folder]) grouped[folder] = [];
    grouped[folder].push(t);
  });

  // Sort: root ('') first, then alphabetical folders
  const folderKeys = Object.keys(grouped).sort((a, b) => {
    if (a === '') return -1;
    if (b === '') return 1;
    return a.localeCompare(b);
  });

  const tplCard = t => `
    <div class="tpl-card" data-id="${t.id}" onclick="selectTemplate('${t.id}')">
      <div class="tpl-name">${escHtml(t.title)}</div>
      ${t.description ? `<div class="tpl-desc">${escHtml(t.description)}</div>` : ''}
      <div class="tpl-meta">
        <span class="tpl-badge">Plantilla aprobada</span>
      </div>
    </div>`;

  document.getElementById('panel-body').innerHTML = folderKeys.map(folder => {
    const items = grouped[folder];
    const header = folder
      ? `<div class="tpl-folder-header">
           <span class="tpl-folder-icon">📁</span>
           <span class="tpl-folder-name">${escHtml(folderLabel(folder))}</span>
           <span class="tpl-folder-count">${items.length}</span>
         </div>`
      : '';
    return header + items.map(tplCard).join('');
  }).join('');
}

// ── Select template → step 2 ──────────────────────────────
function selectTemplate(id) {
  selectedTpl = templates.find(t => t.id === id);
  if (!selectedTpl) return;
  generatedHTML = '';
  savedDocId = null;

  document.getElementById('panel-title').textContent = 'Configurar';
  document.getElementById('panel-badge').textContent = '';

  const htmlContent = getTemplateHTML(selectedTpl);
  const placeholders = extractPlaceholders(htmlContent);

  document.getElementById('panel-body').innerHTML = `
    <button class="back-btn" onclick="renderPanel()">← Cambiar plantilla</button>

    <div class="selected-tpl-header">
      <div class="selected-tpl-name">📄 ${escHtml(selectedTpl.title)}</div>
      ${getFolder(selectedTpl) ? `<div style="font-size:10px;color:var(--accent);font-family:var(--font-mono);margin-top:2px;opacity:.8">📁 ${escHtml(folderLabel(getFolder(selectedTpl)))}</div>` : ''}
      ${selectedTpl.description ? `<div class="selected-tpl-desc">${escHtml(selectedTpl.description)}</div>` : ''}
    </div>

    <div class="scope-notice">
      ⚠ Solo se puede generar contenido dentro del alcance definido por esta plantilla.
    </div>

    <div class="form-group">
      <label class="form-label">Título del Documento *</label>
      <input type="text" id="doc-title" class="form-input" value="${escHtml(selectedTpl.title)}" placeholder="Título del documento">
    </div>
    <div class="form-group">
      <label class="form-label">Empresa / Cliente *</label>
      <input type="text" id="doc-company" class="form-input" placeholder="Nombre de la empresa o cliente">
    </div>

    ${placeholders.length > 0
      ? `<div style="font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--text-muted);text-transform:uppercase;padding-top:2px">Campos de la plantilla</div>
         ${placeholders.map(p => `
         <div class="form-group">
           <label class="form-label">${escHtml(p.label)}</label>
           ${p.multiline
             ? `<textarea id="f-${p.key}" class="form-textarea" style="min-height:64px" placeholder="${escHtml(p.hint || 'Detalla este campo...')}"></textarea>`
             : `<input type="text" id="f-${p.key}" class="form-input" placeholder="${escHtml(p.hint || p.label)}">`}
         </div>`).join('')}`
      : `<div class="form-group">
           <label class="form-label">Contexto y detalles</label>
           <textarea id="doc-context" class="form-textarea" style="min-height:110px"
             placeholder="Describe el proyecto, servicios, condiciones, datos específicos para este documento..."></textarea>
         </div>`}

    <div class="divider"></div>

    <button id="gen-btn" class="btn btn-primary" style="width:100%;padding:11px" onclick="generate()">
      ⚡ Generar Documento
    </button>
    <div class="stream-status" id="stream-status-panel">
      <span class="spinner"></span>
      <span id="stream-words-panel">Generando...</span>
    </div>`;

  // Show template in iframe on right
  renderInFrame(buildFullHTML(htmlContent || buildEmptyPreview(selectedTpl), false), selectedTpl.title + ' — Plantilla base');
}

// ── Build full HTML wrapper ───────────────────────────────
function buildFullHTML(bodyContent, isGenerated = true) {
  const highlightPlaceholders = !isGenerated
    ? bodyContent.replace(/\{\{[^}]+\}\}/g,
        '<span style="background:#fffbeb;border:1px dashed #d97706;border-radius:3px;padding:0 4px;font-size:.9em;color:#92400e">[campo a completar]</span>')
    : bodyContent;

  // Strip duplicate html/head/body if the template already has them
  const hasFullDoc = /<html[\s>]/i.test(bodyContent);
  if (hasFullDoc) return bodyContent; // use as-is

  return `<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; line-height: 1.75;
      color: #1a2233; background: #fff;
      padding: 48px 56px;
      max-width: 820px; margin: 0 auto;
    }
    h1 { font-size: 24px; font-weight: 700; color: #0055ff; margin-bottom: 20px;
         padding-bottom: 12px; border-bottom: 2px solid #e8edf3; }
    h2 { font-size: 17px; font-weight: 600; color: #1a2233; margin: 28px 0 10px; }
    h3 { font-size: 14px; font-weight: 600; color: #5a6a85; margin: 18px 0 7px; }
    p  { margin-bottom: 12px; }
    ul, ol { padding-left: 22px; margin-bottom: 12px; }
    li { margin-bottom: 5px; }
    strong { font-weight: 600; }
    em { color: #5a6a85; }
    table { width: 100%; border-collapse: collapse; margin: 18px 0; }
    th { background: #f0f4ff; color: #1a2233; font-weight: 600; font-size: 12px;
         padding: 10px 14px; border: 1px solid #dde3ec; text-align: left; }
    td { padding: 10px 14px; border: 1px solid #dde3ec; vertical-align: top; }
    tr:nth-child(even) td { background: #f8f9fb; }
    .doc-footer {
      margin-top: 56px; padding-top: 16px; border-top: 1px solid #e8edf3;
      font-size: 11px; color: #a8b5c8; text-align: center;
    }
    ${!isGenerated ? '.placeholder { background:#fffbeb;border:1px dashed #d97706;border-radius:3px;padding:0 4px;font-size:.9em;color:#92400e }' : ''}
  </style>
</head>
<body>
${highlightPlaceholders}
<div class="doc-footer">IBANOR SA de CV · MetaTronix Portal · ${new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'long',year:'numeric'})}</div>
</body>
</html>`;
}

function buildEmptyPreview(tpl) {
  return `<h1>${escHtml(tpl.title)}</h1>
<p style="color:#a8b5c8">${escHtml(tpl.description || 'Selecciona esta plantilla y completa los campos para generar el documento.')}</p>`;
}

// ── Render content in iframe ──────────────────────────────
function renderInFrame(fullHTML, label) {
  const frame  = document.getElementById('doc-frame');
  const empty  = document.getElementById('frame-empty');
  const titleEl = document.getElementById('preview-title');

  empty.style.display = 'none';
  frame.style.display  = 'block';
  if (label) titleEl.textContent = label;

  // Use blob URL to avoid srcdoc size limits
  const blob = new Blob([fullHTML], { type: 'text/html;charset=utf-8' });
  const prev = frame._blobUrl;
  frame._blobUrl = URL.createObjectURL(blob);
  frame.src = frame._blobUrl;
  if (prev) setTimeout(() => URL.revokeObjectURL(prev), 2000);
}

// ── Generate ──────────────────────────────────────────────
async function generate() {
  const title   = (document.getElementById('doc-title')?.value || '').trim();
  const company = (document.getElementById('doc-company')?.value || '').trim();
  if (!title)   { showToast('Agrega un título al documento', 'warning'); return; }
  if (!company) { showToast('Escribe el nombre del cliente o empresa', 'warning'); return; }

  // Claude access check
  if (currentUser?.id && typeof checkClaudeAccess === 'function') {
    const access = await checkClaudeAccess(currentUser.id);
    if (!access.allowed) {
      const msgs = { disabled:'Claude deshabilitado. Contacta al admin.', pending_auth:'Límite mensual alcanzado. Solicitud enviada.', limit_reached:`Límite (${access.used}/${access.limit}) alcanzado.` };
      showToast(msgs[access.reason] || 'Sin acceso.', 'warning'); return;
    }
  }

  const btn = document.getElementById('gen-btn');
  btn.disabled = true; btn.textContent = 'Generando...';
  document.getElementById('stream-status-panel').classList.add('active');
  document.getElementById('preview-actions').style.display = 'none';

  const htmlContent = getTemplateHTML(selectedTpl);
  const placeholders = extractPlaceholders(htmlContent);
  let fieldsInfo = '';
  if (placeholders.length > 0) {
    const vals = placeholders.map(p => {
      const v = document.getElementById('f-' + p.key)?.value?.trim();
      return v ? `- ${p.label}: ${v}` : '';
    }).filter(Boolean).join('\n');
    if (vals) fieldsInfo = '\nCAMPOS:\n' + vals;
  } else {
    const ctx = document.getElementById('doc-context')?.value?.trim();
    if (ctx) fieldsInfo = '\nCONTEXTO:\n' + ctx;
  }

  const today = new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'long',year:'numeric'});

  const systemPrompt = `Eres un generador de documentos para MetaTronix / IBANOR SA de CV.

PLANTILLA APROBADA:
${selectedTpl.title}${selectedTpl.description ? ' — ' + selectedTpl.description : ''}

CONTENIDO DE LA PLANTILLA:
${htmlContent || '(usa el título y descripción como guía)'}

REGLAS ABSOLUTAS:
1. Genera ÚNICAMENTE el tipo de documento definido en la plantilla.
2. Mantén la misma estructura, secciones y alcance que la plantilla establece.
3. Si hay marcadores {{CAMPO}} reemplázalos con el contenido apropiado.
4. NO añadas secciones que la plantilla no contempla.
5. Devuelve SOLO el HTML del cuerpo del documento (sin <!DOCTYPE>, <html>, <head>, <body>, <style>).
6. Usa h1 para título, h2 secciones, h3 subsecciones, p, ul, ol, table, strong, em.
7. Fecha: ${today}
8. CRÍTICO — Placeholders de precio: Si la plantilla contiene {{PRECIO_PROYECTO}}, {{PRECIO}}, {{MONTO}}, {{VALOR}}, {{COSTO}}, {{IMPORTE}} o {{TOTAL_PROYECTO}}, escríbelos EXACTAMENTE con esa sintaxis en tu respuesta. NO los reemplaces con ningún valor. La administración los definirá al aprobar el documento.`;

  const userMsg = `Documento: ${title}\nCliente: ${company}${fieldsInfo}\n\nGenera el documento siguiendo estrictamente la plantilla.`;

  // Show loading frame
  renderInFrame(buildFullHTML(`<div style="text-align:center;padding:80px 40px;color:#a8b5c8">
    <div style="font-size:48px;margin-bottom:16px;animation:spin .8s linear infinite;display:inline-block">⚙️</div>
    <p style="font-size:16px">Generando documento...</p></div>`, true), title);

  // Stream accumulation
  let accumulated = '';
  let wordCount = 0;

  await generateWithClaude(
    [{ role:'user', content: userMsg }],
    (chunk, full) => {
      accumulated = full;
      wordCount = full.replace(/<[^>]*>/g,'').split(/\s+/).filter(Boolean).length;
      document.getElementById('stream-words-panel').textContent = `${wordCount} palabras...`;
    },
    (fullText) => {
      generatedHTML = buildFullHTML(fullText, true);
      renderInFrame(generatedHTML, title);
      document.getElementById('stream-status-panel').classList.remove('active');
      document.getElementById('preview-actions').style.display = 'flex';
      document.getElementById('preview-wc').textContent = wordCount + ' palabras';
      btn.disabled = false; btn.textContent = '⚡ Regenerar';
      // Show review button — auto-save in background then reveal
      autoSaveForReview(title);
      if (typeof incrementClaudeUsage === 'function') incrementClaudeUsage(currentUser.id).catch(()=>{});
      logActivity('generate_document', 'document', null, { title, template: selectedTpl.title });
    },
    (err) => {
      renderInFrame(buildFullHTML(`<div style="text-align:center;padding:60px;color:#e03030">
        <p style="font-size:32px">⚠</p><p style="margin-top:8px;font-weight:600">Error al generar</p>
        <p style="font-size:12px;opacity:.7;margin-top:6px">${escHtml(err)}</p></div>`, true), title);
      document.getElementById('stream-status-panel').classList.remove('active');
      btn.disabled = false; btn.textContent = '⚡ Generar Documento';
    }
  );
}

// ── Auto-save in background and reveal review button ──────
async function autoSaveForReview(title) {
  try {
    const company = document.getElementById('doc-company')?.value?.trim() || '';
    const doc = await saveDocument({
      id:       savedDocId || null,
      title:    title || selectedTpl.title,
      doc_type: 'plantilla',
      prompt:   JSON.stringify({
        _v: 1,
        templateId:    selectedTpl?.id    || '',
        templateTitle: selectedTpl?.title || '',
        company,
        fields: collectFieldValues(),
        hasPricePlaceholder: /\{\{(PRECIO_PROYECTO|PRECIO|MONTO|VALOR|COSTO|IMPORTE|TOTAL_PROYECTO)\}\}/i.test(generatedHTML),
      }),
      content: generatedHTML,
    });
    savedDocId = doc.id;
    document.getElementById('review-btn').style.display = 'inline-flex';
  } catch(_) {
    // Silent — user can still manually save+review
    document.getElementById('review-btn').style.display = 'inline-flex';
  }
}

// ── Download ──────────────────────────────────────────────
function downloadDoc() {
  if (!generatedHTML) { showToast('Genera el documento primero', 'warning'); return; }
  const title = document.getElementById('doc-title')?.value?.trim() || 'documento';
  const blob  = new Blob([generatedHTML], { type:'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = title.replace(/[^a-z0-9áéíóúñ\s]/gi,'_').replace(/\s+/g,'_').toLowerCase() + '.html';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

// ── Save ──────────────────────────────────────────────────
function collectFieldValues() {
  const htmlContent = getTemplateHTML(selectedTpl);
  const placeholders = extractPlaceholders(htmlContent);
  const out = {};
  if (placeholders.length > 0) {
    placeholders.forEach(p => {
      const v = document.getElementById('f-' + p.key)?.value?.trim();
      if (v) out[p.key] = v;
    });
  } else {
    const ctx = document.getElementById('doc-context')?.value?.trim();
    if (ctx) out['_contexto'] = ctx;
  }
  return out;
}

async function saveDoc() {
  if (!generatedHTML) { showToast('Genera el documento primero', 'warning'); return; }
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Guardando...';
  try {
    const company = document.getElementById('doc-company')?.value?.trim() || '';
    const doc = await saveDocument({
      id:       savedDocId || null,
      title:    document.getElementById('doc-title')?.value?.trim() || selectedTpl.title,
      doc_type: 'plantilla',
      prompt:   JSON.stringify({
        _v: 1,
        templateId:    selectedTpl?.id    || '',
        templateTitle: selectedTpl?.title || '',
        company,
        fields: collectFieldValues(),
        hasPricePlaceholder: /\{\{(PRECIO_PROYECTO|PRECIO|MONTO|VALOR|COSTO|IMPORTE|TOTAL_PROYECTO)\}\}/i.test(generatedHTML),
      }),
      content:  generatedHTML,
    });
    savedDocId = doc.id;
    showToast('Guardado en el portal ✓', 'success');
    btn.textContent = '💾 Actualizar';
    document.getElementById('review-btn').style.display = 'inline-flex';
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
  btn.disabled = false;
}

// ── Review ────────────────────────────────────────────────
function sendReview() {
  if (!savedDocId) { showToast('Guarda el documento primero', 'warning'); return; }
  document.getElementById('review-message').value = '';
  document.getElementById('review-modal').style.display = 'flex';
}
function closeReviewModal() { document.getElementById('review-modal').style.display = 'none'; }
async function submitForReview() {
  const btn = document.getElementById('review-submit-btn');
  btn.disabled = true; btn.textContent = 'Enviando...';
  try {
    await sendForReview(savedDocId, document.getElementById('review-message').value.trim());
    closeReviewModal(); showToast('Enviado a revisión ✓', 'success');
    document.getElementById('review-btn').style.display = 'none';
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
  btn.disabled = false; btn.textContent = 'Enviar';
}

// ── Helpers ────────────────────────────────────────────────
function getTemplateHTML(tpl) {
  if (tpl.text_content && tpl.text_content.trim().length > 30) return tpl.text_content;
  if (tpl.file_data) {
    try { return decodeURIComponent(escape(atob(tpl.file_data))); } catch(_) { try { return atob(tpl.file_data); } catch(__) {} }
  }
  return '';
}

function extractPlaceholders(html) {
  if (!html) return [];
  const regex = /\{\{([^}]+)\}\}/g;
  const seen = new Set();
  const result = [];
  let m;
  while ((m = regex.exec(html)) !== null) {
    const raw = m[1].trim();
    const [keyRaw, hintRaw] = raw.split(':').map(s => s.trim());
    const key = keyRaw.toUpperCase().replace(/\s+/g,'_');
    if (seen.has(key) || ['FECHA','DATE','HOY','PRECIO','PRECIO_PROYECTO','MONTO','VALOR','COSTO','IMPORTE','TOTAL_PROYECTO','PRECIO_TOTAL'].includes(key)) continue;
    seen.add(key);
    const label = keyRaw.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    const multiline = ['DESCRIPCION','SERVICIOS','CONTENIDO','DETALLES','ALCANCE',
      'TERMINOS','CONDICIONES','OBJETIVO','ANTECEDENTES','PROPUESTA','ENTREGABLES'].some(k=>key.includes(k));
    result.push({ key, label, hint: hintRaw || '', multiline });
  }
  return result;
}

init();
</script>
