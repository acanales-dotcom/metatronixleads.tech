  <style>
    :root {
      --m1: #00ff88;  /* Mesa 1: Estrategia */
      --m2: #00e5ff;  /* Mesa 2: Mercado */
      --m3: #ffb400;  /* Mesa 3: Operaciones */
      --m4: #b966ff;  /* Mesa 4: Finanzas */
      --m5: #ff6b6b;  /* Mesa 5: Innovación */
    }

    .consejo-root { display:flex; flex-direction:column; gap:28px; padding:28px; max-width:1400px; margin:0 auto; }

    /* Page header */
    .page-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
    .page-header h1 { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:.06em; margin:0; }
    .page-header p  { font-size:12px; color:var(--text-muted); margin:3px 0 0; }

    /* Mesa tabs */
    .mesa-tabs { display:flex; gap:6px; flex-wrap:wrap; }
    .mesa-tab {
      padding:10px 20px; border-radius:8px; font-size:12px; font-weight:700; letter-spacing:.04em;
      background:var(--surface); border:1px solid var(--border);
      color:var(--text-muted); cursor:pointer; transition:.2s;
      display:flex; align-items:center; gap:8px;
    }
    .mesa-tab:hover { border-color:var(--tab-color); color:var(--tab-color); }
    .mesa-tab.active {
      background:rgba(255,255,255,.04); border-color:var(--tab-color);
      color:var(--tab-color); box-shadow:0 0 12px -4px var(--tab-color);
    }
    .mesa-tab .tab-dot { width:8px; height:8px; border-radius:50%; background:var(--tab-color); opacity:.6; }
    .mesa-tab.active .tab-dot { opacity:1; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* Mesa panel */
    .mesa-pane { display:none; flex-direction:column; gap:20px; }
    .mesa-pane.active { display:flex; }

    /* Mesa card */
    .mesa-card {
      background:var(--surface); border:1px solid var(--border); border-radius:12px;
      overflow:hidden; display:flex; flex-direction:column;
      min-height:500px;
    }
    .mesa-head {
      padding:20px 24px; border-bottom:1px solid var(--border);
      background:linear-gradient(135deg, rgba(0,0,0,.5) 0%, transparent 100%);
      display:flex; align-items:flex-start; gap:16px; flex-wrap:wrap;
    }
    .mesa-icon { font-size:32px; flex-shrink:0; }
    .mesa-meta { flex:1; }
    .mesa-name { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:.07em; }
    .mesa-desc { font-size:12px; color:var(--text-muted); margin-top:4px; line-height:1.6; max-width:600px; }
    .mesa-badge {
      font-size:10px; font-weight:700; padding:3px 10px; border-radius:20px;
      border:1px solid; margin-top:6px; display:inline-block;
    }
    .mesa-access { font-size:11px; color:var(--text-faint); align-self:flex-start; margin-top:4px; white-space:nowrap; }

    .mesa-body { padding:20px 24px; display:flex; flex-direction:column; gap:16px; flex:1; }

    /* Agenda / agenda presets */
    .agenda-section { display:flex; flex-direction:column; gap:8px; }
    .agenda-label { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text-faint); }
    .agenda-chips { display:flex; flex-wrap:wrap; gap:6px; }
    .agenda-chip {
      padding:6px 14px; border-radius:6px; font-size:11px; font-weight:600;
      background:rgba(255,255,255,.04); border:1px solid var(--border);
      color:var(--text-muted); cursor:pointer; transition:.15s;
    }
    .agenda-chip:hover { border-color:var(--mesa-color); color:var(--mesa-color); }

    /* Context inputs */
    .context-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:700px){ .context-grid { grid-template-columns:1fr; } }
    .form-group { display:flex; flex-direction:column; gap:5px; }
    .form-label { font-size:10px; font-weight:700; color:var(--text-faint); text-transform:uppercase; letter-spacing:.05em; }
    .form-input, .form-select, .form-textarea {
      background:rgba(255,255,255,.05); border:1px solid var(--border); border-radius:7px;
      padding:9px 12px; color:var(--text); font-size:12px; font-family:inherit;
      width:100%; box-sizing:border-box;
    }
    .form-textarea { min-height:90px; resize:vertical; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline:none; border-color:var(--mesa-color, var(--accent-dim)); }

    /* Output */
    .session-output {
      flex:1; min-height:280px; max-height:500px; overflow-y:auto;
      background:rgba(0,0,0,.4); border:1px solid var(--border); border-radius:8px;
      padding:16px 20px; font-size:12px; line-height:1.8; color:var(--text);
    }
    .session-output.streaming { border-color:var(--mesa-color, var(--accent)); }
    .session-output h2 { font-family:'Bebas Neue',sans-serif; color:var(--mesa-color, var(--accent)); letter-spacing:.06em; margin:10px 0 5px; font-size:20px; }
    .session-output h3 { font-family:'Bebas Neue',sans-serif; color:var(--text-muted); letter-spacing:.04em; margin:8px 0 4px; font-size:14px; }
    .session-output p  { margin:4px 0; }
    .session-output ul, .session-output ol { margin:4px 0 4px 18px; }
    .session-output table { width:100%; border-collapse:collapse; margin:10px 0; font-size:11px; }
    .session-output th { padding:6px 10px; text-align:left; border-bottom:1px solid var(--border); font-weight:700; }
    .session-output td { padding:6px 10px; border-bottom:1px solid rgba(255,255,255,.04); }
    .session-output strong { color:#fff; }
    .session-placeholder { color:var(--text-faint); font-style:italic; text-align:center; padding:40px 20px; font-size:12px; }

    /* Actions */
    .mesa-actions { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .btn-mesa {
      padding:9px 20px; border-radius:7px; font-size:12px; font-weight:700;
      background:var(--mesa-color); color:#000; border:none; cursor:pointer;
      transition:opacity .15s; display:inline-flex; align-items:center; gap:7px;
    }
    .btn-mesa:hover:not(:disabled) { opacity:.85; }
    .btn-mesa:disabled { opacity:.4; cursor:not-allowed; }
    .btn-outline-sm {
      padding:7px 14px; border-radius:7px; font-size:12px; font-weight:600;
      background:transparent; border:1px solid var(--border); color:var(--text-muted);
      cursor:pointer; transition:.15s;
    }
    .btn-outline-sm:hover { border-color:var(--mesa-color, var(--accent)); color:var(--text); }

    /* Blocked state */
    .mesa-blocked {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height:300px; gap:16px; color:var(--text-faint); text-align:center;
    }
    .mesa-blocked-icon { font-size:48px; opacity:.4; }
    .mesa-blocked h3 { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:.06em; color:var(--text-muted); }
    .mesa-blocked p { font-size:12px; max-width:320px; line-height:1.7; }

    /* Consejo KB Panel */
    .consejo-kb-panel {
      background:linear-gradient(135deg,#0a1628 0%,#150a28 100%);
      border:1px solid rgba(185,102,255,.2); border-radius:10px;
      padding:16px 20px; display:none;
    }
    .consejo-kb-panel.open { display:block; }
    .consejo-kb-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:12px; }
    @media(max-width:900px){ .consejo-kb-grid { grid-template-columns:1fr; } }
    .consejo-kb-field { display:flex; flex-direction:column; gap:5px; }
    .consejo-kb-field label { font-size:10px; font-weight:700; color:rgba(185,102,255,.7); letter-spacing:.08em; text-transform:uppercase; }
    .consejo-kb-field textarea,.consejo-kb-field input {
      border:1px solid rgba(185,102,255,.2); background:rgba(185,102,255,.04);
      color:#e2e8f0; border-radius:6px; padding:8px 10px;
      font-family:'DM Sans',sans-serif; font-size:12px; resize:none; outline:none;
    }
    .consejo-kb-field textarea::placeholder,.consejo-kb-field input::placeholder { color:rgba(255,255,255,.3); }
    .consejo-kb-field textarea:focus,.consejo-kb-field input:focus { border-color:#b966ff; }

    /* Session notes */
    .notes-bar {
      background:rgba(255,255,255,.02); border:1px solid var(--border); border-radius:8px;
      padding:12px 16px; font-size:12px; display:flex; align-items:center; gap:10px;
    }
    .notes-input {
      flex:1; background:transparent; border:none; color:var(--text); font-family:inherit; font-size:12px;
    }
    .notes-input:focus { outline:none; }

    .spin { display:inline-block; width:13px; height:13px; border:2px solid rgba(0,255,136,.25); border-top-color:var(--green); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>

function switchTab(idx) {
  _activeTab = idx;
  MESAS.forEach((m,i) => {
    const tab  = document.getElementById('tab-'+m.id);
    const pane = document.getElementById('pane-'+m.id);
    if (tab)  tab.classList.toggle('active', i===idx);
    if (pane) pane.classList.toggle('active', i===idx);
  });
}

function selectAgenda(mesaId, text) {
  const el = document.getElementById('agenda-'+mesaId);
  if (el) { el.value = text; el.focus(); }
}

function getCtx(mesa) {
  const ctx = {};
  (mesa.contextFields||[]).forEach(f => {
    const el = document.getElementById(f.id);
    if (el) ctx[f.id] = el.value;
  });
  return ctx;
}

async function runSession(mesaId) {
  if (_streaming) return;
  const mesa = MESAS.find(m => m.id === mesaId);
  if (!mesa) return;

  const agendaEl = document.getElementById('agenda-'+mesaId);
  const agenda   = agendaEl?.value.trim();
  if (!agenda) { alert('Define el tema de la sesión o selecciona un punto de agenda.'); return; }

  const out  = document.getElementById('out-'+mesaId);
  const btn  = document.getElementById('btn-'+mesaId);
  if (!out || !btn) return;

  _streaming = true;
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Procesando...';
  out.classList.add('streaming');
  out.innerHTML = `<div style="color:var(--text-faint);padding:24px;text-align:center;display:flex;align-items:center;justify-content:center;gap:10px;font-size:12px"><span class="spin"></span> ${mesa.name} en sesión...</div>`;

  const ctx = getCtx(mesa);
  const kbCtx = buildConsejoKBContext();
  const prompt = mesa.promptBuilder(agenda, ctx);
  const kbInjected = kbCtx ? kbCtx + '\n\n' + prompt : prompt;

  try {
    const session = await getSession();
    const jwt = session?.access_token || '';
    const proxyUrl = (window.MTX_CONFIG?.CLAUDE_PROXY_URL||'').replace(/\/+$/,'');
    if (!proxyUrl) throw new Error('CLAUDE_PROXY_URL no configurado en config.js');

    const kb = getConsejoKB();
    const sysWithKB = kb.empresa
      ? mesa.system.replace(/IBANOR SA de CV \/ MetaTronix/g, kb.empresa)
      : mesa.system;

    const resp = await fetch(proxyUrl, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+jwt},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:3000,
        system: sysWithKB,
        messages:[{role:'user', content:kbInjected}],
        stream:true,
      }),
      signal:AbortSignal.timeout(120000),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(()=>({error:resp.statusText}));
      throw new Error(err.error || 'Error '+resp.status);
    }

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf=''; let html='';
    out.innerHTML = '';

    while(true) {
      const {done,value} = await reader.read();
      if(done) break;
      buf += dec.decode(value,{stream:true});
      const lines = buf.split('\n');
      buf = lines.pop();
      for(const line of lines) {
        if(!line.startsWith('data:')) continue;
        const d = line.slice(5).trim();
        if(d==='[DONE]') break;
        try {
          const j = JSON.parse(d);
          if(j.type==='content_block_delta'&&j.delta?.type==='text_delta') html+=j.delta.text;
        } catch {}
      }
      out.innerHTML = html;
      out.scrollTop = out.scrollHeight;
    }
    out.innerHTML = html || '<em style="color:var(--text-faint)">Sin respuesta del modelo.</em>';
  } catch(e) {
    out.innerHTML = `<span style="color:#ff4646">Error: ${e.message}</span>`;
  } finally {
    _streaming = false;
    btn.disabled = false;
    btn.innerHTML = '⚡ Iniciar Sesión';
    out.classList.remove('streaming');
  }
}

function clearSession(mesaId) {
  const mesa = MESAS.find(m => m.id === mesaId);
  const out  = document.getElementById('out-'+mesaId);
  if (out) out.innerHTML = `<div class="session-placeholder">${mesa?.icon||''} ${mesa?.name||''}<br>Define el tema de la sesión y genera el análisis del Consejo.</div>`;
  const agenda = document.getElementById('agenda-'+mesaId);
  if (agenda) agenda.value = '';
}

function copyOutput(mesaId) {
  const el = document.getElementById('out-'+mesaId);
  if (!el) return;
  // Copy text content
  const text = el.innerText || el.textContent || '';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector(`button[onclick="copyOutput('${mesaId}')"]`);
    if (btn) { btn.textContent = '✓ Copiado'; setTimeout(()=>btn.textContent='📋 Copiar análisis', 2000); }
  }).catch(() => alert('No se pudo copiar. Selecciona el texto manualmente.'));
}

function copyNotes(mesaId) {
  const el = document.getElementById('notes-'+mesaId);
  const text = el?.value || '';
  if (!text) return;
  navigator.clipboard.writeText(text).catch(() => {});
}

/* ── CONSEJO KNOWLEDGE BASE ─────────────────────────────────────────────── */
function getConsejoKB() {
  try { return JSON.parse(localStorage.getItem('consejo_kb_v1') || '{}'); } catch { return {}; }
}

function saveConsejoKB() {
  const kb = {
    empresa:      document.getElementById('consejo-kb-empresa')?.value.trim() || '',
    sector:       document.getElementById('consejo-kb-sector')?.value.trim() || '',
    competidores: document.getElementById('consejo-kb-competidores')?.value.trim() || '',
    mision:       document.getElementById('consejo-kb-mision')?.value.trim() || '',
    retos:        document.getElementById('consejo-kb-retos')?.value.trim() || '',
  };
  localStorage.setItem('consejo_kb_v1', JSON.stringify(kb));
  const btn = document.querySelector('[onclick="toggleConsejoKB()"]');
  if (btn) { btn.textContent = '✅ KB'; setTimeout(() => { btn.textContent = '🧠 KB'; }, 1500); }
}

function clearConsejoKB() {
  localStorage.removeItem('consejo_kb_v1');
  ['consejo-kb-empresa','consejo-kb-sector','consejo-kb-competidores','consejo-kb-mision','consejo-kb-retos']
    .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
}

function toggleConsejoKB() {
  const p = document.getElementById('consejo-kb-panel');
  if (p) p.classList.toggle('open');
}

function buildConsejoKBContext() {
  const kb = getConsejoKB();
  if (!kb.empresa && !kb.mision && !kb.retos) return '';
  return `CONTEXTO ORGANIZACIONAL:
${kb.empresa ? `EMPRESA: ${kb.empresa}` : ''}
${kb.sector ? `SECTOR: ${kb.sector}` : ''}
${kb.competidores ? `COMPETIDORES: ${kb.competidores}` : ''}
${kb.mision ? `MISIÓN/VISIÓN: ${kb.mision}` : ''}
${kb.retos ? `RETOS ESTRATÉGICOS: ${kb.retos}` : ''}`.trim();
}

function initConsejoKB() {
  const kb = getConsejoKB();
  if (document.getElementById('consejo-kb-empresa')) document.getElementById('consejo-kb-empresa').value = kb.empresa || '';
  if (document.getElementById('consejo-kb-sector')) document.getElementById('consejo-kb-sector').value = kb.sector || '';
  if (document.getElementById('consejo-kb-competidores')) document.getElementById('consejo-kb-competidores').value = kb.competidores || '';
  if (document.getElementById('consejo-kb-mision')) document.getElementById('consejo-kb-mision').value = kb.mision || '';
  if (document.getElementById('consejo-kb-retos')) document.getElementById('consejo-kb-retos').value = kb.retos || '';
}

init();
