<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetaTronix — Mis Documentos</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<div id="header-placeholder"></div>

<div class="page">

  <!-- Page header -->
  <div class="page-header mt-24">
    <div class="page-header-text">
      <h1 id="greeting">Mis Documentos</h1>
      <p id="greeting-sub" class="muted">Cargando...</p>
    </div>
    <a href="/generate.html" class="btn btn-primary">⚡ Nuevo Documento</a>
  </div>

  <!-- Stats -->
  <div class="grid-4 mb-24">
    <div class="stat-card">
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-label">Total Documentos</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-draft" style="color:var(--text-muted)">—</div>
      <div class="stat-label">Borradores</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-review" style="color:var(--warning)">—</div>
      <div class="stat-label">En Revisión</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-approved">—</div>
      <div class="stat-label">Aprobados</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="flex-between mb-16">
    <div class="flex gap-8">
      <button class="btn btn-secondary filter-btn active" data-filter="all">Todos</button>
      <button class="btn btn-secondary filter-btn" data-filter="draft">Borrador</button>
      <button class="btn btn-secondary filter-btn" data-filter="pending_review">En Revisión</button>
      <button class="btn btn-secondary filter-btn" data-filter="approved">Aprobados</button>
    </div>
    <input type="text" id="search" class="form-input" style="max-width:220px" placeholder="Buscar...">
  </div>

  <!-- Documents grid -->
  <div id="doc-grid" class="doc-grid">
    <div class="empty-state">
      <div class="empty-icon">📄</div>
      <h3>Cargando documentos...</h3>
    </div>
  </div>

</div>

<!-- View Document Modal -->
<div id="doc-modal" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:800px; width:95%;">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-doc-title">—</div>
        <div style="display:flex;gap:8px;margin-top:6px" id="modal-doc-meta"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-doc-content" class="doc-content" style="max-height:60vh;overflow-y:auto;padding:8px 0"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
      <button class="btn btn-secondary" id="modal-download-btn">⬇ Descargar HTML</button>
      <button class="btn btn-secondary" id="modal-review-btn">📤 Enviar a Revisión</button>
    </div>
  </div>
</div>

<!-- Review modal -->
<div id="review-modal" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <span class="modal-title">Enviar a Revisión</span>
      <button class="modal-close" onclick="closeReviewModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Mensaje para el administrador (opcional)</label>
      <textarea id="review-message" class="form-textarea" placeholder="Describe cambios o contexto adicional..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeReviewModal()">Cancelar</button>
      <button class="btn btn-primary" id="review-submit-btn" onclick="submitReview()">Enviar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/config.js"></script>
<script src="/assets/app.js"></script>
<script>
let currentUser = null;
let allDocs = [];
let currentDocId = null;
let filterState = 'all';

async function init() {
  currentUser = await requireAuth();
  if (!currentUser) return;

  document.getElementById('header-placeholder').innerHTML = renderHeader(currentUser, 'dashboard');
  document.getElementById('greeting').textContent = `Hola, ${currentUser.profile?.full_name || currentUser.email.split('@')[0]}`;
  document.getElementById('greeting-sub').textContent = new Date().toLocaleDateString('es-MX', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  await loadDocuments();
  setupFilters();
  setupSearch();
  subscribeToUpdates();
}

async function loadDocuments() {
  const db = getDB();
  const { data, error } = await db.from('documents')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('updated_at', { ascending: false });

  if (error) { showToast('Error al cargar documentos', 'error'); return; }
  allDocs = data || [];
  updateStats();
  renderDocs(allDocs);
}

function updateStats() {
  document.getElementById('stat-total').textContent = allDocs.length;
  document.getElementById('stat-draft').textContent = allDocs.filter(d => d.status === 'draft').length;
  document.getElementById('stat-review').textContent = allDocs.filter(d => d.status === 'pending_review').length;
  document.getElementById('stat-approved').textContent = allDocs.filter(d => d.status === 'approved').length;
}

function renderDocs(docs) {
  const grid = document.getElementById('doc-grid');
  if (!docs.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">📄</div>
      <h3>Sin documentos</h3>
      <p style="margin-top:8px">
        <a href="/generate.html" class="btn btn-primary" style="margin-top:16px;display:inline-flex">⚡ Generar mi primer documento</a>
      </p>
    </div>`;
    return;
  }
  grid.innerHTML = docs.map(doc => `
    <div class="doc-card" onclick="openDoc('${doc.id}')">
      <div class="doc-card-header">
        <div>
          <div class="doc-title">${escHtml(doc.title)}</div>
          <div class="doc-type">${typeName(doc.doc_type)}</div>
        </div>
        ${statusBadge(doc.status)}
      </div>
      <div class="doc-date">${formatDate(doc.updated_at)}</div>
      <div class="doc-actions" onclick="event.stopPropagation()">
        <button class="btn btn-secondary btn-sm" onclick="openDoc('${doc.id}')">Ver</button>
        <button class="btn btn-secondary btn-sm" onclick="downloadDoc('${doc.id}')">⬇</button>
        ${doc.status === 'draft' ? `<button class="btn btn-secondary btn-sm" onclick="openReviewModal('${doc.id}')">📤 Revisar</button>` : ''}
        <a href="/generate.html?edit=${doc.id}" class="btn btn-ghost btn-sm">✏️</a>
      </div>
    </div>
  `).join('');
}

function setupFilters() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterState = btn.dataset.filter;
      applyFilter();
    });
  });
}

function setupSearch() {
  document.getElementById('search').addEventListener('input', applyFilter);
}

function applyFilter() {
  const q = document.getElementById('search').value.toLowerCase();
  let docs = filterState === 'all' ? allDocs : allDocs.filter(d => d.status === filterState);
  if (q) docs = docs.filter(d => d.title.toLowerCase().includes(q) || typeName(d.doc_type).toLowerCase().includes(q));
  renderDocs(docs);
}

function subscribeToUpdates() {
  const db = getDB();
  db.channel('dashboard-docs').on('postgres_changes', {
    event: '*', schema: 'public', table: 'documents',
    filter: `user_id=eq.${currentUser.id}`
  }, () => loadDocuments()).subscribe();
}

// Modal
function openDoc(docId) {
  const doc = allDocs.find(d => d.id === docId);
  if (!doc) return;
  currentDocId = docId;
  document.getElementById('modal-doc-title').textContent = doc.title;
  document.getElementById('modal-doc-meta').innerHTML = `
    ${statusBadge(doc.status)}
    <span class="badge badge-neutral">${typeName(doc.doc_type)}</span>
    <span style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono)">${formatDate(doc.updated_at)}</span>
  `;
  document.getElementById('modal-doc-content').innerHTML = doc.content || '<p style="color:var(--text-muted)">Sin contenido.</p>';
  document.getElementById('modal-review-btn').style.display = doc.status === 'draft' ? 'inline-flex' : 'none';
  document.getElementById('modal-download-btn').onclick = () => downloadDoc(docId);
  document.getElementById('modal-review-btn').onclick = () => { closeModal(); openReviewModal(docId); };
  document.getElementById('doc-modal').style.display = 'flex';
}

function closeModal() { document.getElementById('doc-modal').style.display = 'none'; }

function downloadDoc(docId) {
  const doc = allDocs.find(d => d.id === docId);
  if (!doc) return;
  downloadDocument(doc.title, doc.content);
  logActivity('download_document', 'document', docId, { title: doc.title });
}

function openReviewModal(docId) {
  currentDocId = docId;
  document.getElementById('review-message').value = '';
  document.getElementById('review-modal').style.display = 'flex';
}

function closeReviewModal() { document.getElementById('review-modal').style.display = 'none'; }

async function submitReview() {
  const btn = document.getElementById('review-submit-btn');
  btn.disabled = true; btn.textContent = 'Enviando...';
  const message = document.getElementById('review-message').value.trim();
  try {
    await sendForReview(currentDocId, message);
    closeReviewModal();
    showToast('Documento enviado a revisión ✓', 'success');
    await loadDocuments();
  } catch (e) {
    showToast('Error al enviar: ' + e.message, 'error');
  }
  btn.disabled = false; btn.textContent = 'Enviar';
}

init();
</script>
</body>
</html>
