<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetaTronix — Contacto</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #0a0f1c; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #111827; border: 1px solid #1e2d45; border-radius: 16px; padding: 40px 36px; max-width: 520px; width: 100%; box-shadow: 0 24px 80px rgba(0,0,0,.5); }
    .logo { font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: .12em; color: #00c2e0; margin-bottom: 28px; }
    h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; }
    .sub { font-size: 14px; color: #64748b; margin-bottom: 28px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; letter-spacing: .05em; text-transform: uppercase; margin-bottom: 6px; }
    input, select, textarea { width: 100%; background: #0d1526; border: 1px solid #1e2d45; border-radius: 8px; padding: 10px 14px; color: #e2e8f0; font-size: 14px; font-family: inherit; transition: border-color .15s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #00c2e0; }
    textarea { resize: vertical; min-height: 90px; }
    select option { background: #111827; }
    .btn { width: 100%; background: #00c2e0; color: #0a0f1c; border: none; border-radius: 8px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all .15s; margin-top: 8px; }
    .btn:hover { background: #00a8c5; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .success { background: #0d2b1e; border: 1px solid #1a6b3a; border-radius: 10px; padding: 20px; text-align: center; display: none; }
    .success h2 { color: #34d399; font-size: 18px; margin-bottom: 8px; }
    .success p { font-size: 13px; color: #64748b; }
    .error-msg { background: #2d1212; border: 1px solid #7f1d1d; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #fca5a5; margin-top: 10px; display: none; }
  </style>
</head>
<body>
  <div class="card" id="form-card">
    <div class="logo">▸ METATRONIX · SISTEMA CRM</div>
    <h1>¿Tienes un proyecto en mente?</h1>
    <p class="sub">Déjanos tus datos y un agente de MetaTronix te contactará en menos de 24 horas.</p>

    <div class="field">
      <label>Nombre completo *</label>
      <input type="text" id="nombre" placeholder="Ej: Carlos Rodríguez" required>
    </div>
    <div class="field">
      <label>Empresa</label>
      <input type="text" id="empresa" placeholder="Ej: Distribuidora Norte SA">
    </div>
    <div class="field">
      <label>Correo electrónico *</label>
      <input type="email" id="email" placeholder="carlos@empresa.com" required>
    </div>
    <div class="field">
      <label>Teléfono</label>
      <input type="tel" id="telefono" placeholder="+52 55 1234 5678">
    </div>
    <div class="field">
      <label>¿En qué podemos ayudarte?</label>
      <select id="interés">
        <option value="">Selecciona una opción…</option>
        <option value="crm">CRM con IA para ventas</option>
        <option value="marketing">Automatización de marketing</option>
        <option value="docs">Gestión de documentos</option>
        <option value="agentes">Agentes de ventas IA</option>
        <option value="otro">Otro</option>
      </select>
    </div>
    <div class="field">
      <label>Mensaje</label>
      <textarea id="mensaje" placeholder="Cuéntanos brevemente tu proyecto o necesidad…"></textarea>
    </div>

    <button class="btn" id="send-btn" onclick="submitForm()">📤 Enviar solicitud</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="success" id="success-card">
    <h2>✅ ¡Solicitud enviada!</h2>
    <p>Gracias por contactarnos. Un agente de MetaTronix revisará tu solicitud y te responderá en menos de 24 horas hábiles.</p>
  </div>

  <script>
    const SUPA_URL  = 'https://hodrfonbpmqulkyzrzpq.supabase.co';
    const SUPA_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvZHJmb25icG1xdWxreXpyenBxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTQ5NTUsImV4cCI6MjA5MTQ5MDk1NX0._M-_8jazg7q6Lt9F0Ia4MNWeCO4Q83zAqKsnpCIenFY';

    async function submitForm () {
      const btn  = document.getElementById('send-btn');
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';

      const nombre  = document.getElementById('nombre').value.trim();
      const email   = document.getElementById('email').value.trim();
      const empresa = document.getElementById('empresa').value.trim();
      const tel     = document.getElementById('telefono').value.trim();
      const interes = document.getElementById('interés').value;
      const msg     = document.getElementById('mensaje').value.trim();

      if (!nombre || !email) {
        errEl.textContent = 'Por favor llena los campos obligatorios (nombre y correo).';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Enviando…';

      try {
        const res = await fetch(`${SUPA_URL}/rest/v1/leads`, {
          method: 'POST',
          headers: {
            'apikey': SUPA_KEY,
            'Authorization': `Bearer ${SUPA_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({
            company_id:       'c0000000-0000-0000-0000-000000000001',
            empresa:          empresa || 'Sin empresa',
            contacto_nombre:  nombre,
            contacto_email:   email,
            contacto_telefono: tel,
            fuente:           'formulario_web',
            status:           'nuevo',
            notas:            `Interés: ${interes || 'No especificado'}\n\n${msg}`,
            valor_estimado:   0
          })
        });

        if (!res.ok && res.status !== 201) throw new Error('Error al enviar: ' + res.status);

        document.getElementById('form-card').style.display = 'none';
        document.getElementById('success-card').style.display = 'block';
      } catch (err) {
        errEl.textContent = 'Hubo un problema al enviar tu solicitud. Intenta de nuevo o escríbenos a contacto@metatronix.com.mx';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '📤 Enviar solicitud';
      }
    }
  </script>
</body>
</html>
