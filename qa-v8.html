:root{--bg:#0A0E18;--bg2:#111827;--bg3:#1E293B;--border:rgba(255,255,255,.08);--accent:#00ff88;--red:#F87171;--yellow:#FCD34D;--mono:'JetBrains Mono',monospace;--t1:#F1F5F9;--t2:#94A3B8;--t3:#475569}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;padding:24px;min-height:100vh}
h1{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.06em;margin-bottom:4px}
.meta{font-size:12px;color:var(--t2);margin-bottom:24px}
.scorebar{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.score-num{font-family:var(--mono);font-size:36px;font-weight:700;color:var(--accent)}
.score-label{font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em}
.progress-bar{flex:1;height:8px;background:rgba(255,255,255,.06);border-radius:4px;min-width:200px}
.progress-fill{height:100%;border-radius:4px;background:var(--accent);transition:width .3s}
.stats{display:flex;gap:16px;font-size:12px}
.stat-pass{color:var(--accent)}
.stat-fail{color:var(--red)}
.stat-skip{color:var(--yellow)}
.run-btn{padding:10px 24px;background:var(--accent);color:#0A0E18;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
.run-btn:disabled{opacity:.5;cursor:not-allowed}
.suite{margin-bottom:16px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.suite-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border)}
.suite-id{font-family:var(--mono);font-size:10px;color:var(--accent);font-weight:700;letter-spacing:.08em}
.suite-name{font-weight:600;font-size:14px;flex:1}
.suite-count{font-family:var(--mono);font-size:11px;color:var(--t3);margin-left:auto}
.test-list{display:none}
.suite.open .test-list{display:block}
.test-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
.test-row:last-child{border-bottom:none}
.test-status{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.s-pass{background:rgba(0,255,136,.15);color:var(--accent)}
.s-fail{background:rgba(248,113,113,.15);color:var(--red)}
.s-skip{background:rgba(252,211,77,.12);color:var(--yellow)}
.s-run{background:rgba(96,165,250,.15);color:#93C5FD;animation:spin .7s linear infinite}
.s-wait{background:rgba(255,255,255,.05);color:var(--t3)}
@keyframes spin{to{transform:rotate(360deg)}}
.test-name{flex:1;color:var(--t2)}
.test-detail{font-family:var(--mono);font-size:10px;color:var(--t3);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin:20px 0 8px}
</style>

async function checkPage(url, keywords=[]) {
  try {
    const r = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if (!r.ok) return fail(`HTTP ${r.status}`);
    const text = await r.text();
    for (const kw of keywords) {
      if (!text.includes(kw)) return fail(`Falta: ${kw}`);
    }
    return pass(`HTTP ${r.status} · ${text.length} chars`);
  } catch(e) { return fail(e.message); }
}

// ── Render UI ────────────────────────────────────────────────────
let results = {};
let totalTests = 0;

function renderSuites() {
  const container = document.getElementById('suites-container');
  container.innerHTML = '';
  SUITES.forEach(suite => {
    totalTests += suite.tests.length;
    const el = document.createElement('div');
    el.className = 'suite' + (suite.open ? ' open' : '');
    el.id = 'suite-' + suite.id;
    el.innerHTML = `
      <div class="suite-header" onclick="this.parentElement.classList.toggle('open')">
        <span class="suite-id">${suite.id}</span>
        <span class="suite-name">${suite.name}</span>
        <span class="suite-count" id="sc-${suite.id}">0/${suite.tests.length}</span>
      </div>
      <div class="test-list">
        ${suite.tests.map((t,i) => `
          <div class="test-row" id="tr-${suite.id}-${i}">
            <div class="test-status s-wait" id="ts-${suite.id}-${i}">○</div>
            <div class="test-name">${t.name}</div>
            <div class="test-detail" id="td-${suite.id}-${i}">—</div>
          </div>
        `).join('')}
      </div>`;
    container.appendChild(el);
  });
  document.getElementById('cnt-total').textContent = totalTests;
}

function updateStats() {
  const vals = Object.values(results);
  const pass = vals.filter(r=>r==='pass').length;
  const fail = vals.filter(r=>r==='fail').length;
  const skip = vals.filter(r=>r==='skip').length;
  const done = pass+fail+skip;
  const pct  = done > 0 ? Math.round(pass/done*100) : 0;
  document.getElementById('pct').textContent = pct+'%';
  document.getElementById('pct').style.color = pct>=90?'var(--accent)':pct>=70?'var(--yellow)':'var(--red)';
  document.getElementById('prog').style.width = pct+'%';
  document.getElementById('prog').style.background = pct>=90?'var(--accent)':pct>=70?'var(--yellow)':'var(--red)';
  document.getElementById('cnt-pass').textContent = pass;
  document.getElementById('cnt-fail').textContent = fail;
  document.getElementById('cnt-skip').textContent = skip;
}

function setTestResult(suiteId, idx, status, detail) {
  const key = suiteId+'-'+idx;
  results[key] = status;
  const ts = document.getElementById('ts-'+suiteId+'-'+idx);
  const td = document.getElementById('td-'+suiteId+'-'+idx);
  if(ts) { ts.className='test-status s-'+status; ts.textContent = status==='pass'?'✓':status==='fail'?'✗':'!'; }
  if(td) { td.textContent = detail||''; td.title = detail||''; }
  // Update suite counter
  const suiteTests = SUITES.find(s=>s.id===suiteId)?.tests.length||0;
  const suiteDone  = Object.keys(results).filter(k=>k.startsWith(suiteId+'-')).length;
  const sc = document.getElementById('sc-'+suiteId);
  if(sc) sc.textContent = suiteDone+'/'+suiteTests;
  updateStats();
}

async function runAll() {
  results = {};
  document.getElementById('run-btn').disabled = true;
  document.getElementById('run-btn').textContent = '⏳ Corriendo...';

  for (const suite of SUITES) {
    document.getElementById('suite-'+suite.id)?.classList.add('open');
    for (let i=0; i<suite.tests.length; i++) {
      const ts = document.getElementById('ts-'+suite.id+'-'+i);
      if(ts){ ts.className='test-status s-run'; ts.textContent='↻'; }
      try {
        const res = await suite.tests[i].run();
        setTestResult(suite.id, i, res.status, res.detail);
      } catch(e) {
        setTestResult(suite.id, i, 'fail', e.message||'Error');
      }
      await new Promise(r=>setTimeout(r,80));
    }
  }

  document.getElementById('run-btn').disabled = false;
  document.getElementById('run-btn').textContent = '↺ Repetir QA v8';
}

renderSuites();
</script>
</body>
</html>
