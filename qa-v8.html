const fail = (d) => ({status:'fail',detail:d});

// Cache de tokens para evitar múltiples logins
const _tokens = {};
async function getToken(email, pw='MetaTronix2026!') {
  if (_tokens[email]) return _tokens[email];
  const r = await fetch(SB+'/auth/v1/token?grant_type=password',{
    method:'POST', headers:{apikey:ANON,'Content-Type':'application/json'},
    body:JSON.stringify({email,password:pw})
  });
  const d = await r.json();
  if (d.access_token) { _tokens[email] = {token:d.access_token, uid:d.user.id}; return _tokens[email]; }
  return null;
}

async function sbAs(email, path) {
  const t = await getToken(email);
  if (!t) return {ok:false,status:401,data:[]};
  const r = await fetch(SB+path, {headers:{apikey:ANON,'Authorization':'Bearer '+t.token}});
  return {ok:r.ok, status:r.status, data:await r.json().catch(()=>[])};
}

async function sbAnon(path) {
  const r = await fetch(SB+path, {headers:{apikey:ANON,'Authorization':'Bearer '+ANON}});
  return {ok:r.ok, status:r.status, data:await r.json().catch(()=>[])};
}

async function page(url, kw=[]) {
  try {
    const r = await fetch(url, {signal:AbortSignal.timeout(8000)});
    if (!r.ok) return fail('HTTP '+r.status);
    const t = await r.text();
    for (const k of kw) if (!t.includes(k)) return fail('Falta: '+k);
    return pass('HTTP '+r.status+' · '+Math.round(t.length/1024)+'KB');
  } catch(e) { return fail(e.message); }
}

// ── Render ────────────────────────────────────────────────────
let results = {}, total = 0;

function render() {
  const c = document.getElementById('suites-container');
  c.innerHTML = '';
  SUITES.forEach(s => {
    total += s.tests.length;
    const el = document.createElement('div');
    el.className = 'suite' + (s.open ? ' open' : '');
    el.id = 'suite-' + s.id;
    el.innerHTML = `
      <div class="suite-header" onclick="this.parentElement.classList.toggle('open')">
        <span class="suite-id">${s.id}</span>
        <span class="suite-name">${s.name}${s.critical?'<span class="critical-badge">CRÍTICO</span>':''}</span>
        <span class="suite-count" id="sc-${s.id}">0/${s.tests.length}</span>
        <span class="suite-pct" id="sp-${s.id}">—</span>
      </div>
      <div class="test-list">${s.tests.map((t,i)=>`
        <div class="test-row" id="tr-${s.id}-${i}">
          <div class="ts s-wait" id="ts-${s.id}-${i}">○</div>
          <div class="test-name">${t.name}</div>
          <div class="test-detail" id="td-${s.id}-${i}">—</div>
        </div>`).join('')}</div>`;
    c.appendChild(el);
  });
  document.getElementById('nt').textContent = total;
}

function updateStats() {
  const vals = Object.values(results);
  const p = vals.filter(r=>r==='pass').length;
  const f = vals.filter(r=>r==='fail').length;
  const s = vals.filter(r=>r==='skip').length;
  const done = p+f+s;
  const pct = done > 0 ? Math.round(p/done*100) : 0;
  document.getElementById('pct').textContent = pct+'%';
  const clr = pct>=90?'var(--accent)':pct>=70?'var(--yellow)':'var(--red)';
  document.getElementById('pct').style.color = clr;
  document.getElementById('prog').style.width = pct+'%';
  document.getElementById('prog').style.background = clr;
  document.getElementById('np').textContent = p;
  document.getElementById('nf').textContent = f;
  document.getElementById('ns').textContent = s;
  // Update suite pct
  SUITES.forEach(s => {
    const sDone = Object.keys(results).filter(k=>k.startsWith(s.id+'-')).length;
    const sPass = Object.keys(results).filter(k=>k.startsWith(s.id+'-')&&results[k]==='pass').length;
    const sc = document.getElementById('sc-'+s.id);
    const sp = document.getElementById('sp-'+s.id);
    if(sc) sc.textContent = sDone+'/'+s.tests.length;
    if(sp && sDone>0) {
      const pct2 = Math.round(sPass/sDone*100);
      sp.textContent = pct2+'%';
      sp.style.color = pct2===100?'var(--accent)':pct2>=70?'var(--yellow)':'var(--red)';
    }
  });
}

function setResult(sid, idx, status, detail) {
  results[sid+'-'+idx] = status;
  const ts = document.getElementById('ts-'+sid+'-'+idx);
  const td = document.getElementById('td-'+sid+'-'+idx);
  if(ts){ ts.className='ts s-'+status; ts.textContent=status==='pass'?'✓':status==='fail'?'✗':'!'; }
  if(td){ td.textContent=detail||''; td.title=detail||''; }
  updateStats();
}

async function runAll() {
  results = {};
  Object.keys(_tokens).forEach(k=>delete _tokens[k]); // clear token cache
  const btn = document.getElementById('run-btn');
  btn.disabled = true; btn.textContent = '⏳ Corriendo...';
  updateStats();

  for (const suite of SUITES) {
    document.getElementById('suite-'+suite.id)?.classList.add('open');
    for (let i=0; i<suite.tests.length; i++) {
      const ts = document.getElementById('ts-'+suite.id+'-'+i);
      if(ts){ ts.className='ts s-run'; ts.textContent='↻'; }
      try {
        const res = await suite.tests[i].run();
        setResult(suite.id, i, res.status, res.detail);
      } catch(e) {
        setResult(suite.id, i, 'fail', e.message);
      }
      await new Promise(r=>setTimeout(r,60));
    }
  }

  btn.disabled = false; btn.textContent = '↺ Repetir QA v8';
}

render();
</script>
